<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>빌딩탭 개인 CRM</title>

  <style>
    body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f8fafc; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

    input[type="number"]::-webkit-outer-spin-button, input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

</head>
<body>
  <div id="root"></div>

  <!-- 여기서부터 작동 코드 -->
  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef } = React;

    // =====================================================================
    // [1] 유틸리티 스토리지 & Supabase 설정
    // =====================================================================
    const safeStorage = {
      getItem: (key) => { try { return localStorage.getItem(key); } catch (e) { return window['temp_' + key] || null; } },
      setItem: (key, val) => { try { localStorage.setItem(key, val); } catch (e) { window['temp_' + key] = val; } },
      removeItem: (key) => { try { localStorage.removeItem(key); } catch (e) { delete window['temp_' + key]; } }
    };

    const SUPABASE_URL = "https://ehshoqcskipcvybhomlq.supabase.co";
    const SUPABASE_KEY = "sb_publishable_v5aUCKdYsRAtiwKSjn8oSA_GnuPEe4G";
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: {
        storage: safeStorage,
        storageKey: 'building_tab_crm_session',
        autoRefreshToken: true,
        persistSession: true,
        detectSessionInUrl: false
      }
    });

    // 프론트엔드 CamelCase <-> DB LowerCase 변환기
    const toDB = (prop) => {
      const dbObj = { ...prop };
      
      // 폼 입력을 위해 쓰이던 UI 전용 임시 키값들이 DB에 들어가서 에러를 일으키는 현상 방지
      const excludeKeys = ['sale', 'deposit', 'rent', 'maintenance', 'direction', 'is_shared'];
      excludeKeys.forEach(k => delete dbObj[k]);

      const keyMap = {
        ownerName: 'ownername', ownerPhone: 'ownerphone', transactionType: 'transactiontype',
        landArea: 'landarea', totalFloorArea: 'totalfloorarea', buildingArea: 'buildingarea',
        buildingCoverage: 'buildingcoverage', floorAreaRatio: 'floorarearatio', floorUnderground: 'floorunderground',
        floorGround: 'floorground', completionYear: 'completionyear', floorDetails: 'floordetails',
        workLogs: 'worklogs', registrantPhone: 'registrantphone'
      };
      for (const [camel, lower] of Object.entries(keyMap)) {
        if (dbObj[camel] !== undefined) {
          dbObj[lower] = dbObj[camel];
          delete dbObj[camel];
        }
      }
      return dbObj;
    };

    const fromDB = (row) => {
      const prop = { ...row };
      const keyMap = {
        ownername: 'ownerName', ownerphone: 'ownerPhone', transactiontype: 'transactionType',
        landarea: 'landArea', totalfloorarea: 'totalFloorArea', buildingarea: 'buildingArea',
        buildingcoverage: 'buildingCoverage', floorarearatio: 'floorAreaRatio', floorunderground: 'floorUnderground',
        floorground: 'floorGround', completionyear: 'completionYear', floordetails: 'floorDetails',
        worklogs: 'workLogs', registrantphone: 'registrantPhone'
      };
      for (const [lower, camel] of Object.entries(keyMap)) {
        if (prop[lower] !== undefined) {
          prop[camel] = prop[lower];
          delete prop[lower];
        }
      }
      return prop;
    };

    const getYield = (sale, deposit, rent) => {
      const s = Number(sale) || 0; 
      const d = Number(deposit) || 0; 
      const r = Number(rent) || 0;
      if (s === 0 || s <= d || r === 0) return '0.0';
      return (((r * 12) / (s - d)) * 100).toFixed(1);
    };

    const getPricePerPyeong = (sale, landArea) => {
      if (!sale || !landArea) return 0;
      return Math.round(sale / (landArea * 0.3025));
    };

    const formatKoreanCurrency = (val) => {
      const num = Number(val);
      if (!num || isNaN(num) || num === 0) return '0원';
      if (num >= 10000) {
        const eok = Math.floor(num / 1000) / 10;
        return `${eok.toFixed(1)}억`;
      }
      return `${num.toLocaleString('ko-KR')}만`;
    };

    const autoFormatAddress = (addr) => {
      if (!addr) return ''; 
      let s = addr.replace(/\s+/g, '');
      s = s.replace(/([가-힣]+[시도])([가-힣]+[구군시])/g, '$1 $2'); 
      s = s.replace(/([가-힣]+[구군시])([가-힣]+[동읍면로길])/g, '$1 $2'); 
      s = s.replace(/([가-힣]+[동읍면로길])(\d)/g, '$1 $2');
      return s.replace(/\s+/g, ' ').trim();
    };

    const getExactPyeong = (sqm) => ((Number(sqm) || 0) * 0.3025).toFixed(2);

    const STATUS_OPTIONS = ['보류', '매매', '완료'];
    
    const STATUS_FORM_COLORS = { 
      '보류': 'bg-yellow-400 text-white shadow-[0_2px_8px_rgba(250,204,21,0.4)]', 
      '매매': 'bg-emerald-500 text-white shadow-[0_4px_12px_rgba(16,185,129,0.4)]',
      '완료': 'bg-blue-500 text-white shadow-[0_4px_12px_rgba(59,130,246,0.4)]'
    };
    
    const STATUS_BADGE_COLORS = { 
      '보류': 'bg-yellow-400 text-white shadow-sm', 
      '매매': 'bg-emerald-500 text-white shadow-sm',
      '완료': 'bg-blue-500 text-white shadow-sm'
    };

    const Icon = ({ name, className }) => {
      let textClass = 'text-base';
      if (className?.includes('w-3')) textClass = 'text-xs'; 
      else if (className?.includes('w-4')) textClass = 'text-sm'; 
      else if (className?.includes('w-5')) textClass = 'text-lg'; 
      else if (className?.includes('w-6')) textClass = 'text-xl'; 
      else if (className?.includes('w-8')) textClass = 'text-3xl'; 
      else if (className?.includes('w-12')) textClass = 'text-5xl';
      
      const cleanClassName = (className || '').replace(/\bw-\d+\b/g, '').replace(/\bh-\d+\b/g, '').trim();
      return <i className={`fas ${name} ${textClass} ${cleanClassName} flex items-center justify-center`}></i>;
    };

    const Building2 = (p) => <Icon name="fa-building" {...p} />;
    const Users = (p) => <Icon name="fa-users" {...p} />;
    const Plus = (p) => <Icon name="fa-plus" {...p} />;
    const Search = (p) => <Icon name="fa-search" {...p} />;
    const MapPin = (p) => <Icon name="fa-map-marker-alt" {...p} />;
    const Banknote = (p) => <Icon name="fa-money-bill-wave" {...p} />;
    const Maximize = (p) => <Icon name="fa-expand-arrows-alt" {...p} />;
    const Car = (p) => <Icon name="fa-car" {...p} />;
    const List = (p) => <Icon name="fa-list" {...p} />;
    const ArrowLeft = (p) => <Icon name="fa-arrow-left" {...p} />;
    const Save = (p) => <Icon name="fa-save" {...p} />;
    const ImageIcon = (p) => <Icon name="fa-image" {...p} />;
    const CheckCircle2 = (p) => <Icon name="fa-check-circle" {...p} />;
    const FileText = (p) => <Icon name="fa-file-alt" {...p} />;
    const Trash2 = (p) => <Icon name="fa-trash-alt" {...p} />;
    const TrendingUp = (p) => <Icon name="fa-chart-line" {...p} />;
    const UserCircle = (p) => <Icon name="fa-user-circle" {...p} />;
    const Briefcase = (p) => <Icon name="fa-briefcase" {...p} />;
    const CalendarIcon = (p) => <Icon name="fa-calendar-alt" {...p} />;
    const ChevronLeft = (p) => <Icon name="fa-chevron-left" {...p} />;
    const ChevronRight = (p) => <Icon name="fa-chevron-right" {...p} />;
    const Phone = (p) => <Icon name="fa-phone" {...p} />;
    const User = (p) => <Icon name="fa-user" {...p} />;
    const ArrowUpCircle = (p) => <Icon name="fa-arrow-circle-up" {...p} />;
    const Upload = (p) => <Icon name="fa-upload" {...p} />;
    const XCircle = (p) => <Icon name="fa-times-circle" {...p} />;
    const Lock = (p) => <Icon name="fa-lock" {...p} />;
    const ShieldCheck = (p) => <Icon name="fa-shield-alt" {...p} />;
    const MapIcon = (p) => <Icon name="fa-map" {...p} />;
    const CalendarDays = (p) => <Icon name="fa-calendar-day" {...p} />;
    const Percent = (p) => <Icon name="fa-percentage" {...p} />;
    const Bars = (p) => <Icon name="fa-bars" {...p} />;
    const Sync = (p) => <Icon name="fa-sync-alt" {...p} />;

    // =====================================================================
    // [3] 공통 UI 컴포넌트
    // =====================================================================
    function SidebarItem({ icon, label, active, onClick }) {
      return (
        <button onClick={onClick} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-colors ${active ? 'bg-blue-600 text-white' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}>
          {React.cloneElement(icon, { className: 'w-5 h-5' })} {label}
        </button>
      );
    }
    
    function FormGroup({ label, children }) { 
      return (
        <div className="flex flex-col gap-1.5 w-full">
          <label className="text-sm font-semibold text-slate-700">{label}</label>
          {children}
        </div>
      ); 
    }
    
    function SpecRow({ icon, label, value }) {
      return (
        <div className="flex flex-col sm:flex-row sm:items-center justify-between p-4 border-b border-slate-50 last:border-0 hover:bg-slate-50 transition-colors gap-1 sm:gap-4">
          <div className="flex items-center gap-3 text-slate-500 text-sm shrink-0">
            {React.cloneElement(icon, { className: 'w-4 h-4 text-slate-400' })} {label}
          </div>
          <div className="font-semibold text-slate-800 text-sm sm:text-right break-all sm:break-normal">{value}</div>
        </div>
      );
    }
    
    function FloorMoneyInput({ label, value, onChange }) {
      return (
        <div className="flex-1 w-full min-w-[120px]">
          <div className="flex items-center border border-slate-300 rounded-lg bg-white focus-within:border-blue-500 focus-within:ring-1 overflow-hidden shadow-sm transition-all">
            <span className="bg-slate-100 text-xs font-bold text-slate-600 px-2 py-3 sm:py-2 border-r border-slate-200 whitespace-nowrap">{label}</span>
            <input type="number" value={value || ''} onChange={onChange} className="w-full py-3 sm:py-2 px-2 text-right text-sm font-bold outline-none bg-transparent" placeholder="0" />
            <span className="text-xs font-bold text-slate-500 pr-2 pl-1 whitespace-nowrap">만원</span>
          </div>
          <span className="text-[11px] text-blue-600 font-bold text-right block pr-1 min-h-[16px] mt-0.5">{formatKoreanCurrency(value)}</span>
        </div>
      );
    }
    
    function FloorTextInput({ value, onChange, onBlur, autoFocus }) {
      return (
        <div className="w-full sm:w-20 shrink-0">
          <div className="flex items-center border border-slate-300 rounded-lg bg-white focus-within:border-blue-500 focus-within:ring-1 overflow-hidden shadow-sm transition-all">
            <span className="bg-slate-100 text-xs font-bold text-slate-600 px-2 py-3 sm:py-2 border-r border-slate-200 whitespace-nowrap sm:hidden md:inline-block">층수</span>
            <input type="text" value={value || ''} onChange={onChange} onBlur={onBlur} autoFocus={autoFocus} className="w-full py-3 sm:py-2 px-2 text-center text-sm font-bold outline-none bg-transparent" placeholder="1층" />
          </div>
          <span className="text-sm text-transparent block min-h-[16px] mt-0.5 hidden sm:block">.</span>
        </div>
      );
    }
    
    function CompanyTextInput({ value, onChange }) {
      return (
        <div className="flex-1 min-w-[140px]">
          <div className="flex items-center border border-slate-300 rounded-lg bg-white focus-within:border-blue-500 focus-within:ring-1 overflow-hidden shadow-sm transition-all">
            <span className="bg-slate-100 text-xs font-bold text-slate-600 px-2 py-3 sm:py-2 border-r border-slate-200 whitespace-nowrap">업체명</span>
            <input type="text" value={value || ''} onChange={onChange} className="w-full py-3 sm:py-2 px-2 text-sm font-bold outline-none bg-transparent" placeholder="상호명/비고" />
          </div>
          <span className="text-sm text-transparent block min-h-[16px] mt-0.5 hidden sm:block">.</span>
        </div>
      );
    }
    
    function FloorMoneyInputReadOnly({ label, value }) {
      return (
        <div className="flex-1 w-full min-w-[120px]">
          <div className="flex items-center border border-blue-200 rounded-lg bg-white overflow-hidden shadow-sm transition-all">
            <span className="bg-blue-100 text-xs font-bold text-blue-800 px-2 py-3 sm:py-2 border-r border-blue-200 whitespace-nowrap">{label}</span>
            <div className="w-full py-3 sm:py-2 px-2 text-right text-sm font-extrabold text-slate-900 bg-transparent truncate">{value.toLocaleString()}</div>
            <span className="text-xs font-bold text-slate-500 pr-2 pl-1 whitespace-nowrap">만원</span>
          </div>
          <span className="text-[11px] text-blue-600 font-bold text-right block pr-1 min-h-[16px] mt-0.5">{formatKoreanCurrency(value)}</span>
        </div>
      );
    }

    // =====================================================================
    // [4] 메인 APP 컴포넌트
    // =====================================================================
    function App() {
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [currentUser, setCurrentUser] = useState(null);
      const [isAuthLoading, setIsAuthLoading] = useState(true);
      const [isFetchingData, setIsFetchingData] = useState(false);

      const [properties, setProperties] = useState([]);
      const [employees, setEmployees] = useState([]);
      const [customers, setCustomers] = useState([]);
      const [memos, setMemos] = useState([]);

      const [currentView, setCurrentView] = useState('list'); 
      const [selectedProperty, setSelectedProperty] = useState(null);
      
      const [activeTab, setActiveTab] = useState('calendar'); 
      const [currentEmployeeView, setCurrentEmployeeView] = useState('list');
      const [currentCustomerView, setCurrentCustomerView] = useState('list');

      const [searchTerm, setSearchTerm] = useState('');
      const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
      const [rlsError, setRlsError] = useState(false);

      // 💡 [캔버스 에러 방지] console.error 대신 console.warn 사용
      const handleSupabaseError = (error, tableName) => {
        if (!error) return false;
        console.warn(`DB Warning (${tableName}):`, error.message);
        if (error.code === '42501') {
          setRlsError(true);
        } else {
          alert(`데이터베이스 오류 (${tableName}):\n${error.message}`);
        }
        return true;
      };

      const fetchCloudData = async () => {
        setIsFetchingData(true);
        try {
          const [propsRes, usersRes, custsRes, memosRes] = await Promise.all([
            supabase.from('crm_properties').select('*'),
            supabase.from('crm_users').select('*'),
            supabase.from('crm_customers').select('*'),
            supabase.from('crm_memos').select('*')
          ]);
          
          if (propsRes.data) {
             const serverProps = propsRes.data.map(fromDB);
             serverProps.sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));
             setProperties(serverProps);
          }
          if (usersRes.data) setEmployees(usersRes.data);
          if (custsRes.data) setCustomers(custsRes.data);
          if (memosRes.data) setMemos(memosRes.data);
        } catch (err) {
          console.warn("데이터 로드 실패:", err.message);
        } finally {
          setIsFetchingData(false);
        }
      };

      useEffect(() => {
        supabase.auth.getSession().then(({ data: { session } }) => {
          if (session) {
            setCurrentUser({
              loginId: session.user.email.replace('@crm.local', '').toLowerCase(),
              name: session.user.user_metadata?.name || '사용자',
              department: session.user.user_metadata?.department || '사원',
              phone: session.user.user_metadata?.phone || '',
              id: session.user.id
            });
            setIsAuthenticated(true);
          }
          setIsAuthLoading(false);
        });

        const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
          if (session) {
            setCurrentUser({
              loginId: session.user.email.replace('@crm.local', '').toLowerCase(),
              name: session.user.user_metadata?.name || '사용자',
              department: session.user.user_metadata?.department || '사원',
              phone: session.user.user_metadata?.phone || '',
              id: session.user.id
            });
            setIsAuthenticated(true);
          } else {
            setCurrentUser(null);
            setIsAuthenticated(false);
          }
        });

        // 1. 초기 데이터 로딩
        fetchCloudData();

        // 2. 캔버스 환경에서는 웹소켓(Realtime)이 차단되므로 주기적 동기화(Polling)로 대체합니다.
        // 15초마다 최신 데이터를 서버에서 가져옵니다. (저장 로직의 동기화 충돌을 우회)
        const interval = setInterval(fetchCloudData, 15000);

        return () => {
          subscription.unsubscribe();
          clearInterval(interval);
        };
      }, []);

      const myProperties = useMemo(() => {
        if (!currentUser || !properties) return [];
        return properties.filter(p => p.user_id && p.user_id.toLowerCase() === currentUser.loginId.toLowerCase());
      }, [properties, currentUser]);

      const filteredMyProperties = useMemo(() => {
        return myProperties.filter(p => 
          (p.name || '').toLowerCase().includes(searchTerm.toLowerCase()) || 
          (p.address || '').toLowerCase().includes(searchTerm.toLowerCase())
        );
      }, [myProperties, searchTerm]);

      const filteredEmployees = useMemo(() => {
        return employees.filter(e =>
          currentUser && e.id !== currentUser.id &&
          ((e.name || '').toLowerCase().includes(searchTerm.toLowerCase()) ||
          (e.department || '').toLowerCase().includes(searchTerm.toLowerCase()) ||
          (e.loginId || '').toLowerCase().includes(searchTerm.toLowerCase()))
        );
      }, [employees, currentUser, searchTerm]);

      const filteredCustomers = useMemo(() => {
        return customers.filter(c =>
          (c.name || '').toLowerCase().includes(searchTerm.toLowerCase()) ||
          (c.region || '').toLowerCase().includes(searchTerm.toLowerCase())
        );
      }, [customers, searchTerm]);

      useEffect(() => {
        const handleClickOutside = (e) => {
          if (isMobileMenuOpen && e.target.closest('#sidebar-overlay')) setIsMobileMenuOpen(false);
        };
        document.addEventListener('click', handleClickOutside);
        return () => document.removeEventListener('click', handleClickOutside);
      }, [isMobileMenuOpen]);

      const handleAuth = async (type, data) => {
        const safeId = data.loginId.toLowerCase().trim();
        const email = safeId.includes('@') ? safeId : `${safeId}@crm.local`;

        if (type === 'login') {
          const { error } = await supabase.auth.signInWithPassword({
            email,
            password: data.password,
          });

          if (error) return { success: false, message: '아이디 또는 비밀번호가 일치하지 않습니다.' };
          
          setActiveTab('calendar');
          return { success: true };
        } 
        
        if (type === 'signup') {
          const { data: authData, error } = await supabase.auth.signUp({
            email,
            password: data.password,
            options: { data: { name: data.name, department: data.department || '신규 사원', phone: data.phone } }
          });

          if (error) {
            if (error.message.includes('already registered')) return { success: false, message: '이미 존재하는 아이디입니다.' };
            return { success: false, message: error.message };
          }

          if (authData.user) {
             const empData = {
               id: authData.user.id, 
               loginId: data.loginId.toLowerCase(),
               name: data.name,
               department: data.department || '신규 사원',
               phone: data.phone,
               date: new Date().toISOString().split('T')[0]
             };
             const { error: dbErr } = await supabase.from('crm_users').insert([empData]);
             if (handleSupabaseError(dbErr, 'crm_users')) return { success: false, message: 'DB 보안 정책에 의해 등록 차단됨' };
          }

          setActiveTab('calendar');
          return { success: true };
        }
      };

      const handleLogout = async () => {
        await supabase.auth.signOut();
        setIsMobileMenuOpen(false);
      };

      // 무조건 화면에 먼저 즉시 반영하고, 에러 시 롤백하지 않습니다 (화면에 남겨둠)
      const handleSaveProperty = async (prop) => {
        try {
          const finalProp = { 
            ...prop, 
            id: prop.id || `P-${Date.now()}`,
            user_id: currentUser?.loginId?.toLowerCase() || 'unknown', 
            registrant: currentUser?.name || '등록자',
            registrantPhone: currentUser?.phone || '',
            date: prop.date || new Date().toISOString().split('T')[0]
          };
          
          // 1. 낙관적 UI: 데이터베이스 응답을 기다리지 않고 로컬에 무조건 먼저 꽂아 넣습니다.
          setProperties(prev => {
            const idx = prev.findIndex(p => p.id === finalProp.id);
            if(idx >= 0) { 
               const newList = [...prev]; 
               newList[idx] = finalProp; 
               return newList; 
            }
            return [finalProp, ...prev]; 
          });

          // 2. 대기 없이 즉시 목록 화면으로 이동합니다.
          setCurrentView('list');
          setSelectedProperty(null);
          
          const scrollArea = document.getElementById('main-scroll-area');
          if (scrollArea) scrollArea.scrollTo({ top: 0, behavior: 'auto' });

          // 3. 백그라운드 서버 저장 시도
          const { error } = await supabase.from('crm_properties').upsert(toDB(finalProp));
          
          // 4. RLS 권한 거부 시 배너를 띄우지만 화면(state)에서 삭제하지 않습니다.
          handleSupabaseError(error, 'crm_properties');
          
        } catch (err) {
          alert(`시스템 오류가 발생했습니다:\n${err.message}`);
        }
      };

      const handleUpdateProperty = async (prop) => {
        try {
          // 화면 즉시 반영
          setProperties(prev => prev.map(p => p.id === prop.id ? prop : p));
          setSelectedProperty(prop);

          // 서버 전송
          const { error } = await supabase.from('crm_properties').upsert(toDB(prop));
          handleSupabaseError(error, 'crm_properties');
        } catch (err) {
          alert(`시스템 오류가 발생했습니다:\n${err.message}`);
        }
      };

      const handleDeleteProperty = async (propertyId) => {
        setProperties(prev => prev.filter(p => p.id !== propertyId));
        setCurrentView('list');
        setSelectedProperty(null);

        const { error } = await supabase.from('crm_properties').delete().eq('id', propertyId);
        handleSupabaseError(error, 'crm_properties');
      };

          {isMobileMenuOpen && <div id="sidebar-overlay" className="md:hidden fixed inset-0 bg-black/50 z-40"></div>}

          <aside className={`${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} md:translate-x-0 fixed md:static inset-y-0 left-0 z-50 w-64 bg-slate-900 text-white flex flex-col shadow-2xl md:shadow-xl transition-transform duration-300 ease-in-out`}>

    // =====================================================================
    // [5] 하위 컴포넌트들

    function AuthView({ onAuth, isDbEmpty }) {
      const [isLoginMode, setIsLoginMode] = useState(true);
      const [errorMsg, setErrorMsg] = useState('');
      const [formData, setFormData] = useState({ loginId: safeStorage.getItem('crm_saved_id') || '', password: '', name: '', phone: '', department: '' });
      const [rememberId, setRememberId] = useState(!!safeStorage.getItem('crm_saved_id'));
      const [isSubmitting, setIsSubmitting] = useState(false);

      const handleChange = (e) => setFormData({ ...formData, [e.target.name]: e.target.value });

      const handleSubmit = async (e) => {
        e.preventDefault();
        
        if (!formData.loginId) return alert("아이디를 입력해주세요.");
        if (!formData.password) return alert("비밀번호를 입력해주세요.");
        if (!isLoginMode) {
           if (!formData.name) return alert("이름을 입력해주세요.");
           if (!formData.phone) return alert("전화번호를 입력해주세요.");
        }

        setErrorMsg('');
        setIsSubmitting(true);
        if (rememberId && isLoginMode) safeStorage.setItem('crm_saved_id', formData.loginId);
        else if (!rememberId && isLoginMode) safeStorage.removeItem('crm_saved_id');
        const result = await onAuth(isLoginMode ? 'login' : 'signup', formData);
        if (result && !result.success) setErrorMsg(result.message);
        setIsSubmitting(false);
      };

      return (
        <div className="flex min-h-screen w-full items-center justify-center bg-slate-100 p-4">
          <div className="w-full max-w-md bg-white p-6 sm:p-8 rounded-2xl shadow-xl border border-slate-200">
            <div className="flex flex-col items-center justify-center mb-6">
              <div className="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mb-4 shadow-inner">
                <Building2 className="w-8 h-8 text-blue-600" />
              </div>
              <h1 className="text-2xl font-extrabold text-slate-900 tracking-tight">빌딩탭</h1>
              <p className="text-sm text-slate-500 mt-2 text-center">부동산 매물 관리의 시작</p>
            </div>
            {isDbEmpty && <p className="text-xs text-blue-600 bg-blue-50 px-3 py-2 rounded-lg font-bold mb-4 text-center">최초 접속입니다. '사원 가입'을 진행해주세요.</p>}
            <div className="flex p-1 bg-slate-100 rounded-lg mb-6">
              <button type="button" onClick={() => {setIsLoginMode(true); setErrorMsg('');}} className={`flex-1 py-2.5 text-sm font-bold rounded-md transition-all ${isLoginMode ? 'bg-white text-blue-600 shadow' : 'text-slate-500'}`}>로그인</button>
              <button type="button" onClick={() => {setIsLoginMode(false); setErrorMsg('');}} className={`flex-1 py-2.5 text-sm font-bold rounded-md transition-all ${!isLoginMode ? 'bg-white text-blue-600 shadow' : 'text-slate-500'}`}>사원 가입</button>

                  <User className="w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                  <input type="text" name="loginId" value={formData.loginId} onChange={handleChange} placeholder="아이디 입력" className="w-full pl-12 pr-4 py-3 border border-slate-300 rounded-xl outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200" />
                </div>
              </div>
              <div className="space-y-1.5">
                <label className="text-sm font-bold text-slate-700">비밀번호</label>

                <label className="flex items-center gap-2 text-sm text-slate-600 mt-2 cursor-pointer font-medium pl-1">

              {!isLoginMode && (
                <div className="space-y-4 pt-4 border-t border-slate-100 mt-2">
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div className="space-y-1.5"><label className="text-sm font-bold text-slate-700">이름</label><input type="text" name="name" value={formData.name} onChange={handleChange} placeholder="홍길동" className="w-full px-4 py-3 border border-slate-300 rounded-xl outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200" /></div>
                    <div className="space-y-1.5"><label className="text-sm font-bold text-slate-700">소속</label><input type="text" name="department" value={formData.department} onChange={handleChange} placeholder="영업1팀" className="w-full px-4 py-3 border border-slate-300 rounded-xl outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200" /></div>

              </button>

        </div>
      );
    }

    function PropertyListView({ properties, onViewDetail }) {
      const [statusFilter, setStatusFilter] = useState('전체');
      const [minPrice, setMinPrice] = useState('');
      const [maxPrice, setMaxPrice] = useState('');
      const [sortConfig, setSortConfig] = useState({ key: 'date', direction: 'desc' });

      const handleSort = (key) => {
        let direction = 'desc';
        if (sortConfig.key === key && sortConfig.direction === 'desc') direction = 'asc';
        setSortConfig({ key, direction });
      };

      const filteredAndSortedProperties = useMemo(() => {
        let result = [...properties];
        if (statusFilter !== '전체') result = result.filter(p => (p.status || '보류') === statusFilter);

        if (minPrice !== '' || maxPrice !== '') {
          const min = minPrice !== '' ? Number(minPrice) * 10000 : 0;
          const max = maxPrice !== '' ? Number(maxPrice) * 10000 : Infinity;
          result = result.filter(p => {
            const priceVal = p.transactionType === '매매' ? (p.price?.sale || 0) : (p.price?.deposit || 0);
            return priceVal >= min && priceVal <= max;
          });
        }

        result.sort((a, b) => {
          if (sortConfig.key === 'date') {
            const dateA = new Date(a.date || 0).getTime() || 0;
            const dateB = new Date(b.date || 0).getTime() || 0;
            return sortConfig.direction === 'desc' ? dateB - dateA : dateA - dateB;
          } else if (sortConfig.key === 'yield') {
            const yieldA = Number(getYield(a.price?.sale, a.price?.deposit, a.price?.rent));
            const yieldB = Number(getYield(b.price?.sale, b.price?.deposit, b.price?.rent));
            return sortConfig.direction === 'desc' ? yieldB - yieldA : yieldA - yieldB;
          }
          return 0;
        });

        return result;
      }, [properties, statusFilter, minPrice, maxPrice, sortConfig]);

      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden w-full flex flex-col">
          <div className="p-4 md:p-5 border-b border-slate-200 flex flex-col lg:flex-row justify-between items-start lg:items-center bg-slate-50/50 gap-4">
            <h3 className="font-semibold text-slate-800 flex items-center gap-2 text-sm md:text-base shrink-0">
              <List className="w-5 h-5 text-blue-600" />
              내 물건 목록 <span className="text-blue-600 bg-blue-100 px-2 py-0.5 rounded-full text-xs">{filteredAndSortedProperties.length}</span>
            </h3>

            <div className="flex flex-col sm:flex-row items-stretch sm:items-end gap-3 w-full lg:w-auto">
              <div className="flex flex-col gap-1.5 w-full sm:w-auto">
                <span className="text-[11px] font-bold text-slate-500 flex items-center gap-1.5 ml-1"><List className="w-3 h-3 text-blue-500" /> 상태</span>
                <div className="flex bg-slate-200/80 p-1 rounded-lg w-full sm:w-auto shadow-inner">
                  {['전체', '보류', '매매', '완료'].map(status => (
                    <button key={status} onClick={() => setStatusFilter(status)} className={`flex-1 sm:flex-none px-4 py-1.5 rounded-md text-xs font-bold transition-all ${statusFilter === status ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>{status}</button>
                  ))}
                </div>
              </div>

              <div className="flex flex-col gap-1.5 w-full sm:w-auto">
                <span className="text-[11px] font-bold text-slate-500 flex items-center gap-1.5 ml-1"><Banknote className="w-3 h-3 text-blue-500" /> 매매금액 검색</span>
                <div className="flex items-center bg-white border border-slate-300 rounded-lg p-1 w-full sm:w-auto shadow-sm focus-within:ring-2 focus-within:ring-blue-500 focus-within:border-blue-500 transition-all h-[34px] sm:h-[36px]">
                  <input type="number" value={minPrice} onChange={(e) => setMinPrice(e.target.value)} className="w-full sm:w-16 text-center outline-none text-xs sm:text-sm font-bold text-slate-700 bg-transparent px-1" />

                    <p className="text-slate-800 text-xs sm:text-sm whitespace-pre-line leading-relaxed">{log.content}</p>
                  </div>
                )) : <div className="py-6 sm:py-8 text-center text-slate-400 text-xs sm:text-sm bg-slate-50 rounded-xl border border-slate-100 border-dashed">등록된 작업 일지가 없습니다.</div>}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function PropertyFormView({ initialData, onBack, onSave, currentUser }) {
      const [newLog, setNewLog] = useState('');
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [formData, setFormData] = useState(() => {
        if (initialData) return { ...initialData };
        return {
          name: '', ownerName: '', ownerPhone: '',
          type: '빌딩', transactionType: '매매', address: '', zoning: '',
          landArea: '', totalFloorArea: '', buildingArea: '', buildingCoverage: '', floorAreaRatio: '', floorUnderground: '', floorGround: '', elevators: '', parking: '', completionYear: '',
          sale: '', deposit: '', rent: '', maintenance: '',
          floorDetails: [{ id: Date.now(), floor: '1층', companyName: '', deposit: '', rent: '', maintenance: '' }],
          direction: '남향', workLogs: [], status: '보류'
        };
      });

      const handleChange = (e) => {
        setFormData(prev => ({ ...prev, [e.target.name]: e.target.value }));
      };
      
      const handleAddressBlur = () => {
        const formatted = autoFormatAddress(formData.address);
        setFormData(prev => ({ ...prev, address: formatted }));
      };

      const handleImageUpload = (e) => {
        const files = Array.from(e.target.files);
        const newImages = files.map(file => URL.createObjectURL(file));
        setFormData(prev => ({ ...prev, images: [...(prev.images || []), ...newImages] }));
      };

      const removeImage = (index) => setFormData(prev => {
        const newImages = [...(prev.images || [])];
        newImages.splice(index, 1);
        return { ...prev, images: newImages };
      });

      const handleFloorChange = (id, field, value) => {
        setFormData(prev => ({
          ...prev,
          floorDetails: prev.floorDetails.map(item => item.id === id ? { ...item, [field]: value } : item)
        }));
      };

      const sortFloorDetails = () => {
        const parseFloorLevel = (str) => {
          if(!str) return 0;
          const numStr = str.replace(/[^0-9]/g, '');
          const num = numStr ? parseInt(numStr, 10) : 0;
          if (str.includes('지하') || str.toUpperCase().includes('B')) return -num;
          return num;
        };

        setFormData(prev => {
          const sorted = [...prev.floorDetails].sort((a, b) => parseFloorLevel(a.floor) - parseFloorLevel(b.floor));
          return { ...prev, floorDetails: sorted };
        });
      };

      const addFloor = () => {
        setFormData(prev => {
          const parseFloorLevel = (str) => {
             if(!str) return 0;
             const numStr = str.replace(/[^0-9]/g, '');
             const num = numStr ? parseInt(numStr, 10) : 0;
             if (str.includes('지하') || str.toUpperCase().includes('B')) return -num;
             return num;
          };
          const groundFloors = prev.floorDetails
            .map(f => f.floor)
            .filter(f => f && !f.includes('지하') && !f.toUpperCase().includes('B'))
            .map(f => parseInt(f.replace(/[^0-9]/g, ''), 10))
            .filter(n => !isNaN(n));
          
          const maxGround = groundFloors.length > 0 ? Math.max(...groundFloors) : 0;
          const nextFloor = `${maxGround + 1}층`;

          return {
            ...prev,
            floorDetails: [...prev.floorDetails, { id: Date.now(), floor: nextFloor, companyName: '', deposit: '', rent: '', maintenance: '', isNew: true }]
          };
        });
      };

      const handleAddLog = () => {
        if (!newLog.trim()) return;
        const log = {
          id: Date.now(),
          date: new Date().toLocaleString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }),
          author: currentUser ? currentUser.name : '등록자',
          content: newLog.trim()
        };
        setFormData(prev => ({
          ...prev,
          workLogs: [log, ...(prev.workLogs || [])]
        }));
        setNewLog('');
      };

      const totals = useMemo(() => {
        const details = formData.floorDetails || [];
        return details.reduce((acc, curr) => ({
          deposit: acc.deposit + (Number(curr.deposit) || 0),
          rent: acc.rent + (Number(curr.rent) || 0),
          maintenance: acc.maintenance + (Number(curr.maintenance) || 0),
        }), { deposit: 0, rent: 0, maintenance: 0 });
      }, [formData.floorDetails]);

      const handleSubmit = async (e) => {
        e.preventDefault();

        if (!formData.name || formData.name.trim() === '') return alert("물건명을 입력해주세요.");
        if (!formData.address || formData.address.trim() === '') return alert("소재지(주소)를 입력해주세요.");

        setIsSubmitting(true);

        try {
          const formattedAddress = autoFormatAddress(formData.address);
          
          const parseFloorLevel = (str) => {
            if(!str) return 0;
            const numStr = str.replace(/[^0-9]/g, '');
            const num = numStr ? parseInt(numStr, 10) : 0;
            if (str.includes('지하') || str.toUpperCase().includes('B')) return -num;
            return num;
          };

          const sortedFloors = [...(formData.floorDetails || [])].sort((a, b) => parseFloorLevel(a.floor) - parseFloorLevel(b.floor));
          
          let finalWorkLogs = [...(formData.workLogs || [])];
          if (newLog.trim()) {
            finalWorkLogs.unshift({
              id: Date.now(),
              date: new Date().toLocaleString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }),
              author: currentUser ? currentUser.name : '등록자',
              content: newLog.trim()
            });
          }

          const cleanFormData = { ...formData };
          delete cleanFormData.sale;
          delete cleanFormData.deposit;
          delete cleanFormData.rent;
          delete cleanFormData.maintenance;
          delete cleanFormData.direction;
          delete cleanFormData.is_shared;

          await onSave({
            ...cleanFormData,
            address: formattedAddress,
            floorDetails: sortedFloors,
            landArea: Number(formData.landArea || 0),
            totalFloorArea: Number(formData.totalFloorArea || 0),
            buildingArea: Number(formData.buildingArea || 0),
            buildingCoverage: Number(formData.buildingCoverage || 0),
            floorAreaRatio: Number(formData.floorAreaRatio || 0),
            floorUnderground: Number(formData.floorUnderground || 0),
            floorGround: Number(formData.floorGround || 0),
            elevators: Number(formData.elevators || 0),
            parking: Number(formData.parking || 0),
            price: { sale: Number(formData.sale || 0), deposit: totals.deposit, rent: totals.rent, maintenance: totals.maintenance },
            workLogs: finalWorkLogs,
          });
        } catch (error) {
            alert("저장 준비 중 오류 발생: " + error.message);
        } finally {
          setIsSubmitting(false);
        }
      };

      return (
        <div className="max-w-3xl mx-auto pb-10 relative">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
            <div className="flex flex-col sm:flex-row items-start sm:items-center gap-3 sm:gap-6 w-full md:w-auto">
              <h2 className="text-xl sm:text-2xl font-bold text-slate-800 shrink-0">{initialData ? '등록된 물건 수정' : '신규 물건 등록'}</h2>
              <div className="flex items-center p-1 bg-slate-200/70 rounded-xl border border-slate-200 w-full sm:w-auto overflow-x-auto">
                {STATUS_OPTIONS.map(s => (
                  <button 
                    key={s} type="button" onClick={() => setFormData(prev => ({...prev, status: s}))} 
                    className={`flex-1 sm:flex-none items-center justify-center gap-1 sm:gap-2 px-3 sm:px-4 py-1.5 rounded-lg text-xs sm:text-sm font-bold transition-all duration-300 ${formData.status === s || (!formData.status && s==='보류') ? STATUS_FORM_COLORS[s] : 'text-slate-400 hover:text-slate-600'}`}
                  >
                    {s}
                  </button>
                ))}
              </div>
            </div>
            
            <div className="flex items-center gap-2 w-full md:w-auto">
              <button type="button" onClick={onBack} className="flex-1 md:flex-none text-slate-500 hover:text-slate-800 text-sm font-bold bg-slate-200 px-4 py-2.5 sm:py-2 rounded-lg text-center transition-colors">취소 및 돌아가기</button>
            </div>
          </div>

          <form onSubmit={handleSubmit} onKeyDown={(e) => { if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') e.preventDefault(); }} className="space-y-4 sm:space-y-6">
            <div className="bg-white p-5 sm:p-8 rounded-2xl shadow-sm border border-slate-200">
              <h3 className="text-lg sm:text-xl font-bold text-slate-800 mb-4 sm:mb-6 pb-3 sm:pb-4 border-b border-slate-100 flex items-center gap-2"><Building2 className="w-5 h-5 sm:w-6 sm:h-6 text-blue-500" /> 기본 정보</h3>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6">
                <FormGroup label="물건명 (필수)"><input type="text" name="name" value={formData.name || ''} onChange={handleChange} className="form-input w-full p-2.5 sm:p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none font-bold text-sm sm:text-base" placeholder="예: 엠파이어 빌딩" /></FormGroup>
                
                <FormGroup label="소재지 (주소)">
                   <input type="text" name="address" value={formData.address || ''} onChange={handleChange} onBlur={handleAddressBlur} className={`form-input w-full p-2.5 sm:p-3 border rounded-lg outline-none focus:ring-2 bg-white text-sm sm:text-base border-slate-300 focus:ring-blue-500`} placeholder="예: 서울시 강남구 신사동 10" />
                </FormGroup>

                <FormGroup label="물건 종류"><select name="type" value={formData.type || ''} onChange={handleChange} className="form-select w-full p-2.5 sm:p-3 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 bg-white font-bold text-slate-700 text-sm sm:text-base"><option>빌딩</option><option>상가</option><option>오피스텔</option><option>아파트</option><option>빌라</option><option>원룸</option><option>투룸</option><option>쓰리룸+</option></select></FormGroup>
                <FormGroup label="거래 방식">
                  <div className="flex flex-wrap gap-2 sm:gap-6 mt-1 sm:mt-3">
                    {['매매', '전세', '월세'].map(type => (
                      <label key={type} className="flex-1 sm:flex-none flex items-center justify-center gap-2 cursor-pointer bg-slate-50 px-3 sm:px-4 py-2.5 sm:py-2 rounded-lg border border-slate-200 hover:bg-blue-50 transition-colors"><input type="radio" name="transactionType" value={type} checked={formData.transactionType === type} onChange={handleChange} className="w-4 h-4 text-blue-600" /><span className="text-xs sm:text-sm font-bold text-slate-700">{type}</span></label>
                    ))}
                  </div>
                </FormGroup>
              </div>
            </div>

            <div className="bg-white p-5 sm:p-8 rounded-2xl shadow-sm border border-slate-200">
              <h3 className="text-lg sm:text-xl font-bold text-slate-800 mb-4 sm:mb-6 pb-3 sm:pb-4 border-b border-slate-100 flex items-center gap-2"><UserCircle className="w-5 h-5 sm:w-6 sm:h-6 text-blue-500" /> 소유자 정보</h3>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <FormGroup label="소유자 이름"><input type="text" name="ownerName" value={formData.ownerName || ''} onChange={handleChange} className="form-input w-full p-2.5 sm:p-3 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm sm:text-base" placeholder="홍길동" /></FormGroup>
                  <FormGroup label="전화번호"><input type="tel" name="ownerPhone" value={formData.ownerPhone || ''} onChange={handleChange} className="form-input w-full p-2.5 sm:p-3 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm sm:text-base" placeholder="010-0000-0000" /></FormGroup>
              </div>
            </div>

            <div className="bg-white p-5 sm:p-8 rounded-2xl shadow-sm border border-slate-200">
               <h3 className="text-lg sm:text-xl font-bold text-slate-800 mb-4 sm:mb-6 pb-3 sm:pb-4 border-b border-slate-100 flex items-center gap-2"><Building2 className="w-5 h-5 sm:w-6 sm:h-6 text-blue-500" /> 건물 정보</h3>
               <div className="grid grid-cols-1 md:grid-cols-2 gap-x-4 gap-y-4 sm:gap-y-6">
                   <FormGroup label="용도지역"><input type="text" name="zoning" value={formData.zoning || ''} onChange={handleChange} className="form-input w-full p-2.5 sm:p-3 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm sm:text-base" placeholder="예: 일반상업지역" /></FormGroup>
                   <FormGroup label="대지면적 (㎡)">
                      <div className="relative"><input type="number" name="landArea" value={formData.landArea || ''} onChange={handleChange} className="form-input w-full p-2.5 sm:p-3 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm sm:text-base" placeholder="예: 330" />{formData.landArea && (<span className="absolute -bottom-5 sm:-bottom-6 left-1 text-[10px] sm:text-xs text-blue-600 font-bold">{getExactPyeong(formData.landArea)}평</span>)}</div>
                   </FormGroup>
                   <FormGroup label="연면적 (㎡)">
                      <div className="relative"><input type="number" name="totalFloorArea" value={formData.totalFloorArea || ''} onChange={handleChange} className="form-input w-full p-2.5 sm:p-3 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm sm:text-base" placeholder="예: 1500" />{formData.totalFloorArea && (<span className="absolute -bottom-5 sm:-bottom-6 left-1 text-[10px] sm:text-xs text-blue-600 font-bold">{getExactPyeong(formData.totalFloorArea)}평</span>)}</div>
                   </FormGroup>
                   <FormGroup label="건축면적 (㎡)">
                      <div className="relative"><input type="number" name="buildingArea" value={formData.buildingArea || ''} onChange={handleChange} className="form-input w-full p-2.5 sm:p-3 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm sm:text-base" placeholder="예: 198" />{formData.buildingArea && (<span className="absolute -bottom-5 sm:-bottom-6 left-1 text-[10px] sm:text-xs text-blue-600 font-bold">{getExactPyeong(formData.buildingArea)}평</span>)}</div>
                   </FormGroup>
                   <div className="grid grid-cols-2 gap-4">
                     <FormGroup label="건폐율 (%)">
                         <div className="relative"><input type="number" name="buildingCoverage" value={formData.buildingCoverage || ''} onChange={handleChange} className="form-input w-full p-2.5 sm:p-3 pr-6 sm:pr-8 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm sm:text-base" placeholder="예: 60" /><span className="absolute right-2 sm:right-3 top-1/2 -translate-y-1/2 text-slate-500 font-bold text-xs sm:text-base">%</span></div>
                     </FormGroup>
                     <FormGroup label="용적률 (%)">
                         <div className="relative"><input type="number" name="floorAreaRatio" value={formData.floorAreaRatio || ''} onChange={handleChange} className="form-input w-full p-2.5 sm:p-3 pr-6 sm:pr-8 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm sm:text-base" placeholder="예: 250" /><span className="absolute right-2 sm:right-3 top-1/2 -translate-y-1/2 text-slate-500 font-bold text-xs sm:text-base">%</span></div>
                     </FormGroup>
                   </div>
                   <div className="grid grid-cols-2 gap-4">
                     <FormGroup label="지하 층수"><input type="number" name="floorUnderground" value={formData.floorUnderground || ''} onChange={handleChange} className="form-input w-full p-2.5 sm:p-3 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm sm:text-base" placeholder="예: 1" /></FormGroup>
                     <FormGroup label="지상 층수"><input type="number" name="floorGround" value={formData.floorGround || ''} onChange={handleChange} className="form-input w-full p-2.5 sm:p-3 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm sm:text-base" placeholder="예: 5" /></FormGroup>
                   </div>
                   <div className="grid grid-cols-2 gap-4">
                     <FormGroup label="E/V 대수"><input type="number" name="elevators" value={formData.elevators || ''} onChange={handleChange} className="form-input w-full p-2.5 sm:p-3 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm sm:text-base" placeholder="예: 1" /></FormGroup>
                     <FormGroup label="주차 대수"><input type="number" name="parking" value={formData.parking || ''} onChange={handleChange} className="form-input w-full p-2.5 sm:p-3 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm sm:text-base" placeholder="예: 12" /></FormGroup>
                   </div>
                   <div className="col-span-1 md:col-span-2">
                       <FormGroup label="준공년도 (또는 사용승인일)"><input type="text" name="completionYear" value={formData.completionYear || ''} onChange={handleChange} className="form-input w-full p-2.5 sm:p-3 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm sm:text-base" placeholder="예: 2015-08-20" /></FormGroup>
                   </div>
               </div>
            </div>

            <div className="bg-white p-5 sm:p-8 rounded-2xl shadow-sm border border-slate-200">
              <h3 className="text-lg sm:text-xl font-bold text-slate-800 mb-4 sm:mb-6 pb-3 sm:pb-4 border-b border-slate-100 flex items-center gap-2"><Banknote className="w-5 h-5 sm:w-6 sm:h-6 text-blue-500" /> 매매가 정보</h3>
              <div className="max-w-xl">
                <FormGroup label="매매가 (단위: 만원)">
                  <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-2 sm:gap-4">
                    <input type="number" name="sale" value={formData.sale || ''} onChange={handleChange} className="flex-[1.5] p-3 sm:p-4 border border-slate-300 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-right text-lg sm:text-xl font-bold" placeholder="예: 50000" />
                    <div className="flex-1 text-right text-base sm:text-lg font-extrabold text-blue-600 bg-blue-50 py-3 sm:py-4 px-4 rounded-xl border border-blue-100 truncate shadow-sm">{formatKoreanCurrency(formData.sale) || '0원'}</div>
                  </div>
                </FormGroup>
              </div>
            </div>

            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 sm:p-8">
              <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 sm:mb-6 border-b border-slate-100 pb-3 sm:pb-4 gap-3 sm:gap-0">
                <h3 className="text-lg sm:text-xl font-bold text-slate-800">층별 현황 (보증금/월세/관리비)</h3>
                <button type="button" onClick={addFloor} className="w-full sm:w-auto px-5 py-2.5 bg-blue-600 text-white rounded-xl font-bold text-sm hover:bg-blue-700 transition-colors shadow-sm">+ 층 추가</button>
              </div>
              <div className="space-y-4">
                {formData.floorDetails.map((f, i) => (
                  <div key={f.id} className="flex flex-col md:flex-row items-start gap-3 sm:gap-4 p-3 sm:p-4 bg-slate-50 rounded-xl border border-slate-200">
                    <div className="flex w-full md:w-auto gap-3">
                      <FloorTextInput value={f.floor} autoFocus={f.isNew} onChange={(e) => handleFloorChange(f.id, 'floor', e.target.value)} onBlur={sortFloorDetails} />
                      <CompanyTextInput value={f.companyName} onChange={(e) => handleFloorChange(f.id, 'companyName', e.target.value)} />
                      <div className="md:hidden shrink-0 ml-auto"><button type="button" onClick={() => setFormData({...formData, floorDetails: formData.floorDetails.filter(item => item.id !== f.id)})} className="p-2.5 text-red-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors border border-red-100 bg-white shadow-sm" title="삭제"><Trash2 className="w-5 h-5" /></button></div>
                    </div>
                    <div className="flex flex-col sm:flex-row w-full gap-3 sm:gap-4">
                      <FloorMoneyInput label="보증금" value={f.deposit} onChange={(e) => handleFloorChange(f.id, 'deposit', e.target.value)} />
                      <FloorMoneyInput label="월세" value={f.rent} onChange={(e) => handleFloorChange(f.id, 'rent', e.target.value)} />
                      <FloorMoneyInput label="관리비" value={f.maintenance} onChange={(e) => handleFloorChange(f.id, 'maintenance', e.target.value)} />
                    </div>
                    <div className="hidden md:block pt-1 shrink-0"><button type="button" onClick={() => setFormData({...formData, floorDetails: formData.floorDetails.filter(item => item.id !== f.id)})} className="p-2.5 text-red-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors border border-red-100 bg-white shadow-sm mt-0.5" title="삭제"><Trash2 className="w-5 h-5" /></button></div>
                  </div>
                ))}
                <div className="flex flex-col md:flex-row items-start gap-3 sm:gap-4 p-3 sm:p-4 bg-blue-50 rounded-xl border border-blue-200 mt-2">
                  <div className="w-full md:w-28 shrink-0 flex items-center justify-center pt-1 md:pt-3"><span className="font-bold text-blue-800 text-sm">전체 합계</span></div>
                  <div className="flex flex-col sm:flex-row w-full gap-3 sm:gap-4">
                    <FloorMoneyInputReadOnly label="총 보증금" value={totals.deposit} />
                    <FloorMoneyInputReadOnly label="총 월세" value={totals.rent} />
                    <FloorMoneyInputReadOnly label="총 관리비" value={totals.maintenance} />
                  </div>
                  <div className="hidden md:block w-10 shrink-0"></div>
                </div>
              </div>
            </div>

            <div className="flex flex-col gap-4 sm:gap-6">
              <div className="bg-white p-5 sm:p-8 rounded-2xl shadow-sm border border-slate-200">
                <h3 className="text-lg sm:text-xl font-bold text-slate-800 mb-4 sm:mb-6 pb-3 sm:pb-4 border-b border-slate-100 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 sm:gap-0">
                  <span className="flex items-center gap-2"><ImageIcon className="w-5 h-5 sm:w-6 sm:h-6 text-blue-500" /> 사진 첨부</span>
                  <label className="w-full sm:w-auto text-center text-sm px-4 py-2.5 sm:py-2 bg-slate-100 text-slate-700 rounded-lg hover:bg-slate-200 font-bold transition-colors cursor-pointer flex items-center justify-center gap-2"><Upload className="w-4 h-4" /> PC/폰에서 찾기<input type="file" multiple accept="image/*" onChange={handleImageUpload} className="hidden" /></label>
                </h3>
                {formData.images && formData.images.length > 0 ? (

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4"><FormGroup label="이름"><input type="text" name="name" onChange={handleChange} className="form-input w-full p-2.5 md:p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm md:text-base" placeholder="홍길동" /></FormGroup><FormGroup label="소속"><input type="text" name="department" onChange={handleChange} className="form-input w-full p-2.5 md:p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm md:text-base" placeholder="예: 영업1팀" /></FormGroup></div>
            <FormGroup label="전화번호"><input type="tel" name="phone" onChange={handleChange} className="form-input w-full p-2.5 md:p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm md:text-base" placeholder="010-0000-0000" /></FormGroup>
            <h3 className="text-base md:text-lg font-bold text-slate-800 mb-4 md:mb-5 pb-2 md:pb-3 pt-2 md:pt-4 border-b border-slate-100 flex items-center gap-2"><Lock className="w-4 h-4 md:w-5 md:h-5 text-blue-500" /> 접속 계정 정보</h3>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4"><FormGroup label="아이디"><input type="text" name="loginId" onChange={handleChange} className="form-input w-full p-2.5 md:p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm md:text-base" placeholder="아이디 입력" /></FormGroup><FormGroup label="비밀번호"><input type="password" name="password" onChange={handleChange} className="form-input w-full p-2.5 md:p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm md:text-base" placeholder="비밀번호 입력" /></FormGroup></div>
            <div className="flex pt-4"><button type="submit" disabled={isSubmitting} className={`w-full py-3.5 bg-blue-600 text-white rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-blue-700 shadow-sm text-base ${isSubmitting ? 'opacity-50 cursor-not-allowed' : ''}`}><Save className="w-5 h-5" /> {isSubmitting ? '처리 중...' : '사원 등록'}</button></div>
          </form>
        </div>
      );
    }

    function CustomerListView({ customers }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden w-full">
          <div className="p-4 md:p-5 border-b border-slate-200 flex justify-between items-center bg-slate-50/50">
            <h3 className="font-semibold text-slate-800 flex items-center gap-2 text-sm md:text-base"><Users className="w-5 h-5 text-blue-600" /> 등록된 매수자 <span className="text-blue-600 bg-blue-100 px-2 py-0.5 rounded-full text-xs">{customers.length}</span></h3>
          </div>
          <div className="overflow-x-auto w-full">
            <table className="w-full text-left border-collapse whitespace-nowrap min-w-[600px]">
              <thead>
                <tr className="bg-slate-50 border-b border-slate-200 text-[11px] md:text-xs uppercase tracking-wider text-slate-500"><th className="p-3 md:p-4 font-medium">이름</th><th className="p-3 md:p-4 font-medium">전화번호</th><th className="p-3 md:p-4 font-medium text-right">투자금액(만원)</th><th className="p-3 md:p-4 font-medium">희망 지역</th><th className="p-3 md:p-4 font-medium">구매사유</th></tr>
              </thead>
              <tbody className="divide-y divide-slate-100 text-xs md:text-sm">
                {customers.map(cust => (
                  <tr key={cust.id} className="hover:bg-blue-50/50 transition-colors"><td className="p-3 md:p-4 font-bold text-slate-800">{cust.name}</td><td className="p-3 md:p-4 text-slate-600">{cust.phone}</td><td className="p-3 md:p-4 text-right font-bold text-red-600">{formatKoreanCurrency(cust.budget)}</td><td className="p-3 md:p-4 text-slate-600">{cust.region}</td><td className="p-3 md:p-4 text-slate-600 truncate max-w-[150px] md:max-w-[200px]">{cust.reason}</td></tr>
                ))}

            </table>

        </div>

    function CustomerFormView({ onBack, onSave }) {
      const [formData, setFormData] = useState({ name: '', phone: '', budget: '', region: '', reason: '' });
      const [isSubmitting, setIsSubmitting] = useState(false);

      const handleChange = (e) => setFormData({ ...formData, [e.target.name]: e.target.value });
      
      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!formData.name) return alert("이름을 입력해주세요.");
        if (!formData.phone) return alert("전화번호를 입력해주세요.");
        if (!formData.budget) return alert("투자금액을 입력해주세요.");

        setIsSubmitting(true);
        await onSave(formData);
        setIsSubmitting(false);
      };

      return (
        <div className="max-w-2xl mx-auto pb-10">
          <div className="flex justify-between items-center mb-6"><h2 className="text-xl md:text-2xl font-bold text-slate-800">신규 손님 등록</h2><button type="button" onClick={onBack} className="text-slate-500 hover:text-slate-800 text-sm font-medium bg-slate-200 px-3 py-1.5 rounded-lg">취소 및 돌아가기</button></div>
          <form onSubmit={handleSubmit} className="space-y-6 bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200">
            <h3 className="text-base md:text-lg font-bold text-slate-800 mb-4 md:mb-5 pb-2 md:pb-3 border-b border-slate-100 flex items-center gap-2"><Users className="w-4 h-4 md:w-5 md:h-5 text-blue-500" /> 손님(매수자) 정보</h3>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4"><FormGroup label="이름"><input type="text" name="name" onChange={handleChange} className="form-input w-full p-2.5 md:p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm md:text-base" placeholder="김투자" /></FormGroup><FormGroup label="전화번호"><input type="tel" name="phone" onChange={handleChange} className="form-input w-full p-2.5 md:p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm md:text-base" placeholder="010-0000-0000" /></FormGroup></div>
            <FormGroup label="금액 (단위: 만원)">
              <div className="flex items-center gap-2">
                <input type="number" name="budget" onChange={handleChange} className="form-input flex-1 p-2.5 md:p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-right text-sm md:text-base font-bold" placeholder="예: 50000" />
                <div className="w-32 sm:w-40 text-right text-sm sm:text-base font-bold text-blue-600 bg-blue-50 py-2.5 sm:py-3 px-3 rounded-lg border border-blue-100 truncate shadow-sm">
                  {formatKoreanCurrency(formData.budget) || '0원'}
                </div>
              </div>
            </FormGroup>
            <FormGroup label="지역"><input type="text" name="region" onChange={handleChange} className="form-input w-full p-2.5 md:p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm md:text-base" placeholder="예: 성남시 분당구 일대" /></FormGroup>
            <FormGroup label="구매사유"><textarea name="reason" onChange={handleChange} rows={3} className="form-input w-full p-2.5 md:p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none resize-none text-sm md:text-base" placeholder="예: 사옥 이전, 임대수익 목적 등" /></FormGroup>

        </div>
      );

    function CalendarView({ currentUser, properties, memos, setMemos, onDbError }) {
      const [date, setDate] = useState(new Date());
      const [editingDate, setEditingDate] = useState(null);
      const [newMemo, setNewMemo] = useState('');

      const year = date.getFullYear();
      const month = date.getMonth();

      const handleAddMemo = (e, dayStr) => { 
        e.stopPropagation(); 
        setEditingDate(dayStr); 
        setNewMemo(''); 
      };

      const saveMemo = async (e, dayStr) => { 
        e.stopPropagation(); 
        if (newMemo.trim()) {
          const newMemoObj = { id: `M-${Date.now()}`, user_id: currentUser.loginId, dateStr: dayStr, text: newMemo.trim() };
          
          setMemos(prev => [...prev, newMemoObj]);
          setEditingDate(null); 

          const { error } = await supabase.from('crm_memos').insert([newMemoObj]);
          if (error && onDbError) onDbError(error, 'crm_memos');
        }
      };

      const deleteMemo = async (e, id) => { 
        e.stopPropagation(); 
        setMemos(prev => prev.filter(m => m.id !== id)); 
        
        const { error } = await supabase.from('crm_memos').delete().eq('id', id);
        if (error && onDbError) onDbError(error, 'crm_memos');
      };

      const renderDays = () => {
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const firstDay = new Date(year, month, 1).getDay();
        const days = [];
        
        for (let i = 0; i < firstDay; i++) days.push(<div key={`empty-${i}`} className="bg-slate-50 border border-slate-100 rounded-lg"></div>);
        for (let d = 1; d <= daysInMonth; d++) {
          const dayStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
          const isToday = new Date().toDateString() === new Date(year, month, d).toDateString();
          const currentDayOfWeek = new Date(year, month, d).getDay();
          const dayColor = currentDayOfWeek === 0 ? 'text-red-500' : currentDayOfWeek === 6 ? 'text-blue-500' : 'text-slate-700';

          const currentMemos = memos.filter(m => m.dateStr === dayStr && m.user_id === currentUser.loginId);
          const completedCount = properties.filter(p => p.user_id === currentUser.loginId && p.date === dayStr && p.status === '완료').length;

          days.push(
            <div key={d} onClick={(e) => { if(!editingDate) handleAddMemo(e, dayStr) }} className={`group relative min-h-[100px] md:min-h-[130px] p-1 md:p-2 border border-slate-100 rounded-lg cursor-pointer hover:border-blue-300 transition-colors ${isToday ? 'bg-blue-50/30 border-blue-200' : 'bg-white'}`}>
              <div className="flex justify-between items-start mb-1">
                <div className={`text-xs md:text-sm font-semibold ${dayColor} ${isToday ? 'font-extrabold underline' : ''}`}>{d}</div>
                <button type="button" onClick={(e) => handleAddMemo(e, dayStr)} className="w-5 h-5 rounded-full hover:bg-slate-100 text-slate-300 hover:text-blue-600 flex items-center justify-center opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-all"><Plus className="w-3 h-3" /></button>
              </div>
              
              <div className="space-y-1 flex flex-col">
                {currentMemos.map((memo) => (
                  <div key={memo.id} className="flex flex-col sm:flex-row justify-between items-start sm:items-center text-[10px] md:text-[11px] bg-blue-50 text-blue-700 pl-1.5 pr-1 py-1 rounded border border-blue-100 hover:bg-blue-100 transition-colors group/item gap-1 sm:gap-0">
                    <span className="truncate w-full sm:flex-1" title={memo.text}>{memo.text}</span>
                    <button type="button" onClick={(e) => deleteMemo(e, memo.id)} className="text-slate-400 hover:text-red-500 p-0.5 ml-auto sm:ml-1 opacity-100 md:opacity-0 md:group-hover/item:opacity-100 transition-opacity"><Trash2 className="w-3 h-3" /></button>
                  </div>
                ))}

                {completedCount > 0 && (
                  <div className="inline-flex items-center gap-1 text-[10px] md:text-[11px] font-bold bg-red-50 text-red-600 px-1.5 py-1 rounded border border-red-100 mt-0.5 w-max">
                    <span className="w-1.5 h-1.5 rounded-full bg-red-500"></span>
                    완료: {completedCount}건
                  </div>
                )}

                {editingDate === dayStr && (
                  <div className="mt-1" onClick={e => e.stopPropagation()}>
                    <input autoFocus type="text" value={newMemo} onChange={e => setNewMemo(e.target.value)} onKeyDown={e => e.key === 'Enter' && saveMemo(e, dayStr)} placeholder="일정 입력..." className="w-full text-[10px] md:text-xs p-1 md:p-1.5 border border-blue-300 rounded outline-none" />
                  </div>
                )}
              </div>
            </div>
          );
        }
        return days;
      };

      return (
        <div className="bg-white p-6 rounded-2xl shadow h-full flex flex-col">
          <div className="flex justify-between items-center mb-6">
            <h2 className="text-xl font-bold"><CalendarIcon className="w-6 h-6 inline text-blue-600 mr-2"/>개인 캘린더</h2>
            <div className="flex items-center gap-4">
              <button type="button" onClick={() => setDate(new Date(year, month - 1, 1))} className="p-2 hover:bg-slate-100 rounded-full"><ChevronLeft className="w-5 h-5"/></button>
              <span className="font-bold text-lg">{year}년 {month + 1}월</span>
              <button type="button" onClick={() => setDate(new Date(year, month + 1, 1))} className="p-2 hover:bg-slate-100 rounded-full"><ChevronRight className="w-5 h-5"/></button>
            </div>
          </div>
          <div className="grid grid-cols-7 gap-2 mb-2 text-center font-bold text-sm">
            <div className="text-red-500">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div className="text-blue-500">토</div>
          </div>
          <div className="grid grid-cols-7 gap-2 flex-1 overflow-y-auto">{renderDays()}</div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
