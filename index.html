<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>빌딩탭 CRM</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase 8.x CDN -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f8fafc; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    input, textarea, button, select, a { -webkit-tap-highlight-color: transparent; }
    input[type="number"]::-webkit-outer-spin-button, input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }
  </style>
</head>
<body>
  <div id="root">
    <!-- 초기 렌더링용 로딩 바 (React가 뜨면 즉시 사라짐) -->
    <div style="display:flex; height:100vh; align-items:center; justify-content:center; color:#64748b; font-weight:bold;">
      <i class="fas fa-spinner fa-spin" style="margin-right:10px;"></i> 시스템 부팅 중...
    </div>
  </div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef } = React;

    // =====================================================================
    // [1] FIREBASE 클라우드 데이터베이스 초기화
    // =====================================================================
    let firebaseConfig = { projectId: "demo-project" };
    try {
      if (typeof __firebase_config !== 'undefined' && __firebase_config) {
        firebaseConfig = JSON.parse(__firebase_config);
      }
    } catch (e) { 
      console.error("Firebase config error", e); 
    }

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    
    const auth = firebase.auth();
    const db = firebase.firestore();
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

    const getCollection = (colName) => db.collection('artifacts').doc(appId).collection('public').doc('data').collection(colName);

    // =====================================================================
    // [2] 유틸리티 함수 & 아이콘 맵핑
    // =====================================================================
    const getYield = (sale, deposit, rent) => {
      const s = Number(sale) || 0; 
      const d = Number(deposit) || 0; 
      const r = Number(rent) || 0;
      if (s === 0 || s <= d || r === 0) return '0.0';
      return (((r * 12) / (s - d)) * 100).toFixed(1);
    };

    const getPricePerPyeong = (sale, landArea) => {
      if (!sale || !landArea) return 0;
      return Math.round(sale / (landArea * 0.3025));
    };

    const formatKoreanCurrency = (val) => {
      let num = Math.round(Number(val) || 0);
      if (num === 0) return '0원';
      const eok = Math.floor(num / 10000); 
      const man = num % 10000;
      let result = '';
      if (eok > 0) result += `${eok}억 `;
      if (man > 0) result += `${man.toLocaleString()}만`;
      return result.trim() + '원';
    };

    const STATUS_OPTIONS = ['보류', '완료', '매매'];
    
    const STATUS_FORM_COLORS = { 
      '보류': 'bg-white text-slate-700 shadow-[0_2px_8px_rgba(0,0,0,0.08)]', 
      '완료': 'bg-red-500 text-white shadow-[0_4px_12px_rgba(239,68,68,0.4)]', 
      '매매': 'bg-blue-500 text-white shadow-[0_4px_12px_rgba(59,130,246,0.4)]' 
    };
    
    const STATUS_BADGE_COLORS = { 
      '보류': 'bg-slate-200 text-slate-600', 
      '완료': 'bg-red-500 text-white shadow-sm', 
      '매매': 'bg-slate-100 text-slate-600 border border-slate-200' 
    };

    const autoFormatAddress = (addr) => {
      if (!addr) return ''; 
      let s = addr.replace(/\s+/g, '');
      s = s.replace(/([가-힣]+[시도])([가-힣]+[구군시])/g, '$1 $2'); 
      s = s.replace(/([가-힣]+[구군시])([가-힣]+[동읍면로길])/g, '$1 $2'); 
      s = s.replace(/([가-힣]+[동읍면로길])(\d)/g, '$1 $2');
      return s.replace(/\s+/g, ' ').trim();
    };

    const getExactPyeong = (sqm) => ((Number(sqm) || 0) * 0.3025).toFixed(2);

    const Icon = ({ name, className }) => {
      let textClass = 'text-base';
      if (className?.includes('w-3')) textClass = 'text-xs'; 
      else if (className?.includes('w-4')) textClass = 'text-sm'; 
      else if (className?.includes('w-5')) textClass = 'text-lg'; 
      else if (className?.includes('w-6')) textClass = 'text-xl'; 
      else if (className?.includes('w-8')) textClass = 'text-3xl'; 
      else if (className?.includes('w-12')) textClass = 'text-5xl';
      
      const cleanClassName = (className || '').replace(/\bw-\d+\b/g, '').replace(/\bh-\d+\b/g, '').trim();
      return <i className={`fas ${name} ${textClass} ${cleanClassName} flex items-center justify-center`}></i>;
    };

    const Building2 = (p) => <Icon name="fa-building" {...p} />;
    const Users = (p) => <Icon name="fa-users" {...p} />;
    const Plus = (p) => <Icon name="fa-plus" {...p} />;
    const Search = (p) => <Icon name="fa-search" {...p} />;
    const MapPin = (p) => <Icon name="fa-map-marker-alt" {...p} />;
    const Banknote = (p) => <Icon name="fa-money-bill-wave" {...p} />;
    const Maximize = (p) => <Icon name="fa-expand-arrows-alt" {...p} />;
    const Car = (p) => <Icon name="fa-car" {...p} />;
    const List = (p) => <Icon name="fa-list" {...p} />;
    const ArrowLeft = (p) => <Icon name="fa-arrow-left" {...p} />;
    const Save = (p) => <Icon name="fa-save" {...p} />;
    const ImageIcon = (p) => <Icon name="fa-image" {...p} />;
    const CheckCircle2 = (p) => <Icon name="fa-check-circle" {...p} />;
    const FileText = (p) => <Icon name="fa-file-alt" {...p} />;
    const Trash2 = (p) => <Icon name="fa-trash-alt" {...p} />;
    const TrendingUp = (p) => <Icon name="fa-chart-line" {...p} />;
    const UserCircle = (p) => <Icon name="fa-user-circle" {...p} />;
    const Briefcase = (p) => <Icon name="fa-briefcase" {...p} />;
    const CalendarIcon = (p) => <Icon name="fa-calendar-alt" {...p} />;
    const ChevronLeft = (p) => <Icon name="fa-chevron-left" {...p} />;
    const ChevronRight = (p) => <Icon name="fa-chevron-right" {...p} />;
    const Phone = (p) => <Icon name="fa-phone" {...p} />;
    const User = (p) => <Icon name="fa-user" {...p} />;
    const ArrowUpCircle = (p) => <Icon name="fa-arrow-circle-up" {...p} />;
    const Upload = (p) => <Icon name="fa-upload" {...p} />;
    const XCircle = (p) => <Icon name="fa-times-circle" {...p} />;
    const Lock = (p) => <Icon name="fa-lock" {...p} />;
    const ShieldCheck = (p) => <Icon name="fa-shield-alt" {...p} />;
    const MapIcon = (p) => <Icon name="fa-map" {...p} />;
    const CalendarDays = (p) => <Icon name="fa-calendar-day" {...p} />;
    const Percent = (p) => <Icon name="fa-percentage" {...p} />;
    const Bars = (p) => <Icon name="fa-bars" {...p} />;

    // =====================================================================
    // [3] 공통 UI 컴포넌트
    // =====================================================================
    function SidebarItem({ icon, label, active, onClick }) {
      return (
        <button onClick={onClick} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-colors ${active ? 'bg-blue-600 text-white' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}>
          {React.cloneElement(icon, { className: 'w-5 h-5' })} {label}
        </button>
      );
    }
    
    function FormGroup({ label, children }) { 
      return (
        <div className="flex flex-col gap-1.5 w-full">
          <label className="text-sm font-semibold text-slate-700">{label}</label>
          {children}
        </div>
      ); 
    }
    
    function SpecRow({ icon, label, value }) {
      return (
        <div className="flex flex-col sm:flex-row sm:items-center justify-between p-4 border-b border-slate-50 last:border-0 hover:bg-slate-50 transition-colors gap-1 sm:gap-4">
          <div className="flex items-center gap-3 text-slate-500 text-sm shrink-0">
            {React.cloneElement(icon, { className: 'w-4 h-4 text-slate-400' })} {label}
          </div>
          <div className="font-semibold text-slate-800 text-sm sm:text-right break-all sm:break-normal">{value}</div>
        </div>
      );
    }
    
    function FloorMoneyInput({ label, value, onChange }) {
      return (
        <div className="flex-1 w-full min-w-[120px]">
          <div className="flex items-center border border-slate-300 rounded-lg bg-white focus-within:border-blue-500 focus-within:ring-1 overflow-hidden shadow-sm transition-all">
            <span className="bg-slate-100 text-xs font-bold text-slate-600 px-2 py-3 sm:py-2 border-r border-slate-200 whitespace-nowrap">{label}</span>
            <input type="number" value={value || ''} onChange={onChange} className="w-full py-3 sm:py-2 px-2 text-right text-sm font-bold outline-none bg-transparent" placeholder="0" />
            <span className="text-xs font-bold text-slate-500 pr-2 pl-1 whitespace-nowrap">만원</span>
          </div>
          <span className="text-[11px] text-blue-600 font-bold text-right block pr-1 min-h-[16px] mt-0.5">{formatKoreanCurrency(value)}</span>
        </div>
      );
    }
    
    function FloorTextInput({ value, onChange, onBlur, autoFocus }) {
      return (
        <div className="w-full sm:w-20 shrink-0">
          <div className="flex items-center border border-slate-300 rounded-lg bg-white focus-within:border-blue-500 focus-within:ring-1 overflow-hidden shadow-sm transition-all">
            <span className="bg-slate-100 text-xs font-bold text-slate-600 px-2 py-3 sm:py-2 border-r border-slate-200 whitespace-nowrap sm:hidden md:inline-block">층수</span>
            <input type="text" value={value || ''} onChange={onChange} onBlur={onBlur} autoFocus={autoFocus} className="w-full py-3 sm:py-2 px-2 text-center text-sm font-bold outline-none bg-transparent" placeholder="1층" />
          </div>
          <span className="text-sm text-transparent block min-h-[16px] mt-0.5 hidden sm:block">.</span>
        </div>
      );
    }
    
    function CompanyTextInput({ value, onChange }) {
      return (
        <div className="flex-1 min-w-[140px]">
          <div className="flex items-center border border-slate-300 rounded-lg bg-white focus-within:border-blue-500 focus-within:ring-1 overflow-hidden shadow-sm transition-all">
            <span className="bg-slate-100 text-xs font-bold text-slate-600 px-2 py-3 sm:py-2 border-r border-slate-200 whitespace-nowrap">업체명</span>
            <input type="text" value={value || ''} onChange={onChange} className="w-full py-3 sm:py-2 px-2 text-sm font-bold outline-none bg-transparent" placeholder="상호명/비고" />
          </div>
          <span className="text-sm text-transparent block min-h-[16px] mt-0.5 hidden sm:block">.</span>
        </div>
      );
    }
    
    function FloorMoneyInputReadOnly({ label, value }) {
      return (
        <div className="flex-1 w-full min-w-[120px]">
          <div className="flex items-center border border-blue-200 rounded-lg bg-white overflow-hidden shadow-sm transition-all">
            <span className="bg-blue-100 text-xs font-bold text-blue-800 px-2 py-3 sm:py-2 border-r border-blue-200 whitespace-nowrap">{label}</span>
            <div className="w-full py-3 sm:py-2 px-2 text-right text-sm font-extrabold text-slate-900 bg-transparent truncate">{value.toLocaleString()}</div>
            <span className="text-xs font-bold text-slate-500 pr-2 pl-1 whitespace-nowrap">만원</span>
          </div>
          <span className="text-[11px] text-blue-600 font-bold text-right block pr-1 min-h-[16px] mt-0.5">{formatKoreanCurrency(value)}</span>
        </div>
      );
    }

    // =====================================================================
    // [4] 메인 APP 컴포넌트
    // =====================================================================
    function App() {
      const [fbUser, setFbUser] = useState(null); 
      const [isDbReady, setIsDbReady] = useState(false); 

      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [currentUser, setCurrentUser] = useState(() => {
        const storedUser = localStorage.getItem('crm_loggedInUser');
        return storedUser ? JSON.parse(storedUser) : null;
      });

      const [properties, setProperties] = useState([]);
      const [employees, setEmployees] = useState([]);
      const [customers, setCustomers] = useState([]);
      const [myProperties, setMyProperties] = useState([]);

      const [currentView, setCurrentView] = useState('list'); 
      const [selectedProperty, setSelectedProperty] = useState(null);
      const [activeTab, setActiveTab] = useState('properties');
      
      const [currentEmployeeView, setCurrentEmployeeView] = useState('list');
      const [currentCustomerView, setCurrentCustomerView] = useState('list');

      const [searchTerm, setSearchTerm] = useState('');
      const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

      // 1. Firebase 로그인 초기화 (권한 에러 및 무한 로딩 해결 핵심)
      useEffect(() => {
        let unsubscribe = () => {};

        const initAuth = async () => {
          try {
            // 커스텀 토큰 혹은 익명 로그인 진행
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await auth.signInWithCustomToken(__initial_auth_token);
            } else {
              await auth.signInAnonymously();
            }
            
            // 인증이 '성공'한 뒤에만 사용자 상태 추적 및 DB 통신 개시
            unsubscribe = auth.onAuthStateChanged(user => {
              setFbUser(user);
              setIsDbReady(true);
            });
          } catch(e) { 
            console.error("Firebase Auth 에러 발생:", e); 
            setIsDbReady(true); // 에러가 나도 무한로딩에 빠지지 않게 화면은 띄움
          }
        };
        
        initAuth();
        return () => unsubscribe();
      }, []);

      // 2. 앱 내 자체 로그인 유지 확인
      useEffect(() => {
        if (currentUser) setIsAuthenticated(true);
      }, [currentUser]);

      // 3. 서버 데이터 실시간 구독 (인증 완료 후에만 접근하여 에러 방지)
      useEffect(() => {
        if (!fbUser) return; 

        const unsubUsers = getCollection('crm_users').onSnapshot(
          snapshot => setEmployees(snapshot.docs.map(d => d.data())), 
          err => console.error("사원 데이터 불러오기 에러:", err)
        );

        const unsubProps = getCollection('crm_properties').onSnapshot(
          snapshot => setProperties(snapshot.docs.map(d => d.data())), 
          err => console.error("물건 데이터 불러오기 에러:", err)
        );

        const unsubCusts = getCollection('crm_customers').onSnapshot(
          snapshot => setCustomers(snapshot.docs.map(d => d.data())), 
          err => console.error("고객 데이터 불러오기 에러:", err)
        );

        return () => { unsubUsers(); unsubProps(); unsubCusts(); };
      }, [fbUser]);

      // 4. 내 물건 전용 정리
      useEffect(() => {
        if (!currentUser) return;
        setMyProperties(properties.filter(p => p.user_id === currentUser.loginId));
      }, [properties, currentUser]);

      useEffect(() => {
        const handleClickOutside = (e) => {
          if (isMobileMenuOpen && e.target.closest('#sidebar-overlay')) setIsMobileMenuOpen(false);
        };
        document.addEventListener('click', handleClickOutside);
        return () => document.removeEventListener('click', handleClickOutside);
      }, [isMobileMenuOpen]);

      const handleAuth = async (type, data) => {
        if (type === 'login') {
          const user = employees.find(emp => emp.loginId === data.loginId && emp.password === data.password);
          if (user) {
            localStorage.setItem('crm_loggedInUser', JSON.stringify(user));
            setCurrentUser(user);
            setIsAuthenticated(true);
            return { success: true };
          }
          return { success: false, message: '아이디 또는 비밀번호가 일치하지 않습니다.' };
        } 
        if (type === 'signup') {
          const exists = employees.some(emp => emp.loginId === data.loginId);
          if (exists) return { success: false, message: '이미 존재하는 아이디입니다.' };
          
          const newUser = {
            id: `E-${Date.now()}`,
            loginId: data.loginId,
            password: data.password,
            name: data.name,
            phone: data.phone,
            department: data.department || '신규 사원',
            date: new Date().toISOString().split('T')[0]
          };
          
          try {
            await getCollection('crm_users').doc(newUser.id).set(newUser);
            localStorage.setItem('crm_loggedInUser', JSON.stringify(newUser));
            setCurrentUser(newUser);
            setIsAuthenticated(true);
            return { success: true };
          } catch(err) {
            return { success: false, message: '서버 등록 중 오류가 발생했습니다. 나중에 다시 시도해주세요.' };
          }
        }
      };

      const handleLogout = () => {
        localStorage.removeItem('crm_loggedInUser');
        setIsAuthenticated(false);
        setCurrentUser(null);
        setIsMobileMenuOpen(false);
      };

      const handleSaveProperty = async (prop) => {
        const finalProp = { 
          ...prop, 
          id: prop.id || `P-${Date.now()}`,
          user_id: currentUser.loginId, 
          registrant: currentUser.name,
          registrantPhone: currentUser.phone,
          date: prop.date || new Date().toISOString().split('T')[0]
        };
        
        await getCollection('crm_properties').doc(finalProp.id).set(finalProp);

        setSelectedProperty(finalProp);
        setCurrentView('detail');
        
        const scrollArea = document.getElementById('main-scroll-area');
        if (scrollArea) scrollArea.scrollTo({ top: 0, behavior: 'auto' });
      };

      const handleUpdateProperty = async (prop) => {
        await getCollection('crm_properties').doc(prop.id).set(prop);
        setSelectedProperty(prop);
      };

      const handleDeleteProperty = async (propertyId) => {
        await getCollection('crm_properties').doc(propertyId).delete();
        setCurrentView('list');
        setSelectedProperty(null);
      };

      const changeTab = (tab) => {
        setActiveTab(tab);
        setSearchTerm('');
        setIsMobileMenuOpen(false); 
      };

      const filteredMyProperties = myProperties.filter(p => 
        p.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
        p.address.toLowerCase().includes(searchTerm.toLowerCase())
      );

      const filteredEmployees = employees.filter(e =>
        currentUser && e.loginId === currentUser.loginId &&
        (e.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
        e.department.toLowerCase().includes(searchTerm.toLowerCase()) ||
        e.loginId.toLowerCase().includes(searchTerm.toLowerCase()))
      );

      const filteredCustomers = customers.filter(c =>
        c.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
        c.region.toLowerCase().includes(searchTerm.toLowerCase())
      );

      // 로딩 화면 방어 로직 (DB 초기화가 안끝났으면 대기)
      if (!isDbReady) {
        return (
          <div className="flex flex-col h-screen items-center justify-center bg-slate-50 text-slate-500 font-bold text-lg">
            <Building2 className="w-10 h-10 mb-4 text-blue-500 animate-pulse" /> 
            서버와 통신 중입니다...
          </div>
        );
      }

      // 비로그인 화면
      if (!isAuthenticated) {
        return <AuthView onAuth={handleAuth} isDbEmpty={employees.length === 0} />;
      }

      return (
        <div className="flex flex-col md:flex-row h-screen bg-slate-50 font-sans text-slate-800">
          <div className="md:hidden flex items-center justify-between bg-slate-900 text-white p-4 z-30 shadow-md sticky top-0">
            <div className="flex items-center gap-2">
              <Building2 className="w-6 h-6 text-blue-400" />
              <h1 className="text-lg font-bold tracking-tight">빌딩탭</h1>
            </div>
            <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="p-2 -mr-2 text-slate-300 hover:text-white transition-colors">
              <Bars className="w-6 h-6" />
            </button>
          </div>

          {isMobileMenuOpen && <div id="sidebar-overlay" className="md:hidden fixed inset-0 bg-black/50 z-40"></div>}

          <aside className={`${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} md:translate-x-0 fixed md:static inset-y-0 left-0 z-50 w-64 bg-slate-900 text-white flex flex-col shadow-2xl md:shadow-xl transition-transform duration-300 ease-in-out`}>
            <div className="p-6 border-b border-slate-800 hidden md:block">
              <div className="flex items-center gap-3">
                <Building2 className="w-8 h-8 text-blue-400" />
                <h1 className="text-xl font-bold tracking-tight">빌딩탭</h1>
              </div>
              <p className="text-[11px] text-slate-400 mt-2">부동산 종합 관리 시스템 (개인용)</p>
            </div>
            
            <nav className="flex-1 p-4 space-y-2 overflow-y-auto mt-4 md:mt-0">
              <SidebarItem icon={<CalendarIcon />} label="개인 캘린더" active={activeTab === 'calendar'} onClick={() => changeTab('calendar')} />
              <SidebarItem icon={<List />} label="내 물건 관리" active={activeTab === 'properties'} onClick={() => { changeTab('properties'); setCurrentView('list'); }} />
              <SidebarItem icon={<Users />} label="고객 관리(매수자)" active={activeTab === 'customers'} onClick={() => { changeTab('customers'); setCurrentCustomerView('list'); }} />

    function PropertyListView({ properties, onViewDetail }) {
      const [statusFilter, setStatusFilter] = useState('전체');
      const [minPrice, setMinPrice] = useState('');
      const [maxPrice, setMaxPrice] = useState('');
      const [sortConfig, setSortConfig] = useState({ key: 'date', direction: 'desc' });

      const handleSort = (key) => {
        let direction = 'desc';
        if (sortConfig.key === key && sortConfig.direction === 'desc') direction = 'asc';
        setSortConfig({ key, direction });
      };

      const filteredAndSortedProperties = useMemo(() => {
        let result = [...properties];
        if (statusFilter !== '전체') result = result.filter(p => (p.status || '보류') === statusFilter);

        if (minPrice !== '' || maxPrice !== '') {
          const min = minPrice !== '' ? Number(minPrice) * 10000 : 0;
          const max = maxPrice !== '' ? Number(maxPrice) * 10000 : Infinity;
          result = result.filter(p => {
            const priceVal = p.transactionType === '매매' ? (p.price?.sale || 0) : (p.price?.deposit || 0);
            return priceVal >= min && priceVal <= max;
          });
        }

        result.sort((a, b) => {
          if (sortConfig.key === 'date') {
            const dateA = new Date(a.date).getTime();
            const dateB = new Date(b.date).getTime();
            return sortConfig.direction === 'desc' ? dateB - dateA : dateA - dateB;
          } else if (sortConfig.key === 'yield') {
            const yieldA = Number(getYield(a.price?.sale, a.price?.deposit, a.price?.rent));
            const yieldB = Number(getYield(b.price?.sale, b.price?.deposit, b.price?.rent));
            return sortConfig.direction === 'desc' ? yieldB - yieldA : yieldA - yieldB;
          }
          return 0;
        });

        return result;
      }, [properties, statusFilter, minPrice, maxPrice, sortConfig]);

      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden w-full flex flex-col">
          <div className="p-4 md:p-5 border-b border-slate-200 flex flex-col lg:flex-row justify-between items-start lg:items-center bg-slate-50/50 gap-4">
            <h3 className="font-semibold text-slate-800 flex items-center gap-2 text-sm md:text-base shrink-0">
              <List className="w-5 h-5 text-blue-600" />
              내 물건 목록 <span className="text-blue-600 bg-blue-100 px-2 py-0.5 rounded-full text-xs">{filteredAndSortedProperties.length}</span>
            </h3>

            <div className="flex flex-col sm:flex-row items-stretch sm:items-end gap-3 w-full lg:w-auto">
              <div className="flex flex-col gap-1.5 w-full sm:w-auto">
                <span className="text-[11px] font-bold text-slate-500 flex items-center gap-1.5 ml-1"><List className="w-3 h-3 text-blue-500" /> 상태</span>
                <div className="flex bg-slate-200/80 p-1 rounded-lg w-full sm:w-auto shadow-inner">
                  {['전체', '보류', '완료'].map(status => (
                    <button key={status} onClick={() => setStatusFilter(status)} className={`flex-1 sm:flex-none px-4 py-1.5 rounded-md text-xs font-bold transition-all ${statusFilter === status ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>{status}</button>
                  ))}
                </div>
              </div>

              <div className="flex flex-col gap-1.5 w-full sm:w-auto">
                <span className="text-[11px] font-bold text-slate-500 flex items-center gap-1.5 ml-1"><Banknote className="w-3 h-3 text-blue-500" /> 매매금액 검색</span>
                <div className="flex items-center bg-white border border-slate-300 rounded-lg p-1 w-full sm:w-auto shadow-sm focus-within:ring-2 focus-within:ring-blue-500 focus-within:border-blue-500 transition-all h-[34px] sm:h-[36px]">
                  <input type="number" value={minPrice} onChange={(e) => setMinPrice(e.target.value)} className="w-full sm:w-16 text-center outline-none text-xs sm:text-sm font-bold text-slate-700 bg-transparent px-1" />
                  <span className="text-[10px] sm:text-xs font-bold text-slate-600 bg-slate-100 px-1.5 py-1 rounded shrink-0 border border-slate-200">억</span>
                  <span className="text-slate-300 mx-2 shrink-0 font-bold">~</span>
                  <input type="number" value={maxPrice} onChange={(e) => setMaxPrice(e.target.value)} className="w-full sm:w-16 text-center outline-none text-xs sm:text-sm font-bold text-slate-700 bg-transparent px-1" />
                  <span className="text-[10px] sm:text-xs font-bold text-slate-600 bg-slate-100 px-1.5 py-1 rounded shrink-0 border border-slate-200 mr-0.5">억</span>
                </div>
              </div>
            </div>
          </div>

          <div className="overflow-x-auto w-full">
            <table className="w-full text-left border-collapse whitespace-nowrap min-w-[800px]">
              <thead>
                <tr className="bg-slate-50 border-b border-slate-200 text-[11px] uppercase tracking-wider text-slate-500">
                  <th className="p-3 font-medium">상태</th>
                  <th className="p-3 font-medium">물건명 / 소재지</th>
                  <th className="p-3 font-medium text-center">대지(평)</th>
                  <th className="p-3 font-medium text-center">연면(평)</th>
                  <th className="p-3 font-medium text-right">매매가</th>
                  <th className="p-3 font-medium text-right">보증금</th>
                  <th className="p-3 font-medium text-right">월세</th>
                  <th className="p-3 font-medium text-center text-emerald-600 cursor-pointer hover:bg-slate-100 transition-colors select-none" onClick={() => handleSort('yield')}>
                    수익률 {sortConfig.key === 'yield' ? (sortConfig.direction === 'desc' ? '↓' : '↑') : <span className="text-slate-300">↕</span>}
                  </th>
                  <th className="p-3 font-medium text-center cursor-pointer hover:bg-slate-100 transition-colors select-none" onClick={() => handleSort('date')}>
                    등록일 {sortConfig.key === 'date' ? (sortConfig.direction === 'desc' ? '↓' : '↑') : <span className="text-slate-300">↕</span>}
                  </th>
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-100 text-xs">
                {filteredAndSortedProperties.length > 0 ? filteredAndSortedProperties.map((prop) => (
                  <tr key={prop.id} className="hover:bg-blue-50/50 transition-colors group cursor-pointer sm:cursor-auto" onClick={(e) => { if(window.innerWidth < 640) onViewDetail(prop); }}>
                    <td className="p-3">
                      <div className="flex gap-1.5 items-center flex-wrap">
                        <span className={`px-2 py-0.5 rounded text-[11px] font-bold ${STATUS_BADGE_COLORS[prop.status || '보류']}`}>{prop.status || '보류'}</span>
                        <span className={`px-1.5 py-0.5 rounded text-[10px] font-bold ${prop.transactionType === '매매' ? 'bg-slate-100 text-slate-600 border border-slate-200' : prop.transactionType === '전세' ? 'bg-blue-100 text-blue-700 border border-blue-200' : 'bg-green-100 text-green-700 border border-green-200'}`}>{prop.transactionType}</span>
                      </div>
                    </td>
                    <td className="p-3 max-w-[150px] sm:max-w-[200px]">
                      <div className="flex flex-col gap-1">
                        <span onClick={(e) => { e.stopPropagation(); onViewDetail(prop); }} className="font-bold text-blue-600 sm:cursor-pointer sm:hover:underline hover:text-blue-800 transition-colors truncate text-sm" title={prop.name}>
                          {prop.name}
                        </span>
                        <span className="text-[11px] text-slate-400 truncate flex items-center gap-0.5" title={prop.address}><MapPin className="w-3 h-3 opacity-70 shrink-0" /> {prop.address}</span>
                      </div>
                    </td>
                    <td className="p-3 text-center text-slate-600">{getExactPyeong(prop.landArea)}</td>
                    <td className="p-3 text-center text-slate-600">{getExactPyeong(prop.totalFloorArea)}</td>
                    <td className="p-3 text-right font-bold text-red-600">{formatKoreanCurrency(prop.price?.sale || 0)}</td>
                    <td className="p-3 text-right text-slate-700">{formatKoreanCurrency(prop.price?.deposit || 0)}</td>
                    <td className="p-3 text-right text-slate-700">{formatKoreanCurrency(prop.price?.rent || 0)}</td>
                    <td className="p-3 text-center font-bold text-emerald-600">{prop.transactionType === '매매' ? `${getYield(prop.price?.sale, prop.price?.deposit, prop.price?.rent)}%` : '-'}</td>
                    <td className="p-3 text-center text-slate-500">{prop.date}</td>
                  </tr>
                )) : <tr><td colSpan="9" className="p-8 text-center text-slate-500 font-medium bg-slate-50">등록된 내 물건이 없습니다.</td></tr>}
              </tbody>
            </table>
          </div>
          <div className="sm:hidden text-center text-xs text-slate-400 p-2 bg-slate-50/80 border-t border-slate-100">← 좌우로 스크롤하여 더 보기 →</div>
        </div>
      );
    }

    function PropertyDetailView({ property, onBack, onEdit, onDelete, currentUser, onUpdate }) {
      const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);
      const [newLog, setNewLog] = useState('');

      const floorTotals = useMemo(() => {
        if (!property || !property.floorDetails) return { deposit: 0, rent: 0, maintenance: 0 };
        return property.floorDetails.reduce((acc, curr) => ({
          deposit: acc.deposit + (Number(curr.deposit) || 0),
          rent: acc.rent + (Number(curr.rent) || 0),
          maintenance: acc.maintenance + (Number(curr.maintenance) || 0),
        }), { deposit: 0, rent: 0, maintenance: 0 });
      }, [property]);

      const handleAddLog = () => {
        if (!newLog.trim()) return;
        const log = {
          id: Date.now(),
          date: new Date().toLocaleString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }),
          author: currentUser ? currentUser.name : '시스템',
          content: newLog.trim()
        };
        const updatedProperty = { ...property, workLogs: [log, ...(property.workLogs || [])] };
        onUpdate(updatedProperty);
        setNewLog('');
      };

      if (!property) return null;

      return (
        <div className="max-w-5xl mx-auto space-y-4 md:space-y-6 pb-10 relative">
          {showDeleteConfirm && (
            <div className="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4">
              <div className="bg-white p-6 rounded-2xl shadow-2xl max-w-sm w-full border border-slate-200">
                <div className="flex items-center gap-3 mb-3 text-red-600"><Trash2 className="w-6 h-6" /><h3 className="text-lg font-bold text-slate-800">물건 삭제 확인</h3></div>
                <p className="text-slate-600 mb-6 text-sm">정말 <b>{property.name}</b> 물건을 삭제하시겠습니까?<br/>이 작업은 되돌릴 수 없습니다.</p>
                <div className="flex gap-3 justify-end">
                  <button onClick={() => setShowDeleteConfirm(false)} className="flex-1 px-4 py-2.5 bg-slate-100 rounded-xl text-slate-700 font-bold hover:bg-slate-200 transition-colors">취소</button>
                  <button onClick={() => onDelete(property.id)} className="flex-1 px-4 py-2.5 bg-red-600 text-white rounded-xl font-bold hover:bg-red-700 transition-colors shadow-md">삭제하기</button>
                </div>
              </div>
            </div>
          )}

          <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">

              </div>
              <p className="text-slate-500 flex items-start sm:items-center gap-2 text-sm sm:text-lg"><MapPin className="w-4 h-4 shrink-0 mt-0.5 sm:mt-0 opacity-0 sm:opacity-100 hidden sm:block" />{property.address}</p>
            </div>
            
            <div className="text-left md:text-right w-full md:w-auto mt-2 md:mt-0 p-4 md:p-0 bg-slate-50 md:bg-transparent rounded-xl border border-slate-100 md:border-0">
              <p className="text-xs sm:text-sm text-slate-500 mb-1">{property.transactionType === '매매' ? '매매가' : property.transactionType === '전세' ? '전세보증금' : '보증금 / 월세'}</p>
              <div className="text-3xl sm:text-4xl font-extrabold text-blue-600 flex flex-wrap items-baseline justify-start md:justify-end gap-1">
                {property.transactionType === '매매' ? <span>{formatKoreanCurrency(property.price?.sale || 0)}</span> : property.transactionType === '전세' ? <span>{formatKoreanCurrency(property.price?.deposit || 0)}</span> : <><span className="text-2xl sm:text-3xl">{formatKoreanCurrency(property.price?.deposit || 0)}</span><span className="text-lg sm:text-xl font-bold text-slate-800 mx-1">/</span><span>{formatKoreanCurrency(property.price?.rent || 0)}</span></>}

              {property.transactionType === '매매' && (
                <div className="mt-3 flex flex-col items-start md:items-end gap-1.5">
                  {property.landArea > 0 && (
                    <span className="text-xs sm:text-sm font-bold text-red-500 bg-red-50 md:bg-transparent px-2 py-1 md:p-0 rounded">

                  <div className="inline-flex items-center gap-1.5 px-3 py-1.5 bg-emerald-50 text-emerald-700 rounded-lg border border-emerald-200 text-xs sm:text-sm font-bold shadow-sm"><TrendingUp className="w-3 h-3 sm:w-4 sm:h-4" /> 수익률: <span className="text-sm sm:text-base">{getYield(property.price?.sale, property.price?.deposit, property.price?.rent)}%</span></div>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 sm:gap-6">
            <div className="space-y-4 sm:space-y-6">
                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div className="p-3 sm:p-4 bg-slate-50 border-b border-slate-200"><h3 className="font-bold text-slate-800 flex items-center gap-2 text-sm sm:text-base"><UserCircle className="w-4 h-4 sm:w-5 sm:h-5 text-blue-500" /> 소유자 정보</h3></div>
                    <div className="p-0">
                        <SpecRow icon={<User />} label="소유자명" value={property.ownerName || '-'} />
                        <SpecRow icon={<Phone />} label="연락처" value={property.ownerPhone || '-'} />
                    </div>

                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                  <div className="p-3 sm:p-4 bg-slate-50 border-b border-slate-200"><h3 className="font-bold text-slate-800 flex items-center gap-2 text-sm sm:text-base"><Banknote className="w-4 h-4 sm:w-5 sm:h-5 text-blue-500" /> 금액 정보</h3></div>
                  <div className="p-0">
                    <SpecRow icon={<Banknote />} label="매매가" value={formatKoreanCurrency(property.price?.sale || 0)} />
                    <SpecRow icon={<Banknote />} label="보증금 (총액)" value={formatKoreanCurrency(property.price?.deposit || 0)} />
                    <SpecRow icon={<Banknote />} label="월세 (총액)" value={formatKoreanCurrency(property.price?.rent || 0)} />
                    <SpecRow icon={<Banknote />} label="관리비" value={formatKoreanCurrency(property.price?.maintenance || 0)} />
                    {property.transactionType === '매매' && <SpecRow icon={<TrendingUp />} label="수익률" value={`${getYield(property.price?.sale, property.price?.deposit, property.price?.rent)}%`} />}
                  </div>
                </div>
            </div>

            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
              <div className="p-3 sm:p-4 bg-slate-50 border-b border-slate-200"><h3 className="font-bold text-slate-800 flex items-center gap-2 text-sm sm:text-base"><Building2 className="w-4 h-4 sm:w-5 sm:h-5 text-blue-500" /> 건물 정보</h3></div>
              <div className="p-0">
                <SpecRow icon={<MapIcon />} label="용도지역" value={property.zoning || '-'} />
                <SpecRow icon={<Maximize />} label="대지면적" value={<span>{getExactPyeong(property.landArea)}평 <span className="text-slate-400 font-normal ml-1">({property.landArea || 0}㎡)</span></span>} />
                <SpecRow icon={<Maximize />} label="연면적" value={<span>{getExactPyeong(property.totalFloorArea)}평 <span className="text-slate-400 font-normal ml-1">({property.totalFloorArea || 0}㎡)</span></span>} />
                <SpecRow icon={<Maximize />} label="건축면적" value={<span>{getExactPyeong(property.buildingArea)}평 <span className="text-slate-400 font-normal ml-1">({property.buildingArea || 0}㎡)</span></span>} />
                <SpecRow icon={<Percent />} label="건폐율 / 용적률" value={`${property.buildingCoverage || 0}% / ${property.floorAreaRatio || 0}%`} />
                <SpecRow icon={<Building2 />} label="건물 층수" value={`지하 ${property.floorUnderground || 0}층 / 지상 ${property.floorGround || 0}층`} />
                <SpecRow icon={<Car />} label="주차대수" value={`${property.parking || 0}대`} />
                <SpecRow icon={<ArrowUpCircle />} label="엘리베이터" value={`${property.elevators || 0}대`} />
                <SpecRow icon={<CalendarDays />} label="준공년도" value={property.completionYear || '-'} />
                <SpecRow icon={<CheckCircle2 />} label="물건종류" value={property.type} />
                <SpecRow icon={<UserCircle />} label="등록자" value={property.registrant || '-'} />
              </div>
            </div>
          </div>

          <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div className="p-3 sm:p-4 bg-slate-50 border-b border-slate-200"><h3 className="font-bold text-slate-800 flex items-center gap-2 text-sm sm:text-base"><Maximize className="w-4 h-4 sm:w-5 sm:h-5 text-blue-500" /> 층별 현황 내역</h3></div>
            <div className="p-0 overflow-x-auto w-full">
              <table className="w-full text-left border-collapse min-w-[500px]">
                <thead>
                  <tr className="bg-white text-slate-500 text-xs sm:text-sm border-b border-slate-200"><th className="p-3 sm:p-4 font-medium">층수</th><th className="p-3 sm:p-4 font-medium">업체명</th><th className="p-3 sm:p-4 font-medium text-right">보증금</th><th className="p-3 sm:p-4 font-medium text-right">월세</th><th className="p-3 sm:p-4 font-medium text-right">관리비</th></tr>
                </thead>
                <tbody>
                  {property.floorDetails && property.floorDetails.length > 0 ? property.floorDetails.map(floor => (
                    <tr key={floor.id} className="border-b border-slate-100 last:border-0 hover:bg-slate-50 text-xs sm:text-sm transition-colors">
                      <td className="p-3 sm:p-4 text-slate-800 font-bold">{floor.floor}</td>
                      <td className="p-3 sm:p-4 text-slate-800 font-semibold">{floor.companyName || '-'}</td>
                      <td className="p-3 sm:p-4 text-slate-800 font-semibold text-right">{formatKoreanCurrency(floor.deposit || 0)}</td>
                      <td className="p-3 sm:p-4 text-slate-800 font-semibold text-right">{formatKoreanCurrency(floor.rent || 0)}</td>
                      <td className="p-3 sm:p-4 text-slate-800 font-semibold text-right">{formatKoreanCurrency(floor.maintenance || 0)}</td>
                    </tr>
                  )) : <tr><td colSpan="5" className="p-6 sm:p-8 text-center text-slate-400 text-xs sm:text-sm">등록된 층별 내역이 없습니다.</td></tr>}
                </tbody>
                {property.floorDetails && property.floorDetails.length > 0 && (
                  <tfoot className="bg-blue-50/50 border-t-2 border-blue-200">
                    <tr><td colSpan="2" className="p-3 sm:p-4 text-blue-800 font-bold text-center text-xs sm:text-sm">전체 합계</td><td className="p-3 sm:p-4 text-blue-800 font-extrabold text-right text-sm sm:text-base">{formatKoreanCurrency(floorTotals.deposit)}</td><td className="p-3 sm:p-4 text-blue-800 font-extrabold text-right text-sm sm:text-base">{formatKoreanCurrency(floorTotals.rent)}</td><td className="p-3 sm:p-4 text-blue-800 font-extrabold text-right text-sm sm:text-base">{formatKoreanCurrency(floorTotals.maintenance)}</td></tr>
                  </tfoot>
                )}
              </table>
            </div>
          </div>

          <div className="flex flex-col gap-4 sm:gap-6">
            <div className="bg-white p-4 sm:p-6 rounded-2xl shadow-sm border border-slate-200">
              <h3 className="text-base sm:text-lg font-bold text-slate-800 mb-3 sm:mb-4 pb-2 sm:pb-3 border-b border-slate-100 flex items-center gap-2"><ImageIcon className="w-4 h-4 sm:w-5 sm:h-5 text-blue-500" /> 등록된 사진</h3>
              {property.images && property.images.length > 0 ? (
                <>
                  <div className="aspect-[3/4] max-h-[600px] w-full max-w-sm mx-auto bg-slate-100 rounded-xl flex items-center justify-center overflow-hidden mb-2 sm:mb-3">
                    <img src={property.images[0]} alt="대표 사진" className="w-full h-full object-contain bg-black/5" />
                  </div>
                  <div className="grid grid-cols-4 gap-2">
                    {property.images.slice(1, 5).map((imgUrl, i) => (
                      <div key={i} className="aspect-[3/4] bg-slate-100 rounded-lg overflow-hidden border border-slate-200">
                        <img src={imgUrl} alt={`추가 사진 ${i+1}`} className="w-full h-full object-cover" />
                      </div>
                    ))}
                  </div>
                </>
              ) : <div className="aspect-[3/4] max-h-[400px] bg-slate-50 border-2 border-dashed border-slate-200 rounded-xl flex flex-col items-center justify-center text-slate-400 p-4"><ImageIcon className="w-8 h-8 sm:w-12 sm:h-12 mb-2 opacity-50" /><p className="text-xs sm:text-sm font-medium">등록된 사진이 없습니다</p></div>}
            </div>

            <div className="bg-white p-4 sm:p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col">
              <h3 className="text-base sm:text-lg font-bold text-slate-800 mb-3 sm:mb-4 pb-2 sm:pb-3 border-b border-slate-100 flex items-center gap-2"><FileText className="w-4 h-4 sm:w-5 sm:h-5 text-blue-500" /> 작업 일지 및 코멘트</h3>
              <div className="flex flex-col sm:flex-row gap-2 sm:gap-3 mb-4 sm:mb-6">
                <textarea value={newLog} onChange={(e) => setNewLog(e.target.value)} className="flex-1 p-3 border border-slate-300 rounded-xl outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 text-sm resize-none" rows={2} placeholder="작업 내용이나 코멘트를 남겨주세요..." />
                <button onClick={handleAddLog} className="w-full sm:w-auto px-6 py-3 sm:py-0 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition-colors shadow-sm whitespace-nowrap">등록</button>
              </div>
              <div className="space-y-3 max-h-[400px] overflow-y-auto pr-1 sm:pr-2">
                {(property.workLogs || []).length > 0 ? property.workLogs.map(log => (
                  <div key={log.id} className="p-3 sm:p-4 bg-slate-50 rounded-xl border border-slate-100 text-xs sm:text-sm flex flex-col gap-1.5">
                    <div className="flex flex-wrap items-center justify-between gap-1 sm:gap-2 border-b border-slate-200 pb-2 mb-1"><span className="font-bold text-slate-700 text-xs sm:text-sm flex items-center gap-1.5"><UserCircle className="w-3 h-3 sm:w-4 sm:h-4 text-blue-500" /> {log.author}</span><span className="text-[10px] sm:text-xs text-slate-400 font-medium">{log.date}</span></div>
                    <p className="text-slate-800 text-xs sm:text-sm whitespace-pre-line leading-relaxed">{log.content}</p>
                  </div>
                )) : <div className="py-6 sm:py-8 text-center text-slate-400 text-xs sm:text-sm bg-slate-50 rounded-xl border border-slate-100 border-dashed">등록된 작업 일지가 없습니다.</div>}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function PropertyFormView({ initialData, onBack, onSave, currentUser }) {
      const [newLog, setNewLog] = useState('');
      const [addressError, setAddressError] = useState('');
      const [formData, setFormData] = useState(() => {
        if (initialData) return { ...initialData };
        return {
          name: '', ownerName: '', ownerPhone: '',
          type: '빌딩', transactionType: '매매', address: '', zoning: '',
          landArea: '', totalFloorArea: '', buildingArea: '', buildingCoverage: '', floorAreaRatio: '', floorUnderground: '', floorGround: '', elevators: '', parking: '', completionYear: '',
          sale: '', deposit: '', rent: '', maintenance: '',
          floorDetails: [{ id: Date.now(), floor: '1층', companyName: '', deposit: '', rent: '', maintenance: '' }],
          direction: '남향', workLogs: [], status: '보류'
        };
      });

      const handleChange = (e) => {
        setFormData(prev => ({ ...prev, [e.target.name]: e.target.value }));
        if(e.target.name === 'address') setAddressError('');
      };
      
      const handleAddressBlur = () => {
        const formatted = autoFormatAddress(formData.address);
        setFormData(prev => ({ ...prev, address: formatted }));
      };

      const handleImageUpload = (e) => {
        const files = Array.from(e.target.files);
        const newImages = files.map(file => URL.createObjectURL(file));
        setFormData(prev => ({ ...prev, images: [...(prev.images || []), ...newImages] }));
      };

      const removeImage = (index) => setFormData(prev => {
        const newImages = [...(prev.images || [])];
        newImages.splice(index, 1);
        return { ...prev, images: newImages };
      });

      const handleFloorChange = (id, field, value) => {
        setFormData(prev => ({
          ...prev,
          floorDetails: prev.floorDetails.map(item => item.id === id ? { ...item, [field]: value } : item)
        }));
      };

      const sortFloorDetails = () => {
        const parseFloorLevel = (str) => {
          if(!str) return 0;
          const numStr = str.replace(/[^0-9]/g, '');
          const num = numStr ? parseInt(numStr, 10) : 0;
          if (str.includes('지하') || str.toUpperCase().includes('B')) return -num;
          return num;
        };

        setFormData(prev => {
          const sorted = [...prev.floorDetails].sort((a, b) => parseFloorLevel(a.floor) - parseFloorLevel(b.floor));
          return { ...prev, floorDetails: sorted };
        });
      };

      const addFloor = () => {
        setFormData(prev => {
          const groundFloors = prev.floorDetails
            .map(f => f.floor)
            .filter(f => f && !f.includes('지하') && !f.toUpperCase().includes('B'))
            .map(f => parseInt(f.replace(/[^0-9]/g, ''), 10))
            .filter(n => !isNaN(n));
          
          const maxGround = groundFloors.length > 0 ? Math.max(...groundFloors) : 0;
          const nextFloor = `${maxGround + 1}층`;

          return {
            ...prev,
            floorDetails: [...prev.floorDetails, { id: Date.now(), floor: nextFloor, companyName: '', deposit: '', rent: '', maintenance: '', isNew: true }]
          };
        });
      };

      const totals = useMemo(() => formData.floorDetails.reduce((acc, curr) => ({
        deposit: acc.deposit + (Number(curr.deposit) || 0),
        rent: acc.rent + (Number(curr.rent) || 0),
        maintenance: acc.maintenance + (Number(curr.maintenance) || 0),
      }), { deposit: 0, rent: 0, maintenance: 0 }), [formData.floorDetails]);

      const handleSubmit = (e) => {
        e.preventDefault();

        const formattedAddress = autoFormatAddress(formData.address);
        sortFloorDetails(); 
        
        let finalWorkLogs = [...(formData.workLogs || [])];
        if (newLog.trim()) {
          finalWorkLogs.unshift({
            id: Date.now(),
            date: new Date().toLocaleString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }),
            author: currentUser ? currentUser.name : '시스템',
            content: newLog.trim()
          });
        }

        onSave({
          ...formData,
          address: formattedAddress,
          landArea: Number(formData.landArea || 0),
          totalFloorArea: Number(formData.totalFloorArea || 0),
          buildingArea: Number(formData.buildingArea || 0),
          buildingCoverage: Number(formData.buildingCoverage || 0),
          floorAreaRatio: Number(formData.floorAreaRatio || 0),
          floorUnderground: Number(formData.floorUnderground || 0),
          floorGround: Number(formData.floorGround || 0),
          elevators: Number(formData.elevators || 0),
          parking: Number(formData.parking || 0),
          price: { sale: Number(formData.sale || 0), deposit: totals.deposit, rent: totals.rent, maintenance: totals.maintenance },
          workLogs: finalWorkLogs,
        });
      };

      return (
        <div className="max-w-4xl mx-auto pb-10 relative">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
            <div className="flex flex-col sm:flex-row items-start sm:items-center gap-3 sm:gap-6 w-full md:w-auto">
              <h2 className="text-xl sm:text-2xl font-bold text-slate-800 shrink-0">{initialData ? '등록된 물건 수정' : '신규 물건 등록'}</h2>
              <div className="flex items-center p-1 bg-slate-200/70 rounded-xl border border-slate-200 w-full sm:w-auto overflow-x-auto">
                {STATUS_OPTIONS.map(s => (
                  <button 
                    key={s} type="button" onClick={() => setFormData(prev => ({...prev, status: s}))} 
                    className={`flex-1 sm:flex-none items-center justify-center gap-1 sm:gap-2 px-3 sm:px-4 py-1.5 rounded-lg text-xs sm:text-sm font-bold transition-all duration-300 ${formData.status === s || (!formData.status && s==='보류') ? STATUS_FORM_COLORS[s] : 'text-slate-400 hover:text-slate-600'}`}
                  >
                    {s}
                  </button>
                ))}
              </div>
            </div>
            
            <div className="flex items-center gap-2 w-full md:w-auto">
              <button type="button" onClick={onBack} className="flex-1 md:flex-none text-slate-500 hover:text-slate-800 text-sm font-bold bg-slate-200 px-4 py-2.5 sm:py-2 rounded-lg text-center transition-colors">취소 및 돌아가기</button>
            </div>
          </div>

          <form onSubmit={handleSubmit} onKeyDown={(e) => { if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') e.preventDefault(); }} className="space-y-4 sm:space-y-6">
            <div className="bg-white p-5 sm:p-8 rounded-2xl shadow-sm border border-slate-200">
              <h3 className="text-lg sm:text-xl font-bold text-slate-800 mb-4 sm:mb-6 pb-3 sm:pb-4 border-b border-slate-100 flex items-center gap-2"><Building2 className="w-5 h-5 sm:w-6 sm:h-6 text-blue-500" /> 기본 정보</h3>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6">
                <FormGroup label="물건명 (필수)"><input required type="text" name="name" value={formData.name || ''} onChange={handleChange} className="form-input w-full p-2.5 sm:p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none font-bold text-sm sm:text-base" placeholder="예: 엠파이어 빌딩" /></FormGroup>
                
                <FormGroup label="소재지 (주소)">
                   <input required type="text" name="address" value={formData.address || ''} onChange={handleChange} onBlur={handleAddressBlur} className={`form-input w-full p-2.5 sm:p-3 border rounded-lg outline-none focus:ring-2 bg-white text-sm sm:text-base ${addressError ? 'border-red-400 focus:ring-red-200' : 'border-slate-300 focus:ring-blue-500'}`} placeholder="예: 서울시 강남구 신사동 10" />

        <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden w-full">
          <div className="p-4 md:p-5 border-b border-slate-200 flex justify-between items-center bg-slate-50/50">
            <h3 className="font-semibold text-slate-800 flex items-center gap-2 text-sm md:text-base"><Users className="w-5 h-5 text-blue-600" /> 등록된 매수자 <span className="text-blue-600 bg-blue-100 px-2 py-0.5 rounded-full text-xs">{customers.length}</span></h3>
          </div>
          <div className="overflow-x-auto w-full">
            <table className="w-full text-left border-collapse whitespace-nowrap min-w-[600px]">
              <thead>
                <tr className="bg-slate-50 border-b border-slate-200 text-[11px] md:text-xs uppercase tracking-wider text-slate-500"><th className="p-3 md:p-4 font-medium">이름</th><th className="p-3 md:p-4 font-medium">전화번호</th><th className="p-3 md:p-4 font-medium text-right">투자금액(만원)</th><th className="p-3 md:p-4 font-medium">희망 지역</th><th className="p-3 md:p-4 font-medium">구매사유</th></tr>
              </thead>
              <tbody className="divide-y divide-slate-100 text-xs md:text-sm">
                {customers.map(cust => (
                  <tr key={cust.id} className="hover:bg-blue-50/50 transition-colors"><td className="p-3 md:p-4 font-bold text-slate-800">{cust.name}</td><td className="p-3 md:p-4 text-slate-600">{cust.phone}</td><td className="p-3 md:p-4 text-right font-bold text-red-600">{formatKoreanCurrency(cust.budget)}</td><td className="p-3 md:p-4 text-slate-600">{cust.region}</td><td className="p-3 md:p-4 text-slate-600 truncate max-w-[150px] md:max-w-[200px]">{cust.reason}</td></tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function CustomerFormView({ onBack, onSave }) {
      const [formData, setFormData] = useState({ name: '', phone: '', budget: '', region: '', reason: '' });
      const handleChange = (e) => setFormData({ ...formData, [e.target.name]: e.target.value });
      
      return (
        <div className="max-w-2xl mx-auto pb-10">
          <div className="flex justify-between items-center mb-6"><h2 className="text-xl md:text-2xl font-bold text-slate-800">신규 손님 등록</h2><button onClick={onBack} className="text-slate-500 hover:text-slate-800 text-sm font-medium bg-slate-200 px-3 py-1.5 rounded-lg">취소 및 돌아가기</button></div>
          <form onSubmit={(e) => { e.preventDefault(); onSave(formData); }} className="space-y-6 bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200">
            <h3 className="text-base md:text-lg font-bold text-slate-800 mb-4 md:mb-5 pb-2 md:pb-3 border-b border-slate-100 flex items-center gap-2"><Users className="w-4 h-4 md:w-5 md:h-5 text-blue-500" /> 손님(매수자) 정보</h3>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4"><FormGroup label="이름"><input required type="text" name="name" onChange={handleChange} className="form-input w-full p-2.5 md:p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm md:text-base" placeholder="김투자" /></FormGroup><FormGroup label="전화번호"><input required type="tel" name="phone" onChange={handleChange} className="form-input w-full p-2.5 md:p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm md:text-base" placeholder="010-0000-0000" /></FormGroup></div>
            <FormGroup label="금액 (단위: 만원)">
              <div className="flex items-center gap-2">
                <input required type="number" name="budget" onChange={handleChange} className="form-input flex-1 p-2.5 md:p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-right text-sm md:text-base font-bold" placeholder="예: 50000" />
                <div className="w-32 sm:w-40 text-right text-sm sm:text-base font-bold text-blue-600 bg-blue-50 py-2.5 sm:py-3 px-3 rounded-lg border border-blue-100 truncate shadow-sm">
                  {formatKoreanCurrency(formData.budget) || '0원'}
                </div>
              </div>
            </FormGroup>
            <FormGroup label="지역"><input required type="text" name="region" onChange={handleChange} className="form-input w-full p-2.5 md:p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm md:text-base" placeholder="예: 성남시 분당구 일대" /></FormGroup>
            <FormGroup label="구매사유"><textarea required name="reason" onChange={handleChange} rows={3} className="form-input w-full p-2.5 md:p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none resize-none text-sm md:text-base" placeholder="예: 사옥 이전, 임대수익 목적 등" /></FormGroup>
            <div className="flex pt-4"><button type="submit" className="w-full py-3.5 bg-blue-600 text-white rounded-xl font-bold text-base shadow-sm hover:bg-blue-700">손님 등록</button></div>
          </form>
        </div>
      );
    }

    function CalendarView() {
      const [date, setDate] = useState(new Date());
      const [memos, setMemos] = useState({});
      const [editingDate, setEditingDate] = useState(null);
      const [newMemo, setNewMemo] = useState('');

      const year = date.getFullYear();
      const month = date.getMonth();

      const handleAddMemo = (e, dayStr) => { e.stopPropagation(); setEditingDate(dayStr); setNewMemo(''); };
      const saveMemo = (e, dayStr) => { e.stopPropagation(); if (newMemo.trim()) setMemos(prev => ({ ...prev, [dayStr]: [...(prev[dayStr] || []), { id: Date.now(), text: newMemo.trim() }] })); setEditingDate(null); };
      const deleteMemo = (e, dayStr, idx) => { e.stopPropagation(); setMemos(prev => { const newMemos = [...(prev[dayStr] || [])]; newMemos.splice(idx, 1); return { ...prev, [dayStr]: newMemos }; }); };

      const renderDays = () => {
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const firstDay = new Date(year, month, 1).getDay();
        const days = [];
        
        for (let i = 0; i < firstDay; i++) days.push(<div key={`empty-${i}`} className="bg-slate-50 border border-slate-100 rounded-lg"></div>);
        for (let d = 1; d <= daysInMonth; d++) {
          const dayStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
          const isToday = new Date().toDateString() === new Date(year, month, d).toDateString();
          const currentDayOfWeek = new Date(year, month, d).getDay();
          const dayColor = currentDayOfWeek === 0 ? 'text-red-500' : currentDayOfWeek === 6 ? 'text-blue-500' : 'text-slate-700';

          const currentMemos = (memos[dayStr] || []);

          days.push(
            <div key={d} onClick={(e) => { if(!editingDate) handleAddMemo(e, dayStr) }} className={`group relative min-h-[90px] md:min-h-[120px] p-1 md:p-2 border border-slate-100 rounded-lg cursor-pointer hover:border-blue-300 transition-colors ${isToday ? 'bg-blue-50/30 border-blue-200' : 'bg-white'}`}>
              <div className="flex justify-between items-start mb-1">
                <div className={`text-xs md:text-sm font-semibold ${dayColor} ${isToday ? 'font-extrabold underline' : ''}`}>{d}</div>
                <button onClick={(e) => handleAddMemo(e, dayStr)} className="w-5 h-5 rounded-full hover:bg-slate-100 text-slate-300 hover:text-blue-600 flex items-center justify-center opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-all"><Plus className="w-3 h-3" /></button>
              </div>
              <div className="space-y-1">
                {currentMemos.map((memo, idx) => (
                  <div key={memo.id} className="flex flex-col sm:flex-row justify-between items-start sm:items-center text-[10px] md:text-[11px] bg-blue-50 text-blue-700 pl-1.5 pr-1 py-1 rounded border border-blue-100 hover:bg-blue-100 transition-colors group/item gap-1 sm:gap-0">
                    <span className="truncate w-full sm:flex-1">{memo.text}</span>
                    <button onClick={(e) => deleteMemo(e, dayStr, idx)} className="text-slate-400 hover:text-red-500 p-0.5 ml-auto sm:ml-1 opacity-100 md:opacity-0 md:group-hover/item:opacity-100 transition-opacity"><Trash2 className="w-3 h-3" /></button>
                  </div>
                ))}
                {editingDate === dayStr && (
                  <div className="mt-1 flex flex-col gap-1" onClick={e => e.stopPropagation()}>
                    <input autoFocus type="text" value={newMemo} onChange={e => setNewMemo(e.target.value)} onKeyDown={e => e.key === 'Enter' && saveMemo(e, dayStr)} placeholder="일정 입력..." className="w-full text-[10px] md:text-xs p-1 md:p-1.5 border border-blue-300 rounded outline-none focus:ring-1 focus:ring-blue-500 bg-white" />
                    <div className="flex gap-1"><button onClick={(e) => saveMemo(e, dayStr)} className="text-[9px] md:text-[10px] bg-blue-600 text-white px-2 py-1 rounded font-medium flex-1 hover:bg-blue-700">저장</button><button onClick={(e) => { e.stopPropagation(); setEditingDate(null); }} className="text-[9px] md:text-[10px] bg-slate-200 text-slate-700 px-2 py-1 rounded font-medium flex-1 hover:bg-slate-300">취소</button></div>
                  </div>
                )}
              </div>
            </div>
          );
        }
        return days;
      };

      return (
        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-3 md:p-6 h-full flex flex-col">
          <div className="flex flex-col sm:flex-row justify-between items-center mb-4 md:mb-6 gap-3 sm:gap-0">
            <h2 className="text-lg md:text-xl font-bold text-slate-800 flex items-center gap-2 w-full sm:w-auto"><CalendarIcon className="w-5 h-5 md:w-6 md:h-6 text-blue-600" /> 개인 캘린더</h2>
            <div className="flex items-center justify-between sm:justify-end gap-2 md:gap-4 w-full sm:w-auto bg-slate-50 sm:bg-transparent rounded-lg p-2 sm:p-0">
              <button onClick={() => setDate(new Date(year, month - 1, 1))} className="p-2 bg-white sm:bg-transparent hover:bg-slate-100 rounded-full shadow-sm sm:shadow-none transition-colors"><ChevronLeft className="w-4 h-4 md:w-5 md:h-5 text-slate-600" /></button>
              <span className="text-base md:text-lg font-bold text-slate-800 w-24 md:w-32 text-center">{year}년 {month + 1}월</span>
              <button onClick={() => setDate(new Date(year, month + 1, 1))} className="p-2 bg-white sm:bg-transparent hover:bg-slate-100 rounded-full shadow-sm sm:shadow-none transition-colors"><ChevronRight className="w-4 h-4 md:w-5 md:h-5 text-slate-600" /></button>
            </div>
          </div>
          <div className="grid grid-cols-7 gap-1 md:gap-2 mb-2">
            {['일', '월', '화', '수', '목', '금', '토'].map((day, i) => (
              <div key={day} className={`text-center text-xs md:text-sm font-bold py-1.5 md:py-2 bg-slate-50 rounded-lg ${i === 0 ? 'text-red-500' : i === 6 ? 'text-blue-500' : 'text-slate-600'}`}>{day}</div>
            ))}
          </div>
          <div className="grid grid-cols-7 gap-1 md:gap-2 flex-1 auto-rows-fr overflow-y-auto pr-1">{renderDays()}</div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
