<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>빌딩탭 개인 CRM</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f8fafc; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    input, textarea, button, select, a { -webkit-tap-highlight-color: transparent; }
    input[type="number"]::-webkit-outer-spin-button, input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }
  </style>
</head>
<body>
  <div id="root">
    <div style="display:flex; height:100vh; align-items:center; justify-content:center; color:#64748b; font-weight:bold;">
      <i class="fas fa-spinner fa-spin" style="margin-right:10px;"></i> 최신 시스템을 불러오는 중입니다...
    </div>
  </div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef } = React;

    const safeStorage = {
      getItem: (key) => {
        try { return localStorage.getItem(key); } 
        catch (e) { return window['temp_' + key] || null; }
      },
      setItem: (key, val) => {
        try { localStorage.setItem(key, val); } 
        catch (e) { window['temp_' + key] = val; }
      },
      removeItem: (key) => {
        try { localStorage.removeItem(key); } 
        catch (e) { delete window['temp_' + key]; }
      }
    };

    const SUPABASE_URL = 'https://ehshoqcskipcvybhomlq.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_v5aUCKdYsRAtiwKSjn8oSA_GnuPEe4G';
    
    let supabase = null;
    try {
      if (window.supabase) {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      }
    } catch(e) {
      console.error("Supabase 연결 에러", e);
    }

    const getYield = (sale, deposit, rent) => {
      const s = Number(sale) || 0; 
      const d = Number(deposit) || 0; 
      const r = Number(rent) || 0;
      if (s === 0 || s <= d || r === 0) return '0.0';
      return (((r * 12) / (s - d)) * 100).toFixed(1);
    };

    const getPricePerPyeong = (sale, landArea) => {
      if (!sale || !landArea) return 0;
      return Math.round(sale / (landArea * 0.3025));
    };

    // 💡 완벽하게 수정한 금액 표기 로직 (예: 5444444 -> 544.4억 고정)
    const formatKoreanCurrency = (val) => {
      const num = Number(val);
      if (!num || isNaN(num) || num === 0) return '0원';
      if (num >= 10000) {
        // 소수점 둘째 자리에서 내림 처리하여 무조건 첫째 자리만 남김
        const eok = Math.floor((num / 10000) * 10) / 10; 
        return `${eok.toLocaleString('ko-KR', { minimumFractionDigits: 1, maximumFractionDigits: 1 })}억`;
      }
      return `${num.toLocaleString('ko-KR')}만`;
    };

    const STATUS_OPTIONS = ['보류', '매매', '완료'];
    
    const STATUS_BADGE_COLORS = { 
      '보류': 'bg-yellow-100 text-yellow-800 border border-yellow-200', 
      '매매': 'bg-green-100 text-green-800 border border-green-200',
      '완료': 'bg-blue-100 text-blue-800 border border-blue-200' 
    };

    const autoFormatAddress = (addr) => {
      if (!addr) return ''; 
      let s = addr.replace(/\s+/g, '');
      s = s.replace(/([가-힣]+[시도])([가-힣]+[구군시])/g, '$1 $2'); 
      s = s.replace(/([가-힣]+[구군시])([가-힣]+[동읍면로길])/g, '$1 $2'); 
      s = s.replace(/([가-힣]+[동읍면로길])(\d)/g, '$1 $2');
      return s.replace(/\s+/g, ' ').trim();
    };

    const getExactPyeong = (sqm) => ((Number(sqm) || 0) * 0.3025).toFixed(2);

    const Icon = ({ name, className }) => {
      let textClass = 'text-base';
      if (className?.includes('w-3')) textClass = 'text-xs'; 
      else if (className?.includes('w-4')) textClass = 'text-sm'; 
      else if (className?.includes('w-5')) textClass = 'text-lg'; 
      
      const cleanClassName = (className || '').replace(/\bw-\d+\b/g, '').trim();
      return <i className={`fas ${name} ${textClass} ${cleanClassName} flex items-center justify-center`}></i>;
    };

    const Building2 = (p) => <Icon name="fa-building" {...p} />;
    const Users = (p) => <Icon name="fa-users" {...p} />;
    const Plus = (p) => <Icon name="fa-plus" {...p} />;
    const Search = (p) => <Icon name="fa-search" {...p} />;
    const MapPin = (p) => <Icon name="fa-map-marker-alt" {...p} />;
    const Banknote = (p) => <Icon name="fa-money-bill-wave" {...p} />;
    const Maximize = (p) => <Icon name="fa-expand-arrows-alt" {...p} />;
    const Car = (p) => <Icon name="fa-car" {...p} />;
    const List = (p) => <Icon name="fa-list" {...p} />;
    const ArrowLeft = (p) => <Icon name="fa-arrow-left" {...p} />;
    const Save = (p) => <Icon name="fa-save" {...p} />;
    const ImageIcon = (p) => <Icon name="fa-image" {...p} />;
    const CheckCircle2 = (p) => <Icon name="fa-check-circle" {...p} />;
    const FileText = (p) => <Icon name="fa-file-alt" {...p} />;
    const Trash2 = (p) => <Icon name="fa-trash-alt" {...p} />;
    const TrendingUp = (p) => <Icon name="fa-chart-line" {...p} />;
    const UserCircle = (p) => <Icon name="fa-user-circle" {...p} />;
    const Briefcase = (p) => <Icon name="fa-briefcase" {...p} />;
    const CalendarIcon = (p) => <Icon name="fa-calendar-alt" {...p} />;
    const ChevronLeft = (p) => <Icon name="fa-chevron-left" {...p} />;
    const ChevronRight = (p) => <Icon name="fa-chevron-right" {...p} />;
    const Phone = (p) => <Icon name="fa-phone" {...p} />;
    const User = (p) => <Icon name="fa-user" {...p} />;
    const ArrowUpCircle = (p) => <Icon name="fa-arrow-circle-up" {...p} />;
    const Upload = (p) => <Icon name="fa-upload" {...p} />;
    const XCircle = (p) => <Icon name="fa-times-circle" {...p} />;
    const Lock = (p) => <Icon name="fa-lock" {...p} />;
    const ShieldCheck = (p) => <Icon name="fa-shield-alt" {...p} />;
    const MapIcon = (p) => <Icon name="fa-map" {...p} />;
    const Percent = (p) => <Icon name="fa-percentage" {...p} />;
    const Bars = (p) => <Icon name="fa-bars" {...p} />;
    const CalendarDays = (p) => <Icon name="fa-calendar-day" {...p} />;

    function SidebarItem({ icon, label, active, onClick }) {
      return (
        <button onClick={onClick} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-colors ${active ? 'bg-blue-600 text-white' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}>
          {React.cloneElement(icon, { className: 'w-5 h-5' })} {label}
        </button>
      );
    }
    
    function FormGroup({ label, children }) { 
      return (
        <div className="flex flex-col gap-1.5 w-full">
          <label className="text-sm font-semibold text-slate-700">{label}</label>
          {children}
        </div>
      ); 
    }
    
    function SpecRow({ icon, label, value }) {
      return (
        <div className="flex flex-col sm:flex-row sm:items-center justify-between p-4 border-b border-slate-50 last:border-0 hover:bg-slate-50 transition-colors gap-1 sm:gap-4">
          <div className="flex items-center gap-3 text-slate-500 text-sm shrink-0">
            {React.cloneElement(icon, { className: 'w-4 h-4 text-slate-400' })} {label}
          </div>
          <div className="font-semibold text-slate-800 text-sm sm:text-right break-all sm:break-normal">{value}</div>
        </div>
      );
    }

    function App() {
      const [properties, setProperties] = useState([]);
      const [employees, setEmployees] = useState([]);
      const [customers, setCustomers] = useState([]);
      const [memos, setMemos] = useState([]);

      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [currentUser, setCurrentUser] = useState(() => {
        const storedUser = safeStorage.getItem('crm_loggedInUser_local');
        return storedUser ? JSON.parse(storedUser) : null;
      });

      const [myProperties, setMyProperties] = useState([]);
      const [currentView, setCurrentView] = useState('list'); 
      const [selectedProperty, setSelectedProperty] = useState(null);
      
      // 💡 [핵심] 접속하자마자 무조건 '내 물건 관리'가 보이도록 설정
      const [activeTab, setActiveTab] = useState('properties'); 
      
      const [currentEmployeeView, setCurrentEmployeeView] = useState('list');
      const [currentCustomerView, setCurrentCustomerView] = useState('list');

      const [searchTerm, setSearchTerm] = useState('');
      const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

      const fetchCloudData = async () => {
        if (!supabase) return;
        try {
          const [propsRes, usersRes, custsRes, memosRes] = await Promise.all([
            supabase.from('crm_properties').select('*'),
            supabase.from('crm_users').select('*'),
            supabase.from('crm_customers').select('*'),
            supabase.from('crm_memos').select('*')
          ]);
          
          if(propsRes.data && !propsRes.error) setProperties(propsRes.data);
          if(usersRes.data && !usersRes.error) setEmployees(usersRes.data);
          if(custsRes.data && !custsRes.error) setCustomers(custsRes.data);
          if(memosRes.data && !memosRes.error) setMemos(memosRes.data);
        } catch (err) {
          console.error("클라우드 연동 실패:", err);
        }
      };

      useEffect(() => {
        fetchCloudData();
        const interval = setInterval(fetchCloudData, 5000); 
        return () => clearInterval(interval);
      }, []);

      useEffect(() => {
        if (currentUser) setIsAuthenticated(true);
      }, [currentUser]);

      useEffect(() => {
        if (!currentUser) return;
        setMyProperties(properties.filter(p => p.user_id === currentUser.loginId));
      }, [properties, currentUser]);

      const handleAuth = async (type, data) => {
        await fetchCloudData();

        if (type === 'login') {
          const user = employees.find(emp => emp.loginId === data.loginId && emp.password === data.password);
          if (user) {
            safeStorage.setItem('crm_loggedInUser_local', JSON.stringify(user));
            setCurrentUser(user);
            setIsAuthenticated(true);
            setActiveTab('properties'); // 로그인 성공 시에도 무조건 내 물건 관리 탭으로
            return { success: true };
          }
          return { success: false, message: '아이디 또는 비밀번호가 일치하지 않습니다.' };
        } 
        
        if (type === 'signup') {
          const exists = employees.some(emp => emp.loginId === data.loginId);
          if (exists) return { success: false, message: '이미 존재하는 아이디입니다.' };
          
          const newUser = {
            id: `E-${Date.now()}`,
            loginId: data.loginId,
            password: data.password,
            name: data.name,
            phone: data.phone,
            department: data.department || '신규 사원',
            date: new Date().toISOString().split('T')[0]
          };
          
          if(supabase) await supabase.from('crm_users').insert([newUser]);
          setEmployees(prev => [newUser, ...prev]);
          safeStorage.setItem('crm_loggedInUser_local', JSON.stringify(newUser));
          setCurrentUser(newUser);
          setIsAuthenticated(true);
          setActiveTab('properties');
          return { success: true };
        }
      };

      const handleLogout = () => {
        safeStorage.removeItem('crm_loggedInUser_local');
        setIsAuthenticated(false);
        setCurrentUser(null);
      };

      const handleSaveProperty = async (prop) => {
        const finalProp = { 
          ...prop, 
          id: prop.id || `P-${Date.now()}`,
          user_id: currentUser.loginId, 
          registrant: currentUser.name,
          date: prop.date || new Date().toISOString().split('T')[0] // 등록일자
        };
        
        if(supabase) await supabase.from('crm_properties').upsert(finalProp);
        
        setProperties(prev => {
          const idx = prev.findIndex(p => p.id === finalProp.id);
          if(idx >= 0) { const n=[...prev]; n[idx]=finalProp; return n; }
          return [finalProp, ...prev];
        });

        setSelectedProperty(finalProp);
        setCurrentView('detail');
      };

      const handleDeleteProperty = async (propertyId) => {
        if(supabase) await supabase.from('crm_properties').delete().eq('id', propertyId);
        setProperties(prev => prev.filter(p => p.id !== propertyId));
        setCurrentView('list');
        setSelectedProperty(null);
      };

      const changeTab = (tab) => {
        setActiveTab(tab);
        setSearchTerm('');
        setIsMobileMenuOpen(false); 
        setCurrentView('list');
      };

      const filteredMyProperties = myProperties.filter(p => 
        p.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
        (p.address||'').toLowerCase().includes(searchTerm.toLowerCase())
      );

      if (!isAuthenticated) {
        return <AuthView onAuth={handleAuth} />;
      }

      return (
        <div className="flex flex-col md:flex-row h-screen bg-slate-50 font-sans text-slate-800">
          <div className="md:hidden flex items-center justify-between bg-slate-900 text-white p-4 z-30 shadow-md">
            <div className="flex items-center gap-2">
              <Building2 className="w-6 h-6 text-blue-400" />
              <h1 className="text-lg font-bold tracking-tight">빌딩탭 <span className="text-xs font-normal text-blue-200 ml-1">최신버전</span></h1>
            </div>
            <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="p-2 -mr-2 text-slate-300">
              <Bars className="w-6 h-6" />
            </button>
          </div>

          <aside className={`${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} md:translate-x-0 fixed md:static inset-y-0 left-0 z-50 w-64 bg-slate-900 text-white flex flex-col transition-transform duration-300`}>
            <div className="p-6 border-b border-slate-800 hidden md:block">
              <div className="flex items-center gap-3">
                <Building2 className="w-8 h-8 text-blue-400" />
                <h1 className="text-xl font-bold tracking-tight">빌딩탭 <span className="text-xs font-normal text-blue-300 ml-1">최신버전</span></h1>
              </div>
            </div>
            
            <nav className="flex-1 p-4 space-y-2 overflow-y-auto mt-4 md:mt-0">
              {/* 💡 1순위: 내 물건 관리, 2순위: 캘린더 로 교체된 메뉴 */}
              <SidebarItem icon={<List />} label="내 물건 관리" active={activeTab === 'properties'} onClick={() => changeTab('properties')} />
              <SidebarItem icon={<CalendarIcon />} label="개인 캘린더" active={activeTab === 'calendar'} onClick={() => changeTab('calendar')} />
              <SidebarItem icon={<Users />} label="고객 관리(매수자)" active={activeTab === 'customers'} onClick={() => changeTab('customers')} />
              <SidebarItem icon={<UserCircle />} label="사원 목록" active={activeTab === 'employees'} onClick={() => changeTab('employees')} />
              <div className="pt-4 mt-4 border-t border-slate-800">
                <SidebarItem icon={<Lock />} label="로그아웃" active={false} onClick={handleLogout} />
              </div>
            </nav>
            
            <div className="p-4 border-t border-slate-800 mt-auto bg-slate-900">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-bold text-white shrink-0">
                  {currentUser.name.charAt(0)}
                </div>
                <div className="truncate">
                  <p className="text-sm font-medium truncate">{currentUser.name} 님</p>
                  <p className="text-xs text-slate-400 truncate">{currentUser.department}</p>
                </div>
              </div>
            </div>
          </aside>

          <main className="flex-1 flex flex-col h-[calc(100vh-60px)] md:h-screen overflow-hidden">
            <header className="bg-white border-b border-slate-200 flex flex-col sm:flex-row items-start sm:items-center justify-between p-4 md:px-8 gap-4 shrink-0">
              <h2 className="text-lg md:text-xl font-semibold text-slate-800">
                {activeTab === 'properties' ? '내 물건 관리' : activeTab === 'calendar' ? '개인 캘린더' : activeTab === 'customers' ? '고객 관리' : '사원 목록'}
              </h2>
              <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-3 w-full sm:w-auto">
                <div className="relative w-full sm:w-auto">
                  <Search className="w-4 h-4 absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400" />
                  <input type="text" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} placeholder="검색어 입력..." className="w-full sm:w-56 md:w-64 pl-9 pr-4 py-2 border rounded-lg text-sm bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500" />
                </div>
                
                {activeTab === 'properties' && currentView === 'list' && (
                  <button className="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold flex justify-center items-center gap-2 whitespace-nowrap" onClick={() => { setSelectedProperty(null); setCurrentView('form'); }}>
                    <Plus className="w-4 h-4" /> 신규 등록
                  </button>
                )}
                {activeTab === 'customers' && currentCustomerView === 'list' && (
                  <button className="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold flex justify-center items-center gap-2" onClick={() => setCurrentCustomerView('form')}>
                    <Plus className="w-4 h-4" /> 손님 등록
                  </button>
                )}
              </div>
            </header>

            <div className="flex-1 overflow-y-auto p-4 md:p-8 bg-slate-100 sm:bg-transparent">
              {activeTab === 'properties' && (
                <>
                  {currentView === 'list' && <PropertyListView properties={filteredMyProperties} onViewDetail={(p) => { setSelectedProperty(p); setCurrentView('detail'); }} />}
                  {currentView === 'detail' && <PropertyDetailView property={selectedProperty} onBack={() => setCurrentView('list')} onEdit={() => setCurrentView('form')} onDelete={handleDeleteProperty} currentUser={currentUser} onUpdate={handleSaveProperty} />}
                  {currentView === 'form' && <PropertyFormView initialData={selectedProperty} onBack={() => setCurrentView('list')} onSave={handleSaveProperty} currentUser={currentUser} />}
                </>
              )}
              {activeTab === 'calendar' && <CalendarView currentUser={currentUser} properties={myProperties} memos={memos} setMemos={setMemos} />}
              
              {activeTab === 'customers' && (
                <>
                  {currentCustomerView === 'list' && <CustomerListView customers={customers.filter(c => c.name.includes(searchTerm))} />}
                  {currentCustomerView === 'form' && (
                    <CustomerFormView onBack={() => setCurrentCustomerView('list')} onSave={async (c) => {
                      const newCust = { ...c, id: `C-${Date.now()}`, date: new Date().toISOString().split('T')[0] };
                      if(supabase) await supabase.from('crm_customers').insert([newCust]);
                      setCustomers(prev => [...prev, newCust]);
                      setCurrentCustomerView('list');
                    }} />
                  )}
                </>
              )}

              {activeTab === 'employees' && (
                <EmployeeListView employees={employees.filter(e => e.name.includes(searchTerm))} />
              )}
            </div>
          </main>
        </div>
      );
    }

    function AuthView({ onAuth }) {
      const [isLoginMode, setIsLoginMode] = useState(true);
      const [errorMsg, setErrorMsg] = useState('');
      const [formData, setFormData] = useState({ 
        loginId: safeStorage.getItem('crm_saved_id') || '', 
        password: '', name: '', phone: '', department: '' 
      });
      const [rememberId, setRememberId] = useState(!!safeStorage.getItem('crm_saved_id'));

      const handleChange = (e) => setFormData({ ...formData, [e.target.name]: e.target.value });

      const handleSubmit = async (e) => {
        e.preventDefault();
        setErrorMsg('');
        
        if (rememberId && isLoginMode) {
          safeStorage.setItem('crm_saved_id', formData.loginId);
        } else if (!rememberId && isLoginMode) {
          safeStorage.removeItem('crm_saved_id');
        }

        try {
          const result = await onAuth(isLoginMode ? 'login' : 'signup', formData);
          if (result && !result.success) setErrorMsg(result.message);
        } catch (err) {
          setErrorMsg('통신 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
        }
      };

      return (
        <div className="flex min-h-screen items-center justify-center bg-slate-100 p-4">
          <div className="w-full max-w-md bg-white p-8 rounded-2xl shadow-xl">
            <div className="flex flex-col items-center justify-center mb-6">
              <div className="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mb-4"><Building2 className="w-8 h-8 text-blue-600" /></div>
              <h1 className="text-2xl font-extrabold text-slate-900">빌딩탭 <span className="text-sm font-normal text-blue-500">최신버전</span></h1>
              <p className="text-sm text-slate-500 mt-2">부동산 매물 관리의 시작</p>
            </div>

            <div className="flex p-1 bg-slate-100 rounded-lg mb-6">
              <button onClick={() => {setIsLoginMode(true); setErrorMsg('');}} className={`flex-1 py-2 text-sm font-bold rounded-md ${isLoginMode ? 'bg-white text-blue-600 shadow' : 'text-slate-500'}`}>로그인</button>
              <button onClick={() => {setIsLoginMode(false); setErrorMsg('');}} className={`flex-1 py-2 text-sm font-bold rounded-md ${!isLoginMode ? 'bg-white text-blue-600 shadow' : 'text-slate-500'}`}>사원 가입</button>
            </div>

            <form onSubmit={handleSubmit} className="space-y-4">
              <input required type="text" name="loginId" value={formData.loginId} onChange={handleChange} placeholder="아이디 입력" className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-200" />
              <input required type="password" name="password" value={formData.password} onChange={handleChange} placeholder="비밀번호 입력" className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-200" />

              {isLoginMode && (
                <label className="flex items-center gap-2 text-sm text-slate-600 mt-2 cursor-pointer font-medium pl-1">
                  <input type="checkbox" checked={rememberId} onChange={(e) => setRememberId(e.target.checked)} className="w-4 h-4 rounded text-blue-600 focus:ring-blue-500 border-gray-300" />
                  아이디 기억하기
                </label>
              )}

              {!isLoginMode && (
                <>
                  <input required type="text" name="name" value={formData.name} onChange={handleChange} placeholder="이름 (홍길동)" className="w-full p-3 border rounded-xl outline-none" />
                  <input required type="text" name="department" value={formData.department} onChange={handleChange} placeholder="소속 (영업1팀)" className="w-full p-3 border rounded-xl outline-none" />
                  <input required type="tel" name="phone" value={formData.phone} onChange={handleChange} placeholder="연락처 (010-0000-0000)" className="w-full p-3 border rounded-xl outline-none" />
                </>
              )}

              {errorMsg && <div className="p-3 bg-red-50 text-red-600 text-sm font-bold rounded-lg text-center">{errorMsg}</div>}

              <button type="submit" className="w-full py-4 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 shadow-md text-lg">
                {isLoginMode ? '로그인' : '가입 완료 및 접속'}
              </button>
            </form>
          </div>
        </div>
      );
    }

    function PropertyListView({ properties, onViewDetail }) {
      const [statusFilter, setStatusFilter] = useState('전체');

      const filtered = useMemo(() => {
        let result = [...properties];
        if (statusFilter !== '전체') result = result.filter(p => (p.status || '보류') === statusFilter);
        result.sort((a, b) => new Date(b.date) - new Date(a.date));
        return result;
      }, [properties, statusFilter]);

      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
          <div className="p-4 border-b bg-slate-50 flex flex-wrap justify-between items-center gap-4">
            <h3 className="font-semibold text-slate-800 flex items-center gap-2"><List className="w-5 h-5 text-blue-600" /> 내 물건 목록 <span className="bg-blue-100 text-blue-600 px-2 rounded-full text-xs">{filtered.length}</span></h3>
            
            <div className="flex bg-slate-200 p-1 rounded-lg">
              {['전체', '보류', '매매', '완료'].map(status => (
                <button key={status} onClick={() => setStatusFilter(status)} className={`px-4 py-1.5 rounded-md text-xs font-bold ${statusFilter === status ? 'bg-white text-blue-600 shadow' : 'text-slate-500'}`}>{status}</button>
              ))}
            </div>
          </div>

          <div className="overflow-x-auto">
            <table className="w-full text-left whitespace-nowrap min-w-[600px]">
              <thead className="bg-slate-50 border-b text-[11px] uppercase text-slate-500">
                <tr><th className="p-3">상태</th><th className="p-3">물건명</th><th className="p-3 text-center">대지(평)</th><th className="p-3 text-center">연면(평)</th><th className="p-3 text-right">매매가</th><th className="p-3 text-right">보증금/월세</th><th className="p-3 text-center">등록일</th></tr>
              </thead>
              <tbody className="divide-y divide-slate-100 text-xs">
                {filtered.length > 0 ? filtered.map((prop) => (
                  <tr key={prop.id} className="hover:bg-blue-50 cursor-pointer" onClick={() => onViewDetail(prop)}>
                    <td className="p-3">
                      <span className={`px-2 py-1 rounded text-[11px] font-bold ${STATUS_BADGE_COLORS[prop.status || '보류']}`}>{prop.status || '보류'}</span>
                    </td>
                    <td className="p-3 font-bold text-blue-600">{prop.name}</td>
                    <td className="p-3 text-center text-slate-600">{getExactPyeong(prop.landArea)}</td>
                    <td className="p-3 text-center text-slate-600">{getExactPyeong(prop.totalFloorArea)}</td>
                    <td className="p-3 text-right font-bold text-red-600">{formatKoreanCurrency(prop.price?.sale)}</td>
                    <td className="p-3 text-right text-slate-700">{formatKoreanCurrency(prop.price?.deposit)} / {formatKoreanCurrency(prop.price?.rent)}</td>
                    <td className="p-3 text-center text-slate-500">{prop.date}</td>
                  </tr>
                )) : <tr><td colSpan="7" className="p-8 text-center text-slate-500">물건이 없습니다.</td></tr>}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function PropertyDetailView({ property, onBack, onEdit, onDelete }) {
      if (!property) return null;
      return (
        <div className="max-w-4xl mx-auto space-y-6 pb-10">
          <div className="flex justify-between items-center">
            <button onClick={onBack} className="flex items-center gap-2 text-slate-500 hover:text-slate-800 font-bold"><ArrowLeft className="w-4 h-4" /> 목록으로 돌아가기</button>
            <div className="flex gap-2">
              <button onClick={onEdit} className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-bold text-blue-600 shadow-sm">수정하기</button>
              <button onClick={() => { if(confirm("삭제하시겠습니까?")) onDelete(property.id); }} className="px-4 py-2 bg-white border border-red-200 text-red-600 rounded-lg text-sm font-bold shadow-sm">삭제</button>
            </div>
          </div>

          <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col md:flex-row justify-between items-start gap-4">
            <div>
              <div className="flex gap-2 mb-3">
                <span className={`px-2.5 py-1 rounded text-xs font-bold ${STATUS_BADGE_COLORS[property.status || '보류']}`}>{property.status || '보류'}</span>
                <span className="px-2.5 py-1 rounded text-xs font-bold bg-slate-100 text-slate-600 border border-slate-200">{property.type || '분류없음'}</span>
              </div>
              <h1 className="text-2xl sm:text-3xl font-bold text-slate-900">{property.name}</h1>
              <p className="text-slate-500 text-sm mt-2 flex items-center gap-1"><MapPin className="w-4 h-4" />{property.address}</p>
            </div>
            <div className="text-right bg-slate-50 p-4 rounded-xl border border-slate-100">
              <p className="text-sm text-slate-500 mb-1">매매가</p>
              <div className="text-3xl font-extrabold text-blue-600">{formatKoreanCurrency(property.price?.sale)}</div>
              <div className="mt-2 text-sm font-bold text-emerald-700">수익률: {getYield(property.price?.sale, property.price?.deposit, property.price?.rent)}%</div>
            </div>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
              <div className="p-4 bg-slate-50 border-b font-bold flex items-center gap-2"><Building2 className="w-5 h-5 text-blue-500"/> 건물 상세</div>
              <div>
                <SpecRow icon={<Maximize />} label="대지면적" value={`${getExactPyeong(property.landArea)}평`} />
                <SpecRow icon={<Maximize />} label="연면적" value={`${getExactPyeong(property.totalFloorArea)}평`} />
                <SpecRow icon={<Percent />} label="건폐/용적률" value={`${property.buildingCoverage || 0}% / ${property.floorAreaRatio || 0}%`} />
                <SpecRow icon={<Building2 />} label="층수" value={`지하 ${property.floorUnderground || 0} / 지상 ${property.floorGround || 0}`} />
                <SpecRow icon={<Car />} label="주차/E.V" value={`${property.parking || 0}대 / ${property.elevators || 0}대`} />
              </div>
            </div>
            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
              <div className="p-4 bg-slate-50 border-b font-bold flex items-center gap-2"><Banknote className="w-5 h-5 text-blue-500"/> 금액/기타</div>
              <div>
                <SpecRow icon={<Banknote />} label="보증금" value={formatKoreanCurrency(property.price?.deposit)} />
                <SpecRow icon={<Banknote />} label="월세" value={formatKoreanCurrency(property.price?.rent)} />
                <SpecRow icon={<User />} label="소유자" value={`${property.ownerName || '-'} / ${property.ownerPhone || '-'}`} />
                <SpecRow icon={<CalendarDays />} label="준공년도" value={property.completionYear || '-'} />
                <SpecRow icon={<UserCircle />} label="등록자" value={property.registrant || '-'} />
              </div>
            </div>
          </div>
        </div>
      );
    }

    function PropertyFormView({ initialData, onBack, onSave }) {
      const [formData, setFormData] = useState(() => initialData || {
        name: '', ownerName: '', ownerPhone: '', type: '빌딩', transactionType: '매매', address: '', 
        landArea: '', totalFloorArea: '', buildingCoverage: '', floorAreaRatio: '', floorUnderground: '', floorGround: '', parking: '', elevators: '', completionYear: '',
        sale: '', deposit: '', rent: '', status: '보류'
      });

      const handleChange = (e) => setFormData({ ...formData, [e.target.name]: e.target.value });
      
      const handleSubmit = (e) => {
        e.preventDefault();
        if(!formData.name) return alert('물건명을 입력하세요.');
        onSave({
          ...formData,
          landArea: Number(formData.landArea),
          totalFloorArea: Number(formData.totalFloorArea),
          price: { sale: Number(formData.sale || 0), deposit: Number(formData.deposit || 0), rent: Number(formData.rent || 0), maintenance: 0 }
        });
      };

      return (
        <div className="max-w-3xl mx-auto pb-10">
          <div className="flex justify-between items-center mb-6">
            <h2 className="text-2xl font-bold">{initialData ? '물건 수정' : '신규 등록'}</h2>
            
            <div className="flex bg-slate-200 p-1 rounded-lg">
              {STATUS_OPTIONS.map(s => (
                <button key={s} type="button" onClick={() => setFormData({...formData, status: s})} 
                  className={`px-4 py-1.5 rounded-md text-sm font-bold ${formData.status === s ? STATUS_BADGE_COLORS[s] : 'text-slate-500'}`}>
                  {s}
                </button>
              ))}
            </div>
          </div>

          <form onSubmit={handleSubmit} className="space-y-6">
            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
              <h3 className="font-bold border-b pb-2 mb-4">기본 정보</h3>
              <div className="grid grid-cols-2 gap-4">
                <FormGroup label="물건명"><input required type="text" name="name" value={formData.name} onChange={handleChange} className="p-2.5 border rounded-lg w-full" /></FormGroup>
                <FormGroup label="소재지"><input required type="text" name="address" value={formData.address} onChange={handleChange} className="p-2.5 border rounded-lg w-full" /></FormGroup>
                <FormGroup label="물건 종류"><select name="type" value={formData.type} onChange={handleChange} className="p-2.5 border rounded-lg w-full"><option>빌딩</option><option>상가</option><option>오피스텔</option></select></FormGroup>
              </div>
            </div>

            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
              <h3 className="font-bold border-b pb-2 mb-4">금액 정보 (단위: 만원)</h3>
              <div className="grid grid-cols-3 gap-4">
                <div>
                  <label className="text-sm font-semibold text-slate-700">매매가</label>
                  <input type="number" name="sale" value={formData.sale} onChange={handleChange} className="p-2.5 border rounded-lg w-full text-right" placeholder="0" />
                  <div className="text-right text-xs text-blue-600 font-bold mt-1">{formatKoreanCurrency(formData.sale)}</div>
                </div>
                <div>
                  <label className="text-sm font-semibold text-slate-700">보증금</label>
                  <input type="number" name="deposit" value={formData.deposit} onChange={handleChange} className="p-2.5 border rounded-lg w-full text-right" placeholder="0" />
                  <div className="text-right text-xs text-blue-600 font-bold mt-1">{formatKoreanCurrency(formData.deposit)}</div>
                </div>
                <div>
                  <label className="text-sm font-semibold text-slate-700">월세</label>
                  <input type="number" name="rent" value={formData.rent} onChange={handleChange} className="p-2.5 border rounded-lg w-full text-right" placeholder="0" />
                  <div className="text-right text-xs text-blue-600 font-bold mt-1">{formatKoreanCurrency(formData.rent)}</div>
                </div>
              </div>
            </div>

            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
              <h3 className="font-bold border-b pb-2 mb-4">건물 스펙</h3>
              <div className="grid grid-cols-2 gap-4">
                <FormGroup label="대지면적 (㎡)"><input type="number" name="landArea" value={formData.landArea} onChange={handleChange} className="p-2.5 border rounded-lg w-full" /></FormGroup>
                <FormGroup label="연면적 (㎡)"><input type="number" name="totalFloorArea" value={formData.totalFloorArea} onChange={handleChange} className="p-2.5 border rounded-lg w-full" /></FormGroup>
                <FormGroup label="건폐율(%)"><input type="number" name="buildingCoverage" value={formData.buildingCoverage} onChange={handleChange} className="p-2.5 border rounded-lg w-full" /></FormGroup>
                <FormGroup label="용적률(%)"><input type="number" name="floorAreaRatio" value={formData.floorAreaRatio} onChange={handleChange} className="p-2.5 border rounded-lg w-full" /></FormGroup>
              </div>
            </div>

            <div className="flex gap-4">
              <button type="button" onClick={onBack} className="flex-1 py-4 bg-slate-200 font-bold rounded-xl text-slate-700">취소</button>
              <button type="submit" className="flex-[2] py-4 bg-blue-600 font-bold rounded-xl text-white shadow-md">저장하기</button>
            </div>
          </form>
        </div>
      );
    }

    function CalendarView({ currentUser, properties, memos, setMemos }) {
      const [date, setDate] = useState(new Date());
      const [editingDate, setEditingDate] = useState(null);
      const [newMemo, setNewMemo] = useState('');

      const year = date.getFullYear();
      const month = date.getMonth();

      const saveMemo = async (dayStr) => {
        if (!newMemo.trim()) return setEditingDate(null);
        const newObj = { id: `M-${Date.now()}`, user_id: currentUser.loginId, dateStr: dayStr, text: newMemo.trim() };
        if (supabase) await supabase.from('crm_memos').insert([newObj]);
        setMemos(prev => [...prev, newObj]);
        setEditingDate(null);
      };

      const deleteMemo = async (e, id) => {
        e.stopPropagation();
        if (supabase) await supabase.from('crm_memos').delete().eq('id', id);
        setMemos(prev => prev.filter(m => m.id !== id));
      };

      const renderDays = () => {
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const firstDay = new Date(year, month, 1).getDay();
        const days = [];
        for (let i = 0; i < firstDay; i++) days.push(<div key={`e-${i}`} className="bg-slate-50 border rounded-lg"></div>);
        
        for (let d = 1; d <= daysInMonth; d++) {
          const dayStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
          const isToday = new Date().toDateString() === new Date(year, month, d).toDateString();
          const dayMemos = memos.filter(m => m.dateStr === dayStr && m.user_id === currentUser.loginId);
          
          const completedCount = properties.filter(p => p.date === dayStr && p.status === '완료').length;

          days.push(
            <div key={d} onClick={() => { setEditingDate(dayStr); setNewMemo(''); }} className={`relative min-h-[100px] p-2 border rounded-lg cursor-pointer hover:border-blue-400 ${isToday ? 'bg-blue-50 border-blue-300' : 'bg-white'}`}>
              <div className="font-bold text-sm mb-1">{d}</div>
              
              {/* 💡 일정 추가 및 휴지통(삭제) 아이콘 항시 노출 */}
              {dayMemos.map(m => (
                <div key={m.id} className="text-[11px] bg-blue-100 text-blue-800 p-1 mb-1 rounded flex justify-between items-center gap-1">
                  <span className="truncate flex-1">{m.text}</span>
                  <span onClick={(e) => deleteMemo(e, m.id)} className="text-red-500 hover:text-red-700 cursor-pointer p-0.5 shrink-0"><Trash2 className="w-3 h-3"/></span>
                </div>
              ))}

              {/* 💡 '완료' 처리된 물건 건수 표시 */}
              {completedCount > 0 && (
                <div className="text-[11px] bg-red-100 text-red-700 p-1 rounded font-bold border border-red-200 mt-1 text-center">
                  작업완료 : {completedCount}건
                </div>
              )}

              {editingDate === dayStr && (
                <div className="mt-1" onClick={e => e.stopPropagation()}>
                  <input autoFocus type="text" value={newMemo} onChange={e => setNewMemo(e.target.value)} onKeyDown={e => e.key === 'Enter' && saveMemo(dayStr)} className="w-full text-xs p-1 border border-blue-400 outline-none rounded" placeholder="일정 입력..." />
                  <button onClick={() => saveMemo(dayStr)} className="w-full mt-1 bg-blue-600 text-white text-[10px] py-1 rounded font-bold">저장</button>
                </div>
              )}
            </div>
          );
        }
        return days;
      };

      return (
        <div className="bg-white p-6 rounded-2xl shadow h-full flex flex-col">
          <div className="flex justify-between items-center mb-6">
            <h2 className="text-xl font-bold"><CalendarIcon className="w-6 h-6 inline text-blue-600 mr-2"/>개인 캘린더</h2>
            <div className="flex items-center gap-4">
              <button onClick={() => setDate(new Date(year, month - 1, 1))} className="p-2 hover:bg-slate-100 rounded-full"><ChevronLeft className="w-5 h-5"/></button>
              <span className="font-bold text-lg">{year}년 {month + 1}월</span>
              <button onClick={() => setDate(new Date(year, month + 1, 1))} className="p-2 hover:bg-slate-100 rounded-full"><ChevronRight className="w-5 h-5"/></button>
            </div>
          </div>
          <div className="grid grid-cols-7 gap-2 mb-2 text-center font-bold text-sm">
            <div className="text-red-500">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div className="text-blue-500">토</div>
          </div>
          <div className="grid grid-cols-7 gap-2 flex-1 overflow-y-auto">{renderDays()}</div>
        </div>
      );
    }

    function EmployeeListView({ employees }) { return <div className="bg-white p-6 rounded shadow"><h3 className="font-bold mb-4">사원 목록</h3>{employees.map(e => <div key={e.id} className="p-3 border-b">{e.name} ({e.department}) - {e.loginId}</div>)}</div>; }
    function CustomerListView({ customers }) { return <div className="bg-white p-6 rounded shadow"><h3 className="font-bold mb-4">고객 목록</h3>{customers.map(c => <div key={c.id} className="p-3 border-b">{c.name} - 예산: {formatKoreanCurrency(c.budget)}</div>)}</div>; }
    function CustomerFormView({ onBack, onSave }) {
      const [formData, setFormData] = useState({ name: '', phone: '', budget: '', region: '' });
      return (
        <div className="bg-white p-6 rounded shadow max-w-lg mx-auto">
           <h3 className="font-bold mb-4 text-lg">손님 등록</h3>
           <input className="w-full border p-2 mb-2 rounded" placeholder="이름" onChange={e => setFormData({...formData, name: e.target.value})} />
           <input className="w-full border p-2 mb-2 rounded" placeholder="전화번호" onChange={e => setFormData({...formData, phone: e.target.value})} />
           <input type="number" className="w-full border p-2 mb-2 rounded" placeholder="금액(만원)" onChange={e => setFormData({...formData, budget: e.target.value})} />
           <input className="w-full border p-2 mb-4 rounded" placeholder="희망지역" onChange={e => setFormData({...formData, region: e.target.value})} />
           <div className="flex gap-2">
             <button onClick={onBack} className="flex-1 bg-slate-200 p-2 rounded font-bold">취소</button>
             <button onClick={() => onSave(formData)} className="flex-1 bg-blue-600 text-white p-2 rounded font-bold">저장</button>
           </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
