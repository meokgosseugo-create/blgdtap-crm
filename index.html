<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>빌딩탭 CRM (안정버전)</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f8fafc; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    input, textarea, button, select, a { -webkit-tap-highlight-color: transparent; }
    input[type="number"]::-webkit-outer-spin-button, input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }
  </style>
</head>
<body>
  <!-- 앱의 전체 컨테이너 -->
  <div id="app" class="flex flex-col md:flex-row h-screen bg-slate-50 font-sans text-slate-800">
    
    <!-- 초기 로딩 화면 -->
    <div id="loadingScreen" class="flex flex-col h-screen w-full items-center justify-center bg-slate-50 text-slate-500 font-bold text-lg absolute inset-0 z-50">
      <i class="fas fa-building w-10 h-10 mb-4 text-blue-500 animate-pulse text-4xl"></i> 
      시스템 준비 중...
    </div>

    <!-- 비로그인 시 화면 (로그인 폼) -->
    <div id="authScreen" class="hidden flex min-h-screen w-full items-center justify-center bg-slate-100 p-4 absolute inset-0 z-40">
      <div class="w-full max-w-md bg-white p-6 sm:p-8 rounded-2xl shadow-xl border border-slate-200">
        <div class="flex flex-col items-center justify-center mb-6">
          <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mb-4 shadow-inner">
            <i class="fas fa-building w-8 h-8 text-blue-600 text-2xl"></i>
          </div>
          <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">빌딩탭</h1>
          <p class="text-sm text-slate-500 mt-2 text-center">부동산 매물 관리의 시작</p>
          <p id="firstLoginMsg" class="hidden text-xs text-blue-600 bg-blue-50 px-3 py-2 rounded-lg font-bold mb-4 mt-4 text-center">최초 접속입니다. '회원가입'을 진행해주세요.</p>
        </div>

        <div class="flex p-1 bg-slate-100 rounded-lg mb-6">
          <button id="tabLogin" class="flex-1 py-2.5 text-sm font-bold rounded-md transition-all bg-white text-blue-600 shadow" onclick="switchAuthTab('login')">로그인</button>
          <button id="tabSignup" class="flex-1 py-2.5 text-sm font-bold rounded-md transition-all text-slate-500" onclick="switchAuthTab('signup')">회원가입</button>
        </div>

        <div class="space-y-4">
          <div class="space-y-1.5">
            <label class="text-sm font-bold text-slate-700">아이디</label>
            <div class="relative">
              <i class="fas fa-user w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
              <input type="text" id="authLoginId" placeholder="아이디 입력" class="w-full pl-12 pr-4 py-3 border border-slate-300 rounded-xl outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200" />
            </div>
          </div>
          <div class="space-y-1.5">
            <label class="text-sm font-bold text-slate-700">비밀번호</label>
            <div class="relative">
              <i class="fas fa-lock w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
              <input type="password" id="authPassword" placeholder="비밀번호 입력" class="w-full pl-12 pr-4 py-3 border border-slate-300 rounded-xl outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200" />
            </div>
          </div>

          <!-- 회원가입 추가 필드 -->
          <div id="signupFields" class="hidden space-y-4 pt-4 border-t border-slate-100 mt-2">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div class="space-y-1.5">
                <label class="text-sm font-bold text-slate-700">이름</label>
                <input type="text" id="authName" placeholder="홍길동" class="w-full px-4 py-3 border border-slate-300 rounded-xl outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200" />
              </div>
              <div class="space-y-1.5">
                <label class="text-sm font-bold text-slate-700">소속</label>
                <input type="text" id="authDepartment" placeholder="영업1팀" class="w-full px-4 py-3 border border-slate-300 rounded-xl outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200" />
              </div>
            </div>
            <div class="space-y-1.5">
              <label class="text-sm font-bold text-slate-700">연락처</label>
              <div class="relative">
                <i class="fas fa-phone w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="tel" id="authPhone" placeholder="010-0000-0000" class="w-full pl-12 pr-4 py-3 border border-slate-300 rounded-xl outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200" />
              </div>
            </div>
          </div>

          <div id="authErrorMsg" class="hidden p-3 bg-red-50 text-red-600 text-sm font-bold rounded-lg text-center border border-red-100"></div>

          <button id="authSubmitBtn" onclick="handleAuthSubmit()" class="w-full py-4 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition-all shadow-md mt-6 flex items-center justify-center gap-2 text-lg">
            <i class="fas fa-shield-alt w-5 h-5"></i> 로그인
          </button>
        </div>
      </div>
    </div>

    <!-- 로그인 후 메인 화면 -->
    <div id="mainScreen" class="hidden w-full flex flex-col md:flex-row h-screen">
      <!-- 모바일 상단 바 -->
      <div class="md:hidden flex items-center justify-between bg-slate-900 text-white p-4 z-30 shadow-md sticky top-0">
        <div class="flex items-center gap-2">
          <i class="fas fa-building w-6 h-6 text-blue-400 text-xl"></i>
          <h1 class="text-lg font-bold tracking-tight">빌딩탭</h1>
        </div>
        <button onclick="toggleMobileMenu()" class="p-2 -mr-2 text-slate-300 hover:text-white transition-colors">
          <i class="fas fa-bars w-6 h-6 text-xl"></i>
        </button>
      </div>

      <!-- 사이드바 -->
      <aside id="sidebar" class="-translate-x-full md:translate-x-0 fixed md:static inset-y-0 left-0 z-50 w-64 bg-slate-900 text-white flex flex-col shadow-2xl md:shadow-xl transition-transform duration-300 ease-in-out">
        <div class="p-6 border-b border-slate-800 hidden md:block">
          <div class="flex items-center gap-3">
            <i class="fas fa-building w-8 h-8 text-blue-400 text-3xl"></i>
            <h1 class="text-xl font-bold tracking-tight">빌딩탭</h1>
          </div>
          <p class="text-[11px] text-slate-400 mt-2">부동산 종합 관리 시스템 (로컬 모드)</p>
        </div>
        
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto mt-4 md:mt-0">
          <button onclick="changeTab('calendar')" id="nav-calendar" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-colors text-slate-300 hover:bg-slate-800 hover:text-white"><i class="fas fa-calendar-alt w-5 h-5 text-lg"></i> 개인 캘린더</button>
          <button onclick="changeTab('properties')" id="nav-properties" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-colors bg-blue-600 text-white"><i class="fas fa-list w-5 h-5 text-lg"></i> 내 물건 관리</button>
          <button onclick="changeTab('customers')" id="nav-customers" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-colors text-slate-300 hover:bg-slate-800 hover:text-white"><i class="fas fa-users w-5 h-5 text-lg"></i> 고객 관리(매수자)</button>
          <button onclick="changeTab('employees')" id="nav-employees" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-colors text-slate-300 hover:bg-slate-800 hover:text-white"><i class="fas fa-user-circle w-5 h-5 text-lg"></i> 사원 등록</button>
          <div class="pt-4 mt-4 border-t border-slate-800">
            <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-colors text-slate-300 hover:bg-slate-800 hover:text-white"><i class="fas fa-lock w-5 h-5 text-lg"></i> 로그아웃</button>
          </div>
        </nav>
        
        <div class="p-4 border-t border-slate-800 mt-auto bg-slate-900">
          <div class="flex items-center gap-3">
            <div id="userAvatar" class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-bold shadow-inner shrink-0">U</div>
            <div class="truncate">
              <p id="userNameDisplay" class="text-sm font-medium truncate">사용자 님</p>
              <p id="userDeptDisplay" class="text-xs text-slate-400 truncate">관리자</p>
            </div>
          </div>
        </div>
      </aside>

      <!-- 메인 콘텐츠 영역 -->
      <main class="flex-1 flex flex-col h-[calc(100vh-60px)] md:h-screen overflow-hidden w-full relative">
        <header class="bg-white border-b border-slate-200 flex flex-col sm:flex-row items-start sm:items-center justify-between p-4 md:px-8 shadow-sm z-10 gap-4 shrink-0">
          <h2 id="headerTitle" class="text-lg md:text-xl font-semibold text-slate-800">내 물건 관리</h2>
          <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-3 w-full sm:w-auto">
            <div class="relative w-full sm:w-auto">
              <i class="fas fa-search w-4 h-4 absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
              <input type="text" id="searchInput" oninput="renderCurrentView()" placeholder="검색어 입력..." class="w-full sm:w-56 md:w-64 pl-9 pr-4 py-2.5 sm:py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 transition-all focus:bg-white" />
            </div>
            
            <button id="headerActionBtn" onclick="openForm()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 sm:py-2 rounded-lg text-sm font-bold transition-colors flex items-center justify-center gap-2 whitespace-nowrap shadow-sm w-full sm:w-auto">
              <i class="fas fa-plus w-4 h-4"></i> 신규 등록
            </button>
          </div>
        </header>

        <!-- 뷰 렌더링 영역 -->
        <div id="main-scroll-area" class="flex-1 overflow-y-auto overflow-x-hidden p-4 md:p-8 relative bg-slate-100 sm:bg-transparent">
          <div id="viewContainer" class="w-full h-full"></div>
        </div>
      </main>
    </div>
  </div>

  <script>
    // =====================================================================
    // [1] 데이터 및 상태 관리 (Local Storage 기반)
    // =====================================================================
    let _properties = JSON.parse(localStorage.getItem('crm_props_local')) || [];
    let _employees = JSON.parse(localStorage.getItem('crm_users_local')) || [];
    let _customers = JSON.parse(localStorage.getItem('crm_custs_local')) || [];
    let _currentUser = JSON.parse(localStorage.getItem('crm_loggedInUser_local')) || null;
    
    let _activeTab = 'properties'; // properties, employees, customers, calendar
    let _currentViewMode = 'list'; // list, detail, form
    let _selectedItem = null;
    let _authMode = 'login'; // login, signup

    // =====================================================================
    // [2] 유틸리티 함수
    // =====================================================================
    const formatKoreanCurrency = (val) => {
      let num = Math.round(Number(val) || 0);
      if (num === 0) return '0원';
      const eok = Math.floor(num / 10000); 
      const man = num % 10000;
      let result = '';
      if (eok > 0) result += `${eok}억 `;
      if (man > 0) result += `${man.toLocaleString()}만`;
      return result.trim() + '원';
    };

    const getYield = (sale, deposit, rent) => {
      const s = Number(sale) || 0; 
      const d = Number(deposit) || 0; 
      const r = Number(rent) || 0;
      if (s === 0 || s <= d || r === 0) return '0.0';
      return (((r * 12) / (s - d)) * 100).toFixed(1);
    };

    const getExactPyeong = (sqm) => ((Number(sqm) || 0) * 0.3025).toFixed(2);

    // =====================================================================
    // [3] 초기화 및 로그인 처리
    // =====================================================================
    function init() {
      document.getElementById('loadingScreen').classList.add('hidden');
      if (_currentUser) {
        showMainScreen();
      } else {
        document.getElementById('authScreen').classList.remove('hidden');
        if (_employees.length === 0) {
          document.getElementById('firstLoginMsg').classList.remove('hidden');
        }
      }
    }

    function switchAuthTab(mode) {
      _authMode = mode;
      document.getElementById('authErrorMsg').classList.add('hidden');
      
      if (mode === 'login') {
        document.getElementById('tabLogin').className = "flex-1 py-2.5 text-sm font-bold rounded-md transition-all bg-white text-blue-600 shadow";
        document.getElementById('tabSignup').className = "flex-1 py-2.5 text-sm font-bold rounded-md transition-all text-slate-500";
        document.getElementById('signupFields').classList.add('hidden');
        document.getElementById('authSubmitBtn').innerHTML = '<i class="fas fa-shield-alt w-5 h-5"></i> 로그인';
      } else {
        document.getElementById('tabSignup').className = "flex-1 py-2.5 text-sm font-bold rounded-md transition-all bg-white text-blue-600 shadow";
        document.getElementById('tabLogin').className = "flex-1 py-2.5 text-sm font-bold rounded-md transition-all text-slate-500";
        document.getElementById('signupFields').classList.remove('hidden');
        document.getElementById('authSubmitBtn').innerHTML = '계정 생성 및 접속';
      }
    }

    function handleAuthSubmit() {
      const loginId = document.getElementById('authLoginId').value;
      const pass = document.getElementById('authPassword').value;
      const errorMsg = document.getElementById('authErrorMsg');

      if (!loginId || !pass) {
        errorMsg.innerText = "아이디와 비밀번호를 입력해주세요.";
        errorMsg.classList.remove('hidden');
        return;
      }

      if (_authMode === 'login') {
        const user = _employees.find(emp => emp.loginId === loginId && emp.password === pass);
        if (user) {
          _currentUser = user;
          localStorage.setItem('crm_loggedInUser_local', JSON.stringify(user));
          showMainScreen();
        } else {
          errorMsg.innerText = "아이디 또는 비밀번호가 일치하지 않습니다.";
          errorMsg.classList.remove('hidden');
        }
      } else {
        const name = document.getElementById('authName').value;
        const dept = document.getElementById('authDepartment').value;
        const phone = document.getElementById('authPhone').value;

        if (!name || !dept || !phone) {
          errorMsg.innerText = "모든 회원정보를 입력해주세요.";
          errorMsg.classList.remove('hidden');
          return;
        }

        const exists = _employees.some(emp => emp.loginId === loginId);
        if (exists) {
          errorMsg.innerText = "이미 존재하는 아이디입니다.";
          errorMsg.classList.remove('hidden');
          return;
        }

        const newUser = {
          id: `E-${Date.now()}`,
          loginId: loginId,
          password: pass,
          name: name,
          phone: phone,
          department: dept,
          date: new Date().toISOString().split('T')[0]
        };

        _employees.unshift(newUser);
        localStorage.setItem('crm_users_local', JSON.stringify(_employees));
        
        _currentUser = newUser;
        localStorage.setItem('crm_loggedInUser_local', JSON.stringify(newUser));
        showMainScreen();
      }
    }

    function logout() {
      _currentUser = null;
      localStorage.removeItem('crm_loggedInUser_local');
      document.getElementById('mainScreen').classList.add('hidden');
      document.getElementById('authScreen').classList.remove('hidden');
      document.getElementById('authLoginId').value = '';
      document.getElementById('authPassword').value = '';
      switchAuthTab('login');
    }

    // =====================================================================
    // [4] 화면 렌더링 및 네비게이션
    // =====================================================================
    function showMainScreen() {
      document.getElementById('authScreen').classList.add('hidden');
      document.getElementById('mainScreen').classList.remove('hidden');
      
      document.getElementById('userAvatar').innerText = _currentUser.name.charAt(0);
      document.getElementById('userNameDisplay').innerText = `${_currentUser.name} 님`;
      document.getElementById('userDeptDisplay').innerText = _currentUser.department;

      changeTab('properties');
    }

    function toggleMobileMenu() {
      const sidebar = document.getElementById('sidebar');
      if (sidebar.classList.contains('-translate-x-full')) {
        sidebar.classList.remove('-translate-x-full');
      } else {
        sidebar.classList.add('-translate-x-full');
      }
    }

    function changeTab(tab) {
      _activeTab = tab;
      _currentViewMode = 'list';
      _selectedItem = null;
      document.getElementById('searchInput').value = '';
      
      // Update Sidebar Active State
      const navIds = ['nav-calendar', 'nav-properties', 'nav-customers', 'nav-employees'];
      navIds.forEach(id => {
        const el = document.getElementById(id);
        if(id === `nav-${tab}`) {
          el.className = "w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-colors bg-blue-600 text-white";
        } else {
          el.className = "w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-colors text-slate-300 hover:bg-slate-800 hover:text-white";
        }
      });

      // Update Header Title and Action Button
      const headerTitle = document.getElementById('headerTitle');
      const actionBtn = document.getElementById('headerActionBtn');
      actionBtn.classList.remove('hidden');

      if(tab === 'properties') {
        headerTitle.innerText = "내 물건 관리";
        actionBtn.innerHTML = '<i class="fas fa-plus w-4 h-4"></i> 신규 등록';
      } else if (tab === 'employees') {
        headerTitle.innerText = "사원 등록";
        actionBtn.innerHTML = '<i class="fas fa-plus w-4 h-4"></i> 사원 추가';
      } else if (tab === 'customers') {
        headerTitle.innerText = "고객 관리(매수자)";
        actionBtn.innerHTML = '<i class="fas fa-plus w-4 h-4"></i> 손님 등록';
      } else if (tab === 'calendar') {
        headerTitle.innerText = "개인 캘린더";
        actionBtn.classList.add('hidden');
      }

      // 닫기 모바일 메뉴
      document.getElementById('sidebar').classList.add('-translate-x-full');

      renderCurrentView();
    }

    function openForm(item = null) {
      _currentViewMode = 'form';
      _selectedItem = item;
      document.getElementById('headerActionBtn').classList.add('hidden');
      renderCurrentView();
    }

    function goBackToList() {
      _currentViewMode = 'list';
      _selectedItem = null;
      document.getElementById('headerActionBtn').classList.remove('hidden');
      renderCurrentView();
    }

    function renderCurrentView() {
      const container = document.getElementById('viewContainer');
      const term = document.getElementById('searchInput').value.toLowerCase();

      if (_activeTab === 'properties') {
        if (_currentViewMode === 'list') {
          const myProps = _properties.filter(p => p.user_id === _currentUser.loginId && (p.name.toLowerCase().includes(term) || p.address.toLowerCase().includes(term)));
          container.innerHTML = renderPropertyList(myProps);
        } else if (_currentViewMode === 'form') {
          container.innerHTML = renderPropertyForm();
        }
      } 
      else if (_activeTab === 'employees') {
        if (_currentViewMode === 'list') {
          const filtered = _employees.filter(e => e.name.toLowerCase().includes(term) || e.department.toLowerCase().includes(term));
          container.innerHTML = renderEmployeeList(filtered);
        } else if (_currentViewMode === 'form') {
          container.innerHTML = renderEmployeeForm();
        }
      }
      else if (_activeTab === 'customers') {
        if (_currentViewMode === 'list') {
          const filtered = _customers.filter(c => c.name.toLowerCase().includes(term) || c.region.toLowerCase().includes(term));
          container.innerHTML = renderCustomerList(filtered);
        } else if (_currentViewMode === 'form') {
          container.innerHTML = renderCustomerForm();
        }
      }
      else if (_activeTab === 'calendar') {
        container.innerHTML = renderCalendar();
      }
    }

    // =====================================================================
    // [5] 물건 관리 렌더링
    // =====================================================================
    function renderPropertyList(list) {
      if (list.length === 0) {
        return `
          <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden w-full p-10 text-center text-slate-500 font-medium">
            <p>등록된 물건이 없습니다.<br/>우측 상단의 '신규 등록' 버튼을 눌러보세요.</p>
          </div>
        `;
      }

      let rows = list.map(prop => `
        <tr class="hover:bg-blue-50/50 transition-colors cursor-pointer border-b border-slate-100" onclick="alert('상세보기 및 수정은 전체 목록에서만 지원되는 라이트 버전입니다.')">
          <td class="p-3">
            <span class="px-2 py-0.5 rounded text-[11px] font-bold ${prop.status === '완료' ? 'bg-red-500 text-white' : prop.status === '매매' ? 'bg-slate-100 border' : 'bg-slate-200'}">${prop.status || '보류'}</span>
          </td>
          <td class="p-3 text-blue-600 font-bold">${prop.name}</td>
          <td class="p-3 text-center text-slate-600">${getExactPyeong(prop.landArea)}</td>
          <td class="p-3 text-right font-bold text-red-600">${formatKoreanCurrency(prop.price?.sale)}</td>
          <td class="p-3 text-right text-slate-700">${formatKoreanCurrency(prop.price?.deposit)}</td>
          <td class="p-3 text-right text-slate-700">${formatKoreanCurrency(prop.price?.rent)}</td>
          <td class="p-3 text-center font-bold text-emerald-600">${prop.transactionType === '매매' ? getYield(prop.price?.sale, prop.price?.deposit, prop.price?.rent) + '%' : '-'}</td>
          <td class="p-3 text-center">
            <button onclick="event.stopPropagation(); deleteProperty('${prop.id}')" class="text-red-500 hover:text-red-700 font-bold text-xs p-1">삭제</button>
          </td>
        </tr>
      `).join('');

      return `
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden w-full flex flex-col">
          <div class="p-4 md:p-5 border-b border-slate-200 flex justify-between items-center bg-slate-50/50 gap-4">
            <h3 class="font-semibold text-slate-800 flex items-center gap-2 text-sm md:text-base shrink-0">
              <i class="fas fa-list text-blue-600"></i> 내 물건 목록 <span class="text-blue-600 bg-blue-100 px-2 py-0.5 rounded-full text-xs">${list.length}</span>
            </h3>
          </div>
          <div class="overflow-x-auto w-full">
            <table class="w-full text-left border-collapse whitespace-nowrap min-w-[800px]">
              <thead>
                <tr class="bg-slate-50 border-b border-slate-200 text-[11px] uppercase tracking-wider text-slate-500">
                  <th class="p-3 font-medium">상태</th>
                  <th class="p-3 font-medium">물건명</th>
                  <th class="p-3 font-medium text-center">대지(평)</th>
                  <th class="p-3 font-medium text-right">매매가</th>
                  <th class="p-3 font-medium text-right">보증금</th>
                  <th class="p-3 font-medium text-right">월세</th>
                  <th class="p-3 font-medium text-center text-emerald-600">수익률</th>
                  <th class="p-3 font-medium text-center">관리</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-slate-100 text-xs">
                ${rows}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function renderPropertyForm() {
      return `
        <div class="max-w-4xl mx-auto pb-10 relative">
          <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl sm:text-2xl font-bold text-slate-800">신규 물건 등록</h2>
            <button onclick="goBackToList()" class="text-slate-500 hover:text-slate-800 text-sm font-bold bg-slate-200 px-4 py-2.5 rounded-lg text-center transition-colors">취소 및 돌아가기</button>
          </div>
          <div class="bg-white p-5 sm:p-8 rounded-2xl shadow-sm border border-slate-200 space-y-6">
            <h3 class="text-lg font-bold text-slate-800 border-b pb-2"><i class="fas fa-building text-blue-500"></i> 기본 정보</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="text-sm font-semibold text-slate-700">물건명 (필수)</label>
                <input type="text" id="propName" class="w-full p-3 border border-slate-300 rounded-lg mt-1" placeholder="예: 엠파이어 빌딩" />
              </div>
              <div>
                <label class="text-sm font-semibold text-slate-700">거래방식</label>
                <select id="propTransType" class="w-full p-3 border border-slate-300 rounded-lg mt-1">
                  <option>매매</option><option>전세</option><option>월세</option>
                </select>
              </div>
            </div>
            
            <h3 class="text-lg font-bold text-slate-800 border-b pb-2 mt-6"><i class="fas fa-money-bill-wave text-blue-500"></i> 금액 정보 (단위: 만원)</h3>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
              <div><label class="text-sm font-semibold text-slate-700">매매가</label><input type="number" id="propSale" class="w-full p-3 border rounded-lg mt-1 text-right font-bold" placeholder="0" /></div>
              <div><label class="text-sm font-semibold text-slate-700">보증금</label><input type="number" id="propDep" class="w-full p-3 border rounded-lg mt-1 text-right font-bold" placeholder="0" /></div>
              <div><label class="text-sm font-semibold text-slate-700">월세</label><input type="number" id="propRent" class="w-full p-3 border rounded-lg mt-1 text-right font-bold" placeholder="0" /></div>
            </div>

            <div class="pt-6">
              <button onclick="savePropertyFromDOM()" class="w-full py-4 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 text-lg shadow-md">
                <i class="fas fa-save mr-2"></i> 물건 등록하기
              </button>
            </div>
          </div>
        </div>
      `;
    }

    function savePropertyFromDOM() {
      const name = document.getElementById('propName').value;
      if (!name) { alert("물건명을 입력해주세요."); return; }

      const newProp = {
        id: `P-${Date.now()}`,
        user_id: _currentUser.loginId,
        name: name,
        transactionType: document.getElementById('propTransType').value,
        price: {
          sale: Number(document.getElementById('propSale').value) || 0,
          deposit: Number(document.getElementById('propDep').value) || 0,
          rent: Number(document.getElementById('propRent').value) || 0,
          maintenance: 0
        },
        status: '보류',
        date: new Date().toISOString().split('T')[0]
      };

      _properties.unshift(newProp);
      localStorage.setItem('crm_props_local', JSON.stringify(_properties));
      goBackToList();
    }

    function deleteProperty(id) {
      if(confirm("정말 이 물건을 삭제하시겠습니까?")) {
        _properties = _properties.filter(p => p.id !== id);
        localStorage.setItem('crm_props_local', JSON.stringify(_properties));
        renderCurrentView();
      }
    }

    // =====================================================================
    // [6] 사원 및 기타 렌더링
    // =====================================================================
    function renderEmployeeList(list) {
      let rows = list.map(emp => `
        <tr class="hover:bg-blue-50/50 border-b border-slate-100 text-sm">
          <td class="p-4 font-bold text-slate-800">${emp.name}</td>
          <td class="p-4 text-slate-600">${emp.department}</td>
          <td class="p-4 text-blue-600 font-medium">${emp.loginId}</td>
          <td class="p-4 text-slate-600">${emp.phone}</td>
          <td class="p-4 text-slate-500">${emp.date}</td>
        </tr>
      `).join('');

      return `
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden w-full">
          <div class="p-5 border-b border-slate-200 bg-slate-50/50"><h3 class="font-semibold text-slate-800 flex items-center gap-2"><i class="fas fa-user-circle text-blue-600"></i> 사원 목록</h3></div>
          <div class="overflow-x-auto w-full">
            <table class="w-full text-left border-collapse whitespace-nowrap min-w-[600px]">
              <thead>
                <tr class="bg-slate-50 border-b border-slate-200 text-xs uppercase tracking-wider text-slate-500">
                  <th class="p-4 font-medium">이름</th><th class="p-4 font-medium">소속</th><th class="p-4 font-medium">아이디</th><th class="p-4 font-medium">전화번호</th><th class="p-4 font-medium">등록일</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-slate-100">${rows || '<tr><td colspan="5" class="p-6 text-center text-slate-500">등록된 사원이 없습니다.</td></tr>'}</tbody>
            </table>
          </div>
        </div>
      `;
    }

    function renderEmployeeForm() {
      return `
        <div class="max-w-2xl mx-auto pb-10">
          <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-slate-800">사원 등록하기</h2>
            <button onclick="goBackToList()" class="text-slate-500 hover:text-slate-800 text-sm font-medium bg-slate-200 px-3 py-1.5 rounded-lg">취소</button>
          </div>
          <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-4">
            <div><label class="text-sm font-bold text-slate-700">이름</label><input type="text" id="empName" class="w-full p-3 border rounded-xl mt-1" /></div>
            <div><label class="text-sm font-bold text-slate-700">소속</label><input type="text" id="empDept" class="w-full p-3 border rounded-xl mt-1" /></div>
            <div><label class="text-sm font-bold text-slate-700">아이디</label><input type="text" id="empId" class="w-full p-3 border rounded-xl mt-1" /></div>
            <div><label class="text-sm font-bold text-slate-700">비밀번호</label><input type="password" id="empPw" class="w-full p-3 border rounded-xl mt-1" /></div>
            <div><label class="text-sm font-bold text-slate-700">전화번호</label><input type="text" id="empPhone" class="w-full p-3 border rounded-xl mt-1" /></div>
            <button onclick="saveEmpFromDOM()" class="w-full py-4 bg-blue-600 text-white font-bold rounded-xl mt-4">사원 등록</button>
          </div>
        </div>
      `;
    }

    function saveEmpFromDOM() {
      const id = document.getElementById('empId').value;
      if (!id) return;
      _employees.unshift({
        id: `E-${Date.now()}`,
        loginId: id,
        password: document.getElementById('empPw').value,
        name: document.getElementById('empName').value,
        department: document.getElementById('empDept').value,
        phone: document.getElementById('empPhone').value,
        date: new Date().toISOString().split('T')[0]
      });
      localStorage.setItem('crm_users_local', JSON.stringify(_employees));
      goBackToList();
    }

    function renderCustomerList(list) {
      let rows = list.map(c => `
        <tr class="hover:bg-blue-50/50 border-b border-slate-100 text-sm">
          <td class="p-4 font-bold text-slate-800">${c.name}</td>
          <td class="p-4 text-slate-600">${c.phone}</td>
          <td class="p-4 text-right font-bold text-red-600">${formatKoreanCurrency(c.budget)}</td>
          <td class="p-4 text-slate-600">${c.region}</td>
        </tr>
      `).join('');

      return `
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden w-full">
          <div class="p-5 border-b border-slate-200 bg-slate-50/50"><h3 class="font-semibold text-slate-800 flex items-center gap-2"><i class="fas fa-users text-blue-600"></i> 손님 목록</h3></div>
          <table class="w-full text-left border-collapse whitespace-nowrap min-w-[600px]">
            <thead>
              <tr class="bg-slate-50 border-b border-slate-200 text-xs uppercase tracking-wider text-slate-500">
                <th class="p-4 font-medium">이름</th><th class="p-4 font-medium">전화번호</th><th class="p-4 font-medium text-right">금액(만원)</th><th class="p-4 font-medium">희망지역</th>
              </tr>
            </thead>
            <tbody>${rows || '<tr><td colspan="4" class="p-6 text-center text-slate-500">등록된 손님이 없습니다.</td></tr>'}</tbody>
          </table>
        </div>
      `;
    }

    function renderCustomerForm() {
      return `
        <div class="max-w-2xl mx-auto pb-10">
          <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-slate-800">손님 등록하기</h2>
            <button onclick="goBackToList()" class="text-slate-500 hover:text-slate-800 text-sm font-medium bg-slate-200 px-3 py-1.5 rounded-lg">취소</button>
          </div>
          <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-4">
            <div><label class="text-sm font-bold text-slate-700">이름</label><input type="text" id="custName" class="w-full p-3 border rounded-xl mt-1" /></div>
            <div><label class="text-sm font-bold text-slate-700">전화번호</label><input type="text" id="custPhone" class="w-full p-3 border rounded-xl mt-1" /></div>
            <div><label class="text-sm font-bold text-slate-700">금액(만원)</label><input type="number" id="custBudget" class="w-full p-3 border rounded-xl mt-1 text-right" placeholder="0" /></div>
            <div><label class="text-sm font-bold text-slate-700">희망지역</label><input type="text" id="custRegion" class="w-full p-3 border rounded-xl mt-1" /></div>
            <button onclick="saveCustFromDOM()" class="w-full py-4 bg-blue-600 text-white font-bold rounded-xl mt-4">손님 등록</button>
          </div>
        </div>
      `;
    }

    function saveCustFromDOM() {
      const name = document.getElementById('custName').value;
      if(!name) return;
      _customers.unshift({
        id: `C-${Date.now()}`,
        name: name,
        phone: document.getElementById('custPhone').value,
        budget: document.getElementById('custBudget').value,
        region: document.getElementById('custRegion').value,
        date: new Date().toISOString().split('T')[0]
      });
      localStorage.setItem('crm_custs_local', JSON.stringify(_customers));
      goBackToList();
    }

    function renderCalendar() {
      return `
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 flex flex-col items-center justify-center h-full text-slate-400">
          <i class="fas fa-calendar-alt text-6xl mb-4 text-blue-200"></i>
          <p class="text-lg font-bold text-slate-600">개인 캘린더 화면입니다.</p>
          <p class="text-sm mt-2">일정 등록 및 관리 기능이 추가될 예정입니다.</p>
        </div>
      `;
    }

    // =====================================================================
    // [7] 앱 부팅
    // =====================================================================
    window.onload = () => {
      init();
    };

  </script>
</body>
</html>
