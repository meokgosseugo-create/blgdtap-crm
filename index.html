<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>원프로젝트 CRM</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel Standalone (JSX 컴파일용) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* 폰트 및 스크롤바 커스텀 */
    body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f8fafc; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    // --- 호환성을 위한 아이콘 렌더링 컴포넌트 ---
    const Icon = ({ name, className }) => {
      let textClass = 'text-base';
      if (className?.includes('w-3')) textClass = 'text-xs';
      else if (className?.includes('w-4')) textClass = 'text-sm';
      else if (className?.includes('w-5')) textClass = 'text-lg';
      else if (className?.includes('w-6')) textClass = 'text-xl';
      else if (className?.includes('w-8')) textClass = 'text-3xl';
      else if (className?.includes('w-12')) textClass = 'text-5xl';
      
      const cleanClassName = (className || '').replace(/\bw-\d+\b/g, '').replace(/\bh-\d+\b/g, '').trim();
      return <i className={`fas ${name} ${textClass} ${cleanClassName} flex items-center justify-center`}></i>;
    };

    const Home = (p) => <Icon name="fa-home" {...p} />;
    const Building2 = (p) => <Icon name="fa-building" {...p} />;
    const Users = (p) => <Icon name="fa-users" {...p} />;
    const Settings = (p) => <Icon name="fa-cog" {...p} />;
    const Plus = (p) => <Icon name="fa-plus" {...p} />;
    const Search = (p) => <Icon name="fa-search" {...p} />;
    const MapPin = (p) => <Icon name="fa-map-marker-alt" {...p} />;
    const Banknote = (p) => <Icon name="fa-money-bill-wave" {...p} />;
    const Maximize = (p) => <Icon name="fa-expand-arrows-alt" {...p} />;
    const Car = (p) => <Icon name="fa-car" {...p} />;
    const List = (p) => <Icon name="fa-list" {...p} />;
    const ArrowLeft = (p) => <Icon name="fa-arrow-left" {...p} />;
    const Save = (p) => <Icon name="fa-save" {...p} />;
    const ImageIcon = (p) => <Icon name="fa-image" {...p} />;
    const CheckCircle2 = (p) => <Icon name="fa-check-circle" {...p} />;
    const FileText = (p) => <Icon name="fa-file-alt" {...p} />;
    const Trash2 = (p) => <Icon name="fa-trash-alt" {...p} />;
    const TrendingUp = (p) => <Icon name="fa-chart-line" {...p} />;
    const UserCircle = (p) => <Icon name="fa-user-circle" {...p} />;
    const Briefcase = (p) => <Icon name="fa-briefcase" {...p} />;
    const CalendarIcon = (p) => <Icon name="fa-calendar-alt" {...p} />;
    const ChevronLeft = (p) => <Icon name="fa-chevron-left" {...p} />;
    const ChevronRight = (p) => <Icon name="fa-chevron-right" {...p} />;
    const Phone = (p) => <Icon name="fa-phone" {...p} />;
    const User = (p) => <Icon name="fa-user" {...p} />;
    const ArrowUpCircle = (p) => <Icon name="fa-arrow-circle-up" {...p} />;
    const Upload = (p) => <Icon name="fa-upload" {...p} />;
    const XCircle = (p) => <Icon name="fa-times-circle" {...p} />;
    const Lock = (p) => <Icon name="fa-lock" {...p} />;
    const KeyRound = (p) => <Icon name="fa-key" {...p} />;
    const ShieldCheck = (p) => <Icon name="fa-shield-alt" {...p} />;
    const MapIcon = (p) => <Icon name="fa-map" {...p} />;
    const CalendarDays = (p) => <Icon name="fa-calendar-day" {...p} />;
    const Percent = (p) => <Icon name="fa-percentage" {...p} />;
    // ------------------------------------------

    const getYield = (sale, deposit, rent) => {
      const s = Number(sale) || 0;
      const d = Number(deposit) || 0;
      const r = Number(rent) || 0;
      if (s === 0 || s <= d || r === 0) return '0.0';
      return (((r * 12) / (s - d)) * 100).toFixed(1);
    };

    const getPricePerPyeong = (sale, landArea) => {
      if (!sale || !landArea) return 0;
      const pyeong = landArea * 0.3025;
      if (pyeong <= 0) return 0;
      return Math.round(sale / pyeong);
    };

    const formatKoreanCurrency = (val) => {
      const num = Number(val);
      if (!num || isNaN(num) || num === 0) return '0원';
      const eok = Math.floor(num / 10000);
      const man = num % 10000;
      let result = '';
      if (eok > 0) result += `${eok}억 `;
      if (man > 0) result += `${man.toLocaleString()}만`;
      return result.trim() + '원';
    };

    const initialProperties = [
      {
        id: 'P-001',
        name: '엠파이어 빌딩',
        ownerName: '홍길동',
        ownerPhone: '010-1234-5678',
        type: '빌딩',
        transactionType: '매매',
        address: '경기도 성남시 분당구 정자동 124',
        zoning: '일반상업지역',
        landArea: 330,
        totalFloorArea: 1500,
        buildingArea: 198,
        buildingCoverage: 60,
        floorAreaRatio: 450,
        floorUnderground: 1,
        floorGround: 5,
        elevators: 2,
        parking: 12,
        completionYear: '2015-08',
        price: { sale: 59000, deposit: 35000, rent: 800, maintenance: 5 },
        floorDetails: [
          { id: 1, floor: '1층', deposit: 10000, rent: 500, maintenance: 20, note: '스타벅스 입점' },
          { id: 2, floor: '2층', deposit: 5000, rent: 300, maintenance: 10, note: '피부과' }
        ],
        direction: '남향',
        description: '본 물건은 성남시 분당구 정자동 124번지에 위치한 역세권 메인 상권 빌딩입니다. 안정적인 임대 수익이 발생 중이며 가시성이 뛰어납니다.',
        date: '2026-05-27',
        registrant: '손태호',
        status: '보류',
        workLogs: [],
        images: []
      },
      {
        id: 'P-002',
        name: '창민빌라 301호',
        ownerName: '김철수',
        ownerPhone: '010-9876-5432',
        type: '빌라',
        transactionType: '전세',
        address: '경기도 성남시 분당구 정자동 124-1',
        zoning: '제2종일반주거지역',
        landArea: 50,
        totalFloorArea: 85,
        buildingArea: 45,
        buildingCoverage: 50,
        floorAreaRatio: 180,
        floorUnderground: 0,
        floorGround: 4,
        elevators: 0,
        parking: 1,
        completionYear: '2018-02',
        price: { sale: 0, deposit: 29000, rent: 0, maintenance: 5 },
        floorDetails: [
          { id: 1, floor: '3층', deposit: 29000, rent: 0, maintenance: 5, note: '주거용' }
        ],
        direction: '동향',
        description: '깔끔하게 관리된 창민빌라입니다. 즉시 입주 가능하며 채광이 좋습니다.',
        date: '2026-05-26',
        registrant: '손태호',
        status: '완료',
        workLogs: [],
        images: []
      }
    ];

    const initialEmployees = [
      { id: 'E-001', loginId: 'admin', password: '123', name: '손태호', phone: '010-1234-5678', department: '중개법인 대표', date: '2026-05-27' },
      { id: 'E-002', loginId: 'kim123', password: '123', name: '김과장', phone: '010-1111-2222', department: '영업1팀', date: '2026-05-27' }
    ];

    const initialCustomers = [
      { id: 'C-001', name: '이투자', phone: '010-9999-8888', budget: 50000, region: '성남시 분당구', reason: '사옥 이전 목적', date: '2026-05-27' }
    ];

    function App() {
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [currentUser, setCurrentUser] = useState(null);

      const [properties, setProperties] = useState(initialProperties);
      const [currentView, setCurrentView] = useState('list'); 
      const [selectedProperty, setSelectedProperty] = useState(null);
      const [activeTab, setActiveTab] = useState('properties');

      const [employees, setEmployees] = useState(initialEmployees);
      const [currentEmployeeView, setCurrentEmployeeView] = useState('list');

      const [customers, setCustomers] = useState(initialCustomers);
      const [currentCustomerView, setCurrentCustomerView] = useState('list');

      const [searchTerm, setSearchTerm] = useState('');

      const handleAuth = (type, data) => {
        if (type === 'login') {
          const user = employees.find(emp => emp.loginId === data.loginId && emp.password === data.password);
          if (user) {
            setCurrentUser(user);
            setIsAuthenticated(true);
            return { success: true };
          }
          return { success: false, message: '아이디 또는 비밀번호가 일치하지 않습니다.' };
        } 
        
        if (type === 'signup') {
          const exists = employees.some(emp => emp.loginId === data.loginId);
          if (exists) {
            return { success: false, message: '이미 존재하는 아이디입니다.' };
          }
          const newUser = {
            id: `E-00${employees.length + 1}`,
            loginId: data.loginId,
            password: data.password,
            name: data.name,
            phone: data.phone,
            department: data.department || '신규 사원',
            date: new Date().toISOString().split('T')[0]
          };
          setEmployees([newUser, ...employees]);
          setCurrentUser(newUser);
          setIsAuthenticated(true);
          return { success: true };
        }
      };

      const handleLogout = () => {
        setIsAuthenticated(false);
        setCurrentUser(null);
      };

      const handleSaveProperty = (savedProperty) => {
        if (savedProperty.id) {
          setProperties(prev => prev.map(p => p.id === savedProperty.id ? savedProperty : p));
          setSelectedProperty(savedProperty);
          setCurrentView('detail');
        } else {
          const newProperty = { 
            ...savedProperty, 
            id: `P-00${properties.length + 1}`, 
            date: new Date().toISOString().split('T')[0],
            registrant: currentUser ? currentUser.name : '시스템' 
          };
          setProperties([newProperty, ...properties]);
          setCurrentView('list');
        }
      };

      const handleDeleteProperty = (propertyId) => {
        setProperties(prev => prev.filter(p => p.id !== propertyId));
        setCurrentView('list');
        setSelectedProperty(null);
      };

      const changeTab = (tab) => {
        setActiveTab(tab);
        setSearchTerm('');
      };

      const filteredProperties = properties.filter(p => 
        p.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
        p.address.toLowerCase().includes(searchTerm.toLowerCase())
      );

      const filteredEmployees = employees.filter(e =>
        e.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
        e.department.toLowerCase().includes(searchTerm.toLowerCase()) ||
        e.loginId.toLowerCase().includes(searchTerm.toLowerCase())
      );

      const filteredCustomers = customers.filter(c =>
        c.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
        c.region.toLowerCase().includes(searchTerm.toLowerCase())
      );

      if (!isAuthenticated) {
        return <AuthView onAuth={handleAuth} />;
      }

      return (
        <div className="flex h-screen bg-slate-50 font-sans text-slate-800">
          <aside className="w-64 bg-slate-900 text-white flex flex-col z-20 shadow-xl">
            <div className="p-6 border-b border-slate-800">
              <div className="flex items-center gap-3">
                <Building2 className="w-8 h-8 text-blue-400" />
                <h1 className="text-xl font-bold tracking-tight">원프로젝트</h1>
              </div>
              <p className="text-xs text-slate-400 mt-2">부동산 종합 관리 시스템</p>
            </div>
            
            <nav className="flex-1 p-4 space-y-2">
              <SidebarItem icon={<CalendarIcon />} label="캘린더" active={activeTab === 'calendar'} onClick={() => changeTab('calendar')} />
              <SidebarItem icon={<List />} label="물건 관리" active={activeTab === 'properties'} onClick={() => { changeTab('properties'); setCurrentView('list'); }} />
              <SidebarItem icon={<UserCircle />} label="사원 관리" active={activeTab === 'employees'} onClick={() => { changeTab('employees'); setCurrentEmployeeView('list'); }} />
              <SidebarItem icon={<Users />} label="고객 관리(매수자)" active={activeTab === 'customers'} onClick={() => { changeTab('customers'); setCurrentCustomerView('list'); }} />
              <div className="pt-4 mt-4 border-t border-slate-800">
                <SidebarItem icon={<Lock />} label="로그아웃" active={false} onClick={handleLogout} />
              </div>
            </nav>
            
            <div className="p-4 border-t border-slate-800">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-bold shadow-inner">
                    {currentUser ? currentUser.name.charAt(0) : 'U'}
                  </div>
                  <div>
                    <p className="text-sm font-medium">{currentUser ? currentUser.name : '사용자'} 님</p>
                    <p className="text-xs text-slate-400">{currentUser ? currentUser.department : '관리자'}</p>
                  </div>
                </div>
              </div>
            </div>
          </aside>

          <main className="flex-1 flex flex-col h-screen overflow-hidden">
            <header className="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 shadow-sm z-10">
              <h2 className="text-xl font-semibold text-slate-800">
                {activeTab === 'properties' ? '물건 관리' : 
                 activeTab === 'employees' ? '사원 관리' :
                 activeTab === 'customers' ? '고객 관리(매수자)' :
                 activeTab === 'calendar' ? '개인 캘린더' : '관리 메뉴'}
              </h2>
              <div className="flex items-center gap-4">
                <div className="relative">
                  <Search className="w-4 h-4 absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400" />
                  <input 
                    type="text" 
                    value={searchTerm}
                    onChange={(e) => setSearchTerm(e.target.value)}
                    placeholder="검색어 입력..." 
                    className="pl-9 pr-4 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 w-64 transition-all focus:bg-white"
                  />
                </div>
                {activeTab === 'properties' && currentView === 'list' && (
                  <button className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors flex items-center gap-2 whitespace-nowrap shadow-sm" onClick={() => { setSelectedProperty(null); setCurrentView('form'); }}>
                    <Plus className="w-4 h-4" /> 신규 물건 등록
                  </button>
                )}
                {activeTab === 'employees' && currentEmployeeView === 'list' && (
                  <button className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors flex items-center gap-2 shadow-sm" onClick={() => setCurrentEmployeeView('form')}>
                    <Plus className="w-4 h-4" /> 사원 추가하기
                  </button>
                )}
                {activeTab === 'customers' && currentCustomerView === 'list' && (
                  <button className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors flex items-center gap-2 shadow-sm" onClick={() => setCurrentCustomerView('form')}>
                    <Plus className="w-4 h-4" /> 신규 손님 등록
                  </button>
                )}
              </div>
            </header>

            <div className="flex-1 overflow-auto p-8 relative">
              {activeTab === 'properties' && (
                <>
                  {currentView === 'list' && <PropertyListView properties={filteredProperties} onViewDetail={(p) => { setSelectedProperty(p); setCurrentView('detail'); }} />}
                  {currentView === 'detail' && (
                    <PropertyDetailView 
                      property={selectedProperty} 
                      onBack={() => { setCurrentView('list'); setSelectedProperty(null); }} 
                      onEdit={() => setCurrentView('form')} 
                      onDelete={handleDeleteProperty} 
                      currentUser={currentUser}
                      onUpdate={(updatedProperty) => {
                        setProperties(prev => prev.map(p => p.id === updatedProperty.id ? updatedProperty : p));
                        setSelectedProperty(updatedProperty);
                      }}
                    />
                  )}
                  {currentView === 'form' && (
                    <PropertyFormView 
                      initialData={selectedProperty} 
                      onBack={() => { currentView === 'form' && selectedProperty ? setCurrentView('detail') : setCurrentView('list'); }} 
                      onSave={handleSaveProperty} 
                      currentUser={currentUser} 
                    />
                  )}
                </>
              )}
              {activeTab === 'employees' && (
                <>
                  {currentEmployeeView === 'list' && <EmployeeListView employees={filteredEmployees} />}
                  {currentEmployeeView === 'form' && (
                    <EmployeeFormView 
                      onBack={() => setCurrentEmployeeView('list')} 
                      onSave={(newEmp) => {
                        setEmployees([{ ...newEmp, id: `E-00${employees.length + 1}`, date: new Date().toISOString().split('T')[0] }, ...employees]);
                        setCurrentEmployeeView('list');
                      }} 
                    />
                  )}
                </>
              )}
              {activeTab === 'customers' && (
                <>
                  {currentCustomerView === 'list' && <CustomerListView customers={filteredCustomers} />}
                  {currentCustomerView === 'form' && (
                    <CustomerFormView 
                      onBack={() => setCurrentCustomerView('list')} 
                      onSave={(newCust) => {
                        setCustomers([{ ...newCust, id: `C-00${customers.length + 1}`, date: new Date().toISOString().split('T')[0] }, ...customers]);
                        setCurrentCustomerView('list');
                      }} 
                    />
                  )}
                </>
              )}
              {activeTab === 'calendar' && <CalendarView />}
            </div>
          </main>
        </div>
      );
    }

    function AuthView({ onAuth }) {
      const [isLoginMode, setIsLoginMode] = useState(true);
      const [errorMsg, setErrorMsg] = useState('');
      const [formData, setFormData] = useState({ loginId: '', password: '', name: '', phone: '', department: '' });

      const handleChange = (e) => setFormData({ ...formData, [e.target.name]: e.target.value });

      const handleSubmit = (e) => {
        e.preventDefault();
        setErrorMsg('');
        const result = onAuth(isLoginMode ? 'login' : 'signup', formData);
        if (result && !result.success) setErrorMsg(result.message);
      };

      return (
        <div className="flex h-screen w-full items-center justify-center bg-slate-100">
          <div className="w-full max-w-md bg-white p-8 rounded-2xl shadow-xl border border-slate-200">
            <div className="flex flex-col items-center justify-center mb-6">
              <div className="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mb-4 shadow-inner">
                <Building2 className="w-8 h-8 text-blue-600" />
              </div>
              <h1 className="text-2xl font-extrabold text-slate-900 tracking-tight">원프로젝트 CRM</h1>
              <p className="text-sm text-slate-500 mt-2">부동산 매물 관리의 시작</p>
            </div>

            <div className="flex p-1 bg-slate-100 rounded-lg mb-6">
              <button onClick={() => {setIsLoginMode(true); setErrorMsg('');}} className={`flex-1 py-2 text-sm font-bold rounded-md transition-all ${isLoginMode ? 'bg-white text-blue-600 shadow' : 'text-slate-500'}`}>로그인</button>
              <button onClick={() => {setIsLoginMode(false); setErrorMsg('');}} className={`flex-1 py-2 text-sm font-bold rounded-md transition-all ${!isLoginMode ? 'bg-white text-blue-600 shadow' : 'text-slate-500'}`}>회원가입</button>
            </div>

            <form onSubmit={handleSubmit} className="space-y-4">
              <div className="space-y-1">
                <label className="text-sm font-bold text-slate-700">아이디</label>
                <div className="relative">
                  <User className="w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                  <input required type="text" name="loginId" value={formData.loginId} onChange={handleChange} placeholder="아이디 입력" className="w-full pl-12 pr-4 py-3 border border-slate-300 rounded-xl outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200" />
                </div>
              </div>
              <div className="space-y-1">
                <label className="text-sm font-bold text-slate-700">비밀번호</label>
                <div className="relative">
                  <Lock className="w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                  <input required type="password" name="password" value={formData.password} onChange={handleChange} placeholder="비밀번호 입력" className="w-full pl-12 pr-4 py-3 border border-slate-300 rounded-xl outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200" />
                </div>
              </div>

              {!isLoginMode && (
                <div className="space-y-4 pt-2 border-t border-slate-100 mt-2">
                  <div className="grid grid-cols-2 gap-3">
                    <div className="space-y-1">
                      <label className="text-sm font-bold text-slate-700">이름</label>
                      <input required type="text" name="name" value={formData.name} onChange={handleChange} placeholder="홍길동" className="w-full px-4 py-3 border border-slate-300 rounded-xl outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200" />
                    </div>
                    <div className="space-y-1">
                      <label className="text-sm font-bold text-slate-700">소속</label>
                      <input required type="text" name="department" value={formData.department} onChange={handleChange} placeholder="영업1팀" className="w-full px-4 py-3 border border-slate-300 rounded-xl outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200" />
                    </div>
                  </div>
                  <div className="space-y-1">
                    <label className="text-sm font-bold text-slate-700">연락처</label>
                    <div className="relative">
                      <Phone className="w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />

          <table className="w-full text-left border-collapse whitespace-nowrap">

              <tr className="bg-slate-50 border-b border-slate-200 text-xs uppercase tracking-wider text-slate-500"><th className="p-4 font-medium">사번</th><th className="p-4 font-medium">이름</th><th className="p-4 font-medium">소속</th><th className="p-4 font-medium">아이디 (접속용)</th><th className="p-4 font-medium">전화번호</th><th className="p-4 font-medium text-center">등록일</th></tr>
            </thead>
            <tbody className="divide-y divide-slate-100 text-sm">
              {employees.map(emp => (
                <tr key={emp.id} className="hover:bg-blue-50/50 transition-colors"><td className="p-4 text-slate-500">{emp.id}</td><td className="p-4 font-bold text-slate-800">{emp.name}</td><td className="p-4 text-slate-600"><span className="px-2 py-1 bg-slate-100 rounded text-xs border border-slate-200">{emp.department}</span></td><td className="p-4 text-blue-600 font-medium">{emp.loginId}</td><td className="p-4 text-slate-600">{emp.phone}</td><td className="p-4 text-center text-slate-500">{emp.date}</td></tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function EmployeeFormView({ onBack, onSave }) {
      const [formData, setFormData] = useState({ name: '', phone: '', department: '', loginId: '', password: '' });
      const handleChange = (e) => setFormData({ ...formData, [e.target.name]: e.target.value });
      
      return (
        <div className="max-w-2xl mx-auto pb-10">
          <div className="flex justify-between items-center mb-6">
            <h2 className="text-2xl font-bold text-slate-800">사원 등록하기</h2>
            <button onClick={onBack} className="text-slate-500 hover:text-slate-800 text-sm font-medium">취소 및 돌아가기</button>
          </div>
          <form onSubmit={(e) => { e.preventDefault(); onSave(formData); }} className="space-y-6 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <h3 className="text-lg font-bold text-slate-800 mb-5 pb-3 border-b border-slate-100 flex items-center gap-2"><Briefcase className="w-5 h-5 text-blue-500" /> 사원 정보</h3>
            <div className="grid grid-cols-2 gap-4"><FormGroup label="이름"><input required type="text" name="name" onChange={handleChange} className="form-input w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="홍길동" /></FormGroup><FormGroup label="소속"><input required type="text" name="department" onChange={handleChange} className="form-input w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="예: 영업1팀" /></FormGroup></div>
            <FormGroup label="전화번호"><input required type="tel" name="phone" onChange={handleChange} className="form-input w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="010-0000-0000" /></FormGroup>
            <h3 className="text-lg font-bold text-slate-800 mb-5 pb-3 pt-4 border-b border-slate-100 flex items-center gap-2"><Lock className="w-5 h-5 text-blue-500" /> 접속 계정 정보</h3>
            <div className="grid grid-cols-2 gap-4"><FormGroup label="아이디"><input required type="text" name="loginId" onChange={handleChange} className="form-input w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="아이디 입력" /></FormGroup><FormGroup label="비밀번호"><input required type="password" name="password" onChange={handleChange} className="form-input w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="비밀번호 입력" /></FormGroup></div>
            <div className="flex justify-end pt-4"><button type="submit" className="px-8 py-3 bg-blue-600 text-white rounded-xl font-bold flex items-center gap-2 hover:bg-blue-700 shadow-sm"><Save className="w-5 h-5" /> 사원 등록</button></div>
          </form>
        </div>
      );
    }

    function CustomerListView({ customers }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
          <div className="p-5 border-b border-slate-200 flex justify-between items-center bg-slate-50/50">
            <h3 className="font-semibold text-slate-800 flex items-center gap-2"><Users className="w-5 h-5 text-blue-600" /> 등록된 매수자 목록 <span className="text-blue-600 bg-blue-100 px-2 py-0.5 rounded-full text-xs">{customers.length}</span></h3>
          </div>
          <table className="w-full text-left border-collapse whitespace-nowrap">
            <thead>
              <tr className="bg-slate-50 border-b border-slate-200 text-xs uppercase tracking-wider text-slate-500"><th className="p-4 font-medium">이름</th><th className="p-4 font-medium">전화번호</th><th className="p-4 font-medium text-right">투자금액(만원)</th><th className="p-4 font-medium">희망 지역</th><th className="p-4 font-medium">구매사유</th></tr>
            </thead>
            <tbody className="divide-y divide-slate-100 text-sm">
              {customers.map(cust => (
                <tr key={cust.id} className="hover:bg-blue-50/50 transition-colors"><td className="p-4 font-bold text-slate-800">{cust.name}</td><td className="p-4 text-slate-600">{cust.phone}</td><td className="p-4 text-right font-bold text-red-600">{Number(cust.budget).toLocaleString()}</td><td className="p-4 text-slate-600">{cust.region}</td><td className="p-4 text-slate-600 truncate max-w-[200px]">{cust.reason}</td></tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function CustomerFormView({ onBack, onSave }) {
      const [formData, setFormData] = useState({ name: '', phone: '', budget: '', region: '', reason: '' });
      const handleChange = (e) => setFormData({ ...formData, [e.target.name]: e.target.value });
      
      return (
        <div className="max-w-2xl mx-auto pb-10">
          <div className="flex justify-between items-center mb-6"><h2 className="text-2xl font-bold text-slate-800">신규 손님 등록</h2><button onClick={onBack} className="text-slate-500 hover:text-slate-800 text-sm font-medium">취소 및 돌아가기</button></div>
          <form onSubmit={(e) => { e.preventDefault(); onSave(formData); }} className="space-y-6 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <h3 className="text-lg font-bold text-slate-800 mb-5 pb-3 border-b border-slate-100 flex items-center gap-2"><Users className="w-5 h-5 text-blue-500" /> 손님(매수자) 정보</h3>
            <div className="grid grid-cols-2 gap-4"><FormGroup label="이름"><input required type="text" name="name" onChange={handleChange} className="form-input w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="김투자" /></FormGroup><FormGroup label="전화번호"><input required type="tel" name="phone" onChange={handleChange} className="form-input w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="010-0000-0000" /></FormGroup></div>
            <FormGroup label="금액 (단위: 만원)"><input required type="number" name="budget" onChange={handleChange} className="form-input w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-right" placeholder="예: 50000" /></FormGroup>
            <FormGroup label="지역"><input required type="text" name="region" onChange={handleChange} className="form-input w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="예: 성남시 분당구 일대" /></FormGroup>
            <FormGroup label="구매사유"><textarea required name="reason" onChange={handleChange} rows={3} className="form-input w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none resize-none" placeholder="예: 사옥 이전, 임대수익 목적 등" /></FormGroup>
            <div className="flex justify-end pt-4"><button type="submit" className="w-full py-3 bg-blue-600 text-white rounded-xl font-bold">손님 등록</button></div>
          </form>
        </div>
      );
    }

    function CalendarView() {
      const [date, setDate] = useState(new Date());
      const [memos, setMemos] = useState({ '2026-05-27': [{ id: 1, text: '엠파이어 빌딩 매수자 미팅' }, { id: 2, text: '오후 3시 현장 답사' }], '2026-05-28': [{ id: 3, text: '창민빌라 전세 계약' }] });
      const [editingDate, setEditingDate] = useState(null);
      const [newMemo, setNewMemo] = useState('');

      const year = date.getFullYear();
      const month = date.getMonth();

      const handleAddMemo = (e, dayStr) => { e.stopPropagation(); setEditingDate(dayStr); setNewMemo(''); };
      const saveMemo = (e, dayStr) => { e.stopPropagation(); if (newMemo.trim()) setMemos(prev => ({ ...prev, [dayStr]: [...(prev[dayStr] || []), { id: Date.now(), text: newMemo.trim() }] })); setEditingDate(null); };
      const deleteMemo = (e, dayStr, idx) => { e.stopPropagation(); setMemos(prev => { const newMemos = [...(prev[dayStr] || [])]; newMemos.splice(idx, 1); return { ...prev, [dayStr]: newMemos }; }); };

      const renderDays = () => {
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const firstDay = new Date(year, month, 1).getDay();
        const days = [];
        
        for (let i = 0; i < firstDay; i++) days.push(<div key={`empty-${i}`} className="bg-slate-50 border border-slate-100 rounded-lg"></div>);
        for (let d = 1; d <= daysInMonth; d++) {
          const dayStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
          const isToday = new Date().toDateString() === new Date(year, month, d).toDateString();
          const currentDayOfWeek = new Date(year, month, d).getDay();
          const dayColor = currentDayOfWeek === 0 ? 'text-red-500' : currentDayOfWeek === 6 ? 'text-blue-500' : 'text-slate-700';

          const currentMemos = (memos[dayStr] || []);

          days.push(
            <div key={d} onClick={(e) => { if(!editingDate) handleAddMemo(e, dayStr) }} className={`group relative min-h-[120px] p-2 border border-slate-100 rounded-lg cursor-pointer hover:border-blue-300 transition-colors ${isToday ? 'bg-blue-50/30 border-blue-200' : 'bg-white'}`}>
              <div className="flex justify-between items-start mb-1">
                <div className={`text-sm font-semibold ${dayColor} ${isToday ? 'font-extrabold underline' : ''}`}>{d}</div>
                <button onClick={(e) => handleAddMemo(e, dayStr)} className="w-5 h-5 rounded-full hover:bg-slate-100 text-slate-300 hover:text-blue-600 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all"><Plus className="w-3 h-3" /></button>
              </div>
              <div className="space-y-1">
                {currentMemos.map((memo, idx) => (
                  <div key={memo.id} className="flex justify-between items-center text-[11px] bg-blue-50 text-blue-700 pl-1.5 pr-1 py-1 rounded border border-blue-100 hover:bg-blue-100 transition-colors group/item">
                    <span className="truncate flex-1">{memo.text}</span>
                    <button onClick={(e) => deleteMemo(e, dayStr, idx)} className="text-slate-400 hover:text-red-500 p-0.5 ml-1 opacity-0 group-hover/item:opacity-100 transition-opacity"><Trash2 className="w-3 h-3" /></button>
                  </div>
                ))}
                {editingDate === dayStr && (
                  <div className="mt-1 flex flex-col gap-1" onClick={e => e.stopPropagation()}>
                    <input autoFocus type="text" value={newMemo} onChange={e => setNewMemo(e.target.value)} onKeyDown={e => e.key === 'Enter' && saveMemo(e, dayStr)} placeholder="일정 입력..." className="w-full text-xs p-1.5 border border-blue-300 rounded outline-none focus:ring-1 focus:ring-blue-500 bg-white" />
                    <div className="flex gap-1"><button onClick={(e) => saveMemo(e, dayStr)} className="text-[10px] bg-blue-600 text-white px-2 py-1 rounded font-medium flex-1 hover:bg-blue-700">저장</button><button onClick={(e) => { e.stopPropagation(); setEditingDate(null); }} className="text-[10px] bg-slate-200 text-slate-700 px-2 py-1 rounded font-medium flex-1 hover:bg-slate-300">취소</button></div>
                  </div>
                )}
              </div>
            </div>
          );
        }
        return days;
      };

      return (
        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 h-full flex flex-col">
          <div className="flex justify-between items-center mb-6">
            <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2"><CalendarIcon className="w-6 h-6 text-blue-600" /> 개인 캘린더</h2>
            <div className="flex items-center gap-4">
              <button onClick={() => setDate(new Date(year, month - 1, 1))} className="p-2 hover:bg-slate-100 rounded-full transition-colors"><ChevronLeft className="w-5 h-5 text-slate-600" /></button>
              <span className="text-lg font-bold text-slate-800 w-32 text-center">{year}년 {month + 1}월</span>
              <button onClick={() => setDate(new Date(year, month + 1, 1))} className="p-2 hover:bg-slate-100 rounded-full transition-colors"><ChevronRight className="w-5 h-5 text-slate-600" /></button>
            </div>
          </div>
          <div className="grid grid-cols-7 gap-2 mb-2">
            {['일', '월', '화', '수', '목', '금', '토'].map((day, i) => (
              <div key={day} className={`text-center text-sm font-bold py-2 bg-slate-50 rounded-lg ${i === 0 ? 'text-red-500' : i === 6 ? 'text-blue-500' : 'text-slate-600'}`}>{day}</div>
            ))}
          </div>
          <div className="grid grid-cols-7 gap-2 flex-1 auto-rows-fr overflow-y-auto pr-1">{renderDays()}</div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
