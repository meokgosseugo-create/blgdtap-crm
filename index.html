<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>빌딩탭 개인 CRM</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- 고화질 PDF 변환 엔진 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f8fafc; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    input, textarea, button, select, a { -webkit-tap-highlight-color: transparent; outline: none; }
    input[type="number"]::-webkit-outer-spin-button, input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }

    /* PDF 및 인쇄 최적화 (규격 고정) */
    @media print {
      body { background-color: white !important; margin: 0; padding: 0; }
      .no-print { display: none !important; }
      #root, main { height: auto !important; overflow: visible !important; }
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      .report-page { page-break-after: always !important; page-break-inside: avoid !important; box-shadow: none !important; margin: 0 !important; border: none !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef } = React;

    const safeStorage = {
      getItem: (key) => { try { return localStorage.getItem(key); } catch (e) { return window['temp_' + key] || null; } },
      setItem: (key, val) => { try { localStorage.setItem(key, val); } catch (e) { window['temp_' + key] = val; } },
      removeItem: (key) => { try { localStorage.removeItem(key); } catch (e) { delete window['temp_' + key]; } }
    };

    const SUPABASE_URL = "https://ehshoqcskipcvybhomlq.supabase.co";
    const SUPABASE_KEY = "sb_publishable_v5aUCKdYsRAtiwKSjn8oSA_GnuPEe4G";
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: { storage: safeStorage, storageKey: 'building_tab_crm_session', autoRefreshToken: true, persistSession: true, detectSessionInUrl: false }
    });

    const toDB = (prop) => {
      const dbObj = { ...prop };
      const excludeKeys = ['sale', 'deposit', 'rent', 'maintenance', 'direction', 'is_shared'];
      excludeKeys.forEach(k => delete dbObj[k]);

      const keyMap = { ownerName: 'ownername', ownerPhone: 'ownerphone', transactionType: 'transactiontype', landArea: 'landarea', totalFloorArea: 'totalfloorarea', buildingArea: 'buildingarea', buildingCoverage: 'buildingcoverage', floorAreaRatio: 'floorarearatio', floorUnderground: 'floorunderground', floorGround: 'floorground', completionYear: 'completionyear', floorDetails: 'floordetails', workLogs: 'worklogs', registrantPhone: 'registrantphone' };
      for (const [camel, lower] of Object.entries(keyMap)) {
        if (dbObj[camel] !== undefined) { dbObj[lower] = dbObj[camel]; delete dbObj[camel]; }
      }
      return dbObj;
    };

    const fromDB = (row) => {
      const prop = { ...row };
      const keyMap = { ownername: 'ownerName', ownerphone: 'ownerPhone', transactiontype: 'transactionType', landarea: 'landArea', totalfloorarea: 'totalFloorArea', buildingarea: 'buildingArea', buildingcoverage: 'buildingCoverage', floorarearatio: 'floorAreaRatio', floorunderground: 'floorUnderground', floorground: 'floorGround', completionyear: 'completionYear', floordetails: 'floorDetails', worklogs: 'workLogs', registrantphone: 'registrantPhone' };
      for (const [lower, camel] of Object.entries(keyMap)) {
        if (prop[lower] !== undefined) { prop[camel] = prop[lower]; delete prop[lower]; }
      }
      return prop;
    };

    const getYield = (sale, deposit, rent) => {
      const s = Number(sale) || 0; const d = Number(deposit) || 0; const r = Number(rent) || 0;
      if (s === 0 || s <= d || r === 0) return '0.0';
      return (((r * 12) / (s - d)) * 100).toFixed(1);
    };

    const getPricePerPyeong = (sale, landArea) => {
      if (!sale || !landArea) return 0;
      return Math.round(sale / (landArea * 0.3025));
    };

    const formatKoreanCurrency = (val) => {
      const num = Number(val);
      if (!num || isNaN(num) || num === 0) return '0원';
      if (num >= 10000) {
        const eok = num / 10000;
        return Number.isInteger(eok) ? `${eok}억` : `${eok.toFixed(1)}억`;
      }
      return `${num.toLocaleString('ko-KR')}만`;
    };

    const autoFormatAddress = (addr) => {
      if (!addr) return ''; 
      // 너무 강제적인 자동 띄어쓰기가 상세 주소(예: 안암동5가) 수정을 방해하므로, 
      // 연속된 공백만 1칸으로 정리하고 사용자의 입력을 100% 그대로 유지하도록 수정했습니다.
      return addr.replace(/\s{2,}/g, ' ').trim();
    };

    const getExactPyeong = (sqm) => ((Number(sqm) || 0) * 0.3025).toFixed(2);

    const STATUS_OPTIONS = ['보류', '매매', '완료'];
    const STATUS_FORM_COLORS = { '보류': 'bg-yellow-400 text-white shadow', '매매': 'bg-emerald-500 text-white shadow', '완료': 'bg-blue-500 text-white shadow' };
    const STATUS_BADGE_COLORS = { '보류': 'bg-yellow-400 text-white shadow-sm', '매매': 'bg-emerald-500 text-white shadow-sm', '완료': 'bg-blue-500 text-white shadow-sm' };

    const Icon = ({ name, className }) => {
      let textClass = 'text-base';
      if (className?.includes('w-3')) textClass = 'text-xs'; else if (className?.includes('w-4')) textClass = 'text-sm'; else if (className?.includes('w-5')) textClass = 'text-lg'; else if (className?.includes('w-6')) textClass = 'text-xl'; else if (className?.includes('w-8')) textClass = 'text-3xl'; else if (className?.includes('w-12')) textClass = 'text-5xl';
      const cleanClassName = (className || '').replace(/\bw-\d+\b/g, '').replace(/\bh-\d+\b/g, '').trim();
      return <i className={`fas ${name} ${textClass} ${cleanClassName} flex items-center justify-center`}></i>;
    };

    const Building2 = (p) => <Icon name="fa-building" {...p} />;
    const Users = (p) => <Icon name="fa-users" {...p} />;
    const Plus = (p) => <Icon name="fa-plus" {...p} />;
    const Search = (p) => <Icon name="fa-search" {...p} />;
    const MapPin = (p) => <Icon name="fa-map-marker-alt" {...p} />;
    const Banknote = (p) => <Icon name="fa-money-bill-wave" {...p} />;
    const Maximize = (p) => <Icon name="fa-expand-arrows-alt" {...p} />;
    const Car = (p) => <Icon name="fa-car" {...p} />;
    const List = (p) => <Icon name="fa-list" {...p} />;
    const ArrowLeft = (p) => <Icon name="fa-arrow-left" {...p} />;
    const Save = (p) => <Icon name="fa-save" {...p} />;
    const ImageIcon = (p) => <Icon name="fa-image" {...p} />;
    const CheckCircle2 = (p) => <Icon name="fa-check-circle" {...p} />;
    const FileText = (p) => <Icon name="fa-file-alt" {...p} />;
    const Trash2 = (p) => <Icon name="fa-trash-alt" {...p} />;
    const TrendingUp = (p) => <Icon name="fa-chart-line" {...p} />;
    const UserCircle = (p) => <Icon name="fa-user-circle" {...p} />;
    const Briefcase = (p) => <Icon name="fa-briefcase" {...p} />;
    const CalendarIcon = (p) => <Icon name="fa-calendar-alt" {...p} />;
    const ChevronLeft = (p) => <Icon name="fa-chevron-left" {...p} />;
    const ChevronRight = (p) => <Icon name="fa-chevron-right" {...p} />;
    const Phone = (p) => <Icon name="fa-phone" {...p} />;
    const User = (p) => <Icon name="fa-user" {...p} />;
    const ArrowUpCircle = (p) => <Icon name="fa-arrow-circle-up" {...p} />;
    const Upload = (p) => <Icon name="fa-upload" {...p} />;
    const XCircle = (p) => <Icon name="fa-times-circle" {...p} />;
    const Lock = (p) => <Icon name="fa-lock" {...p} />;
    const ShieldCheck = (p) => <Icon name="fa-shield-alt" {...p} />;
    const MapIcon = (p) => <Icon name="fa-map" {...p} />;
    const CalendarDays = (p) => <Icon name="fa-calendar-day" {...p} />;
    const Percent = (p) => <Icon name="fa-percentage" {...p} />;
    const Bars = (p) => <Icon name="fa-bars" {...p} />;
    const Sync = (p) => <Icon name="fa-sync-alt" {...p} />;
    const Sparkles = (p) => <Icon name="fa-sparkles" {...p} />;

    function SidebarItem({ icon, label, active, onClick }) { return <button onClick={onClick} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-colors ${active ? 'bg-blue-600 text-white' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}>{React.cloneElement(icon, { className: 'w-5 h-5' })} {label}</button>; }
    function FormGroup({ label, children }) { return <div className="flex flex-col gap-1.5 w-full"><label className="text-sm font-semibold text-slate-700">{label}</label>{children}</div>; }
    
    // 💡 내부 항목들이 상하 공간을 고르게 채우도록 h-full, w-full 속성 추가
    function SpecRow({ icon, label, value }) { return <div className="flex flex-col sm:flex-row sm:items-center justify-between p-4 border-b border-slate-100 hover:bg-slate-50 transition-colors gap-1 sm:gap-4 h-full w-full"><div className="flex items-center gap-3 text-slate-500 text-sm shrink-0">{React.cloneElement(icon, { className: 'w-4 h-4 text-slate-400' })} {label}</div><div className="font-semibold text-slate-800 text-sm sm:text-right break-all sm:break-normal">{value}</div></div>; }
    
    function FloorMoneyInput({ label, value, onChange }) { return <div className="flex-1 w-full min-w-[120px]"><div className="flex items-center border border-slate-300 rounded-lg bg-white focus-within:border-blue-500 focus-within:ring-1 overflow-hidden shadow-sm transition-all"><span className="bg-slate-100 text-xs font-bold text-slate-600 px-2 py-3 sm:py-2 border-r border-slate-200 whitespace-nowrap">{label}</span><input type="number" value={value || ''} onChange={onChange} className="w-full py-3 sm:py-2 px-2 text-right text-sm font-bold outline-none bg-transparent" placeholder="0" /><span className="text-xs font-bold text-slate-500 pr-2 pl-1 whitespace-nowrap">만원</span></div><span className="text-[11px] text-blue-600 font-bold text-right block pr-1 min-h-[16px] mt-0.5">{formatKoreanCurrency(value)}</span></div>; }
    function FloorTextInput({ value, onChange, onBlur, autoFocus }) { return <div className="w-full sm:w-20 shrink-0"><div className="flex items-center border border-slate-300 rounded-lg bg-white focus-within:border-blue-500 focus-within:ring-1 overflow-hidden shadow-sm transition-all"><span className="bg-slate-100 text-xs font-bold text-slate-600 px-2 py-3 sm:py-2 border-r border-slate-200 whitespace-nowrap sm:hidden md:inline-block">층수</span><input type="text" value={value || ''} onChange={onChange} onBlur={onBlur} autoFocus={autoFocus} className="w-full py-3 sm:py-2 px-2 text-center text-sm font-bold outline-none bg-transparent" placeholder="1층" /></div><span className="text-sm text-transparent block min-h-[16px] mt-0.5 hidden sm:block">.</span></div>; }
    function CompanyTextInput({ value, onChange }) { return <div className="flex-1 min-w-[140px]"><div className="flex items-center border border-slate-300 rounded-lg bg-white focus-within:border-blue-500 focus-within:ring-1 overflow-hidden shadow-sm transition-all"><span className="bg-slate-100 text-xs font-bold text-slate-600 px-2 py-3 sm:py-2 border-r border-slate-200 whitespace-nowrap">업체명</span><input type="text" value={value || ''} onChange={onChange} className="w-full py-3 sm:py-2 px-2 text-sm font-bold outline-none bg-transparent" placeholder="상호명/비고" /></div><span className="text-sm text-transparent block min-h-[16px] mt-0.5 hidden sm:block">.</span></div>; }
    function FloorMoneyInputReadOnly({ label, value }) { return <div className="flex-1 w-full min-w-[120px]"><div className="flex items-center border border-blue-200 rounded-lg bg-white overflow-hidden shadow-sm transition-all"><span className="bg-blue-100 text-xs font-bold text-blue-800 px-2 py-3 sm:py-2 border-r border-blue-200 whitespace-nowrap">{label}</span><div className="w-full py-3 sm:py-2 px-2 text-right text-sm font-extrabold text-slate-900 bg-transparent truncate">{value.toLocaleString()}</div><span className="text-xs font-bold text-slate-500 pr-2 pl-1 whitespace-nowrap">만원</span></div><span className="text-[11px] text-blue-600 font-bold text-right block pr-1 min-h-[16px] mt-0.5">{formatKoreanCurrency(value)}</span></div>; }

    function PropertyReportView({ property, onBack, currentUser }) {
      const [consultantInfo, setConsultantInfo] = useState({
        name: currentUser?.name || '담당자명',
        phone: currentUser?.phone || '연락처'
      });

      const [customFields, setCustomFields] = useState({
        location: '클릭하여 입력 (예: 학동역 도보 3분)',
        roadCond: '클릭하여 입력 (예: 6M*4M 코너)',
        structure: '철근콘크리트구조',
        usage: '제2종근린생활시설',
        elevator: '無'
      });

      const [images, setImages] = useState({
        main: property?.images?.[0] || null,
        map: null,
        ledger: null,
        landPlan: null
      });

      const handleImageUpload = (e, key) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => { setImages(prev => ({ ...prev, [key]: reader.result })); };
          reader.readAsDataURL(file);
        }
        e.target.value = ''; // 동일 파일 재업로드 버그 해결
      };

      const handleCustomFieldChange = (key, value) => {
        setCustomFields(prev => ({ ...prev, [key]: value }));
      };

      const handleExportPDF = async () => {
         const container = document.getElementById('premium-report-container');
         const origClass = container.className;
         const origStyle = container.style.cssText;
         
         container.className = "flex flex-col bg-white"; 
         container.style.cssText = "width: 1122px; margin: 0 auto; padding: 0; gap: 0;";
         
         const pages = container.querySelectorAll('.report-page');
         const origPageStyles = [];
         
         pages.forEach((p) => { 
           origPageStyles.push(p.style.cssText);
           p.style.cssText = "width: 1122px; height: 793px; margin: 0; padding: 0; border: none; box-shadow: none; overflow: hidden;";
         });

         window.scrollTo(0, 0);
         const scrollArea = document.getElementById('main-scroll-area');
         if(scrollArea) scrollArea.scrollTo(0, 0);

         const opt = {
            margin: 0,
            filename: `${property.name}_투자제안서.pdf`,
            image: { type: 'jpeg', quality: 1.0 },
            html2canvas: { scale: 2, useCORS: true, scrollY: 0, windowWidth: 1122 },
            jsPDF: { unit: 'px', format: [1122, 793], orientation: 'landscape', hotfixes: ["px_scaling"] }
         };
         
         try {
            await html2pdf().set(opt).from(container).save();
         } finally {
            container.className = origClass;
            container.style.cssText = origStyle;
            pages.forEach((p, i) => {
               p.style.cssText = origPageStyles[i];
            });
         }
      };

      if (!property) return null;

      const floorTotals = (property.floorDetails || []).reduce((acc, curr) => ({
        deposit: acc.deposit + (Number(curr.deposit) || 0),
        rent: acc.rent + (Number(curr.rent) || 0),
        maintenance: acc.maintenance + (Number(curr.maintenance) || 0),
      }), { deposit: 0, rent: 0, maintenance: 0 });

      const renderFooter = () => (
        <div className="absolute bottom-0 left-0 right-0 h-[50px] bg-slate-50 border-t border-slate-200 flex justify-between items-center px-10 shrink-0 z-50">
           <div className="flex items-center gap-2">
             <div className="w-5 h-5 bg-slate-900 flex items-center justify-center rounded-sm"><Building2 className="w-3 h-3 text-white" /></div>
             <span className="text-slate-800 font-bold text-xs tracking-widest uppercase">PREMIUM PROPERTY CONSULTING</span>
           </div>
           <div className="text-slate-600 text-xs font-bold flex items-center gap-3">
             <span>담당자: {consultantInfo.name}</span>
             <span className="text-slate-300">|</span>
             <span>{consultantInfo.phone}</span>
           </div>
        </div>
      );

      const renderImageUploader = (imageKey, icon, label, subLabel) => (
        <div className="w-full h-full bg-slate-100 relative group overflow-hidden border border-slate-200 rounded-xl">
           {images[imageKey] ? (
             <img src={images[imageKey]} className="w-full h-full object-contain bg-white" />
           ) : (
             <div className="absolute inset-0 flex flex-col items-center justify-center text-slate-400 p-6 text-center bg-slate-50 hover:bg-slate-100 transition-colors cursor-pointer">
                {icon}
                <p className="text-sm font-bold text-slate-500 mb-1">{label}</p>
                <p className="text-xs text-slate-400">{subLabel}</p>
             </div>
           )}
           <input type="file" accept="image/*" onChange={(e) => handleImageUpload(e, imageKey)} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" title="클릭하여 이미지 업로드" />
        </div>
      );

      return (
        <div className="w-full mx-auto pb-20 no-print overflow-x-auto bg-slate-200">
          <div className="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-6 sticky top-0 z-50 min-w-[1122px] mx-auto max-w-[1300px]">
             <button onClick={onBack} className="flex items-center gap-2 text-slate-500 hover:text-slate-800 font-bold px-4 py-2 rounded-lg hover:bg-slate-100 transition-colors"><ArrowLeft className="w-4 h-4"/> 뒤로가기</button>
             <div className="flex gap-3">
                <button onClick={() => window.print()} className="px-6 py-2.5 bg-slate-800 text-white font-bold rounded-lg shadow-sm hover:bg-slate-900 transition-colors flex items-center gap-2"><i className="fas fa-print"></i> 종이 인쇄</button>
                <button onClick={handleExportPDF} className="px-6 py-2.5 bg-blue-600 text-white font-bold rounded-lg shadow-sm hover:bg-blue-700 transition-colors flex items-center gap-2"><i className="fas fa-download"></i> PDF 다운로드</button>
             </div>
          </div>

          <div id="premium-report-container" className="flex flex-col gap-8 p-8 items-center origin-top print:p-0 print:gap-0">
             
             {/* 1장: 표지 */}
             <div className="report-page w-[1122px] h-[793px] bg-[#0F172A] shadow-2xl relative overflow-hidden flex flex-col shrink-0">
                <img src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=2070&auto=format&fit=crop" crossOrigin="anonymous" className="absolute inset-0 w-full h-full object-cover" />
                <div className="absolute inset-0 bg-[#1c355e]/60 pointer-events-none z-10"></div>
                <div className="absolute inset-0 bg-gradient-to-t from-[#0F172A] via-[#0F172A]/40 to-transparent pointer-events-none z-10"></div>
                
                <div className="relative z-40 flex-1 flex flex-col justify-center pl-24 pr-12 w-2/3 pointer-events-none">
                   <div className="w-16 h-1.5 bg-[#D4AF37] mb-8 shadow-lg"></div>
                   <h2 className="text-[#D4AF37] font-bold tracking-[0.4em] text-lg mb-3 uppercase drop-shadow-md">Premium Real Estate</h2>
                   <h1 className="text-white font-black text-6xl leading-[1.2] mb-6 drop-shadow-2xl">{property.name}</h1>
                   <p className="text-slate-200 text-xl font-light flex items-center gap-3 drop-shadow-md"><MapPin className="w-5 h-5 text-[#D4AF37]"/> {property.address}</p>
                </div>
                
                <div className="relative z-40 h-28 bg-[#0F172A]/80 backdrop-blur-md border-t border-white/10 flex items-center justify-between px-24 pointer-events-none">
                   <div className="pointer-events-auto">
                      <p className="text-slate-400 text-xs tracking-widest uppercase mb-1 ml-1">Consultant</p>
                      <div className="flex items-center text-white font-bold text-xl">
                         <input type="text" value={consultantInfo.name} onChange={e => setConsultantInfo({...consultantInfo, name: e.target.value})} className="bg-transparent outline-none w-[100px] px-1 hover:bg-white/10 focus:bg-white/10 rounded transition-colors" title="클릭하여 이름 변경" />
                         <span className="text-slate-500 mx-1">|</span>
                         <input type="text" value={consultantInfo.phone} onChange={e => setConsultantInfo({...consultantInfo, phone: e.target.value})} className="bg-transparent outline-none w-[180px] px-1 hover:bg-white/10 focus:bg-white/10 rounded transition-colors" title="클릭하여 연락처 변경" />
                      </div>
                   </div>
                   <div className="text-right">
                      <p className="text-slate-400 text-xs tracking-widest uppercase mb-1">Target Price</p>
                      <p className="text-[#D4AF37] font-extrabold text-3xl">{formatKoreanCurrency(property.price?.sale)}</p>
                   </div>
                </div>
             </div>

             {/* 2장: 개요 */}
             <div className="report-page w-[1122px] h-[793px] bg-white shadow-2xl relative shrink-0 flex flex-col">
                <div className="h-[70px] bg-[#1c355e] flex items-center px-10 justify-between shrink-0">
                   <h2 className="text-white font-bold text-xl flex items-center gap-3"><Building2 className="w-5 h-5 text-[#D4AF37]"/> 물건 개요</h2>
                   <span className="text-[#D4AF37] font-bold tracking-widest text-sm">{property.name}</span>
                </div>
                <div className="flex-1 flex p-8 gap-8 h-[673px] overflow-hidden">
                   <div className="w-[35%] h-full relative">
                      {renderImageUploader("main", <ImageIcon className="w-12 h-12 mb-3 opacity-40"/>, "메인 건물 사진 등록", "클릭하여 업로드 (세로형 권장)")}
                   </div>

             </div>

             {/* 3장: 지도 */}
             <div className="report-page w-[1122px] h-[793px] bg-white shadow-2xl relative shrink-0 flex flex-col">
                <div className="h-[70px] bg-[#1c355e] flex items-center px-10 justify-between shrink-0">

                <div className="flex-1 p-8 h-[673px]">

                </div>

             {/* 4장: 임대 현황 */}
             <div className="report-page w-[1122px] h-[793px] bg-white shadow-2xl relative shrink-0 flex flex-col">
                <div className="h-[70px] bg-[#1c355e] flex items-center px-10 justify-between shrink-0">
                   <h2 className="text-white font-bold text-xl flex items-center gap-3"><List className="w-5 h-5 text-[#D4AF37]"/> 층별 임대 현황 (Rent Roll)</h2>

                <div className="flex-1 p-10 h-[673px] overflow-hidden flex flex-col">
                   <table className="w-full h-full text-center border-collapse border-y-2 border-[#1c355e] flex-1">
                      <thead className="bg-slate-50 h-[50px] shrink-0">
                        <tr><th className="py-4 px-4 font-extrabold text-slate-700 border-b border-slate-300">층수</th><th className="py-4 px-4 font-extrabold text-slate-700 border-b border-slate-300">임차인 (업체명)</th><th className="py-4 px-4 font-extrabold text-slate-700 border-b border-slate-300 text-right">보증금</th><th className="py-4 px-4 font-extrabold text-slate-700 border-b border-slate-300 text-right">월 임대료</th><th className="py-4 px-4 font-extrabold text-slate-700 border-b border-slate-300 text-right">관리비</th></tr>
                      </thead>
                      <tbody className="text-[14px] h-full">
                        {property.floorDetails?.map(f => (

                             <td className="py-3 px-4 font-bold text-slate-800 text-right">{formatKoreanCurrency(f.deposit)}</td>
                             <td className="py-3 px-4 font-bold text-slate-800 text-right">{formatKoreanCurrency(f.rent)}</td>

                      <tfoot className="bg-[#f8fafc] border-t-2 border-[#1c355e] h-[60px] shrink-0">
                        <tr>
                           <th colSpan="2" className="py-4 px-4 font-extrabold text-slate-900 text-lg">총 합계</th>
                           <td className="py-4 px-4 font-extrabold text-blue-700 text-lg text-right">{formatKoreanCurrency(floorTotals.deposit)}</td>

             {/* 5장: 건축물대장 */}
             <div className="report-page w-[1122px] h-[793px] bg-white shadow-2xl relative shrink-0 flex flex-col">
                <div className="h-[70px] bg-[#1c355e] flex items-center px-10 justify-between shrink-0">
                   <h2 className="text-white font-bold text-xl flex items-center gap-3"><FileText className="w-5 h-5 text-[#D4AF37]"/> 건축물대장</h2>
                </div>
                <div className="flex-1 p-8 h-[673px]">
                   {renderImageUploader("ledger", <FileText className="w-12 h-12 mb-4 opacity-30 text-emerald-500"/>, "건축물대장 스크린샷 첨부", "클릭하여 파일 업로드")}

             {/* 6장: 토지이용계획원 */}
             <div className="report-page w-[1122px] h-[793px] bg-white shadow-2xl relative shrink-0 flex flex-col">
                <div className="h-[70px] bg-[#1c355e] flex items-center px-10 justify-between shrink-0">
                   <h2 className="text-white font-bold text-xl flex items-center gap-3"><MapIcon className="w-5 h-5 text-[#D4AF37]"/> 토지이용계획원</h2>
                </div>
                <div className="flex-1 p-8 h-[673px]">
                   {renderImageUploader("landPlan", <MapIcon className="w-12 h-12 mb-4 opacity-30 text-amber-500"/>, "토지이용계획원 스크린샷 첨부", "클릭하여 파일 업로드")}

    }

    function PropertyListView({ properties, onViewDetail }) {
      const [statusFilter, setStatusFilter] = useState('전체');
      const [addressFilter, setAddressFilter] = useState('');
      const [minPrice, setMinPrice] = useState('');
      const [maxPrice, setMaxPrice] = useState('');
      const [minLandArea, setMinLandArea] = useState('');
      const [maxLandArea, setMaxLandArea] = useState('');
      const [minYield, setMinYield] = useState('');
      const [sortConfig, setSortConfig] = useState({ key: 'date', direction: 'desc' });

      const handleSort = (key) => {
        let direction = 'desc';
        if (sortConfig.key === key && sortConfig.direction === 'desc') direction = 'asc';
        setSortConfig({ key, direction });
      };

      const handleResetFilters = () => {
        setStatusFilter('전체'); setAddressFilter(''); setMinPrice(''); setMaxPrice(''); setMinLandArea(''); setMaxLandArea(''); setMinYield('');
      };

      const filteredAndSortedProperties = useMemo(() => {
        let result = [...properties];
        
        if (statusFilter !== '전체') result = result.filter(p => (p.status || '보류') === statusFilter);
        if (addressFilter.trim() !== '') result = result.filter(p => (p.address || '').includes(addressFilter.trim()));
        if (minPrice !== '' || maxPrice !== '') {
          const min = minPrice !== '' ? Number(minPrice) * 10000 : 0;
          const max = maxPrice !== '' ? Number(maxPrice) * 10000 : Infinity;
          result = result.filter(p => { const priceVal = p.transactionType === '매매' ? (p.price?.sale || 0) : (p.price?.deposit || 0); return priceVal >= min && priceVal <= max; });
        }
        if (minLandArea !== '' || maxLandArea !== '') {
          const min = minLandArea !== '' ? Number(minLandArea) : 0;
          const max = maxLandArea !== '' ? Number(maxLandArea) : Infinity;
          result = result.filter(p => { const py = Number(p.landArea || 0) * 0.3025; return py >= min && py <= max; });
        }
        if (minYield !== '') {
          const min = Number(minYield);
          result = result.filter(p => {
            if (p.transactionType !== '매매') return false; 
            const y = Number(getYield(p.price?.sale, p.price?.deposit, p.price?.rent));
            return y >= min;
          });
        }
        result.sort((a, b) => {
          if (sortConfig.key === 'date') return sortConfig.direction === 'desc' ? new Date(b.date || 0) - new Date(a.date || 0) : new Date(a.date || 0) - new Date(b.date || 0);
          if (sortConfig.key === 'yield') {
            const yA = Number(getYield(a.price?.sale, a.price?.deposit, a.price?.rent)); const yB = Number(getYield(b.price?.sale, b.price?.deposit, b.price?.rent));
            return sortConfig.direction === 'desc' ? yB - yA : yA - yB;
          }
          return 0;
        });
        return result;
      }, [properties, statusFilter, addressFilter, minPrice, maxPrice, minLandArea, maxLandArea, minYield, sortConfig]);

      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden w-full flex flex-col">
          {/* 콤팩트하고 통일성 있는 회색 박스형 검색 패널 */}
          <div className="p-4 border-b border-slate-200 bg-white">
            <div className="bg-slate-50 border border-slate-200 rounded-xl p-3 sm:p-4 flex flex-col gap-3 shadow-sm">
              
              {/* 1열: 거래 상태 */}
              <div className="flex items-center gap-3 sm:gap-4">
                <span className="text-xs font-extrabold text-slate-700 w-[60px] shrink-0 flex items-center gap-1.5"><List className="w-3.5 h-3.5 text-blue-600"/> 상태</span>
                <div className="flex gap-1.5 flex-wrap">
                  {['전체', '보류', '매매', '완료'].map(status => (
                    <button key={status} onClick={() => setStatusFilter(status)} className={`px-3 py-1.5 rounded-md text-xs font-bold transition-all ${statusFilter === status ? 'bg-slate-800 text-white shadow-sm' : 'bg-white border border-slate-200 text-slate-500 hover:text-slate-800 hover:bg-slate-100'}`}>{status}</button>
                  ))}
                </div>
                <div className="ml-auto hidden sm:flex items-center">
                  <span className="text-xs font-bold text-slate-500 bg-white border border-slate-200 px-2 py-1 rounded-md shadow-sm">검색 결과: <span className="text-blue-600">{filteredAndSortedProperties.length}</span>건</span>
                </div>
              </div>

              <div className="w-full h-px bg-slate-200 my-0.5"></div>

              {/* 2열: 상세 검색 (작고 통일감 있게 배치) */}
              <div className="flex flex-wrap items-center gap-x-5 gap-y-3">
                {/* 소재지 */}
                <div className="flex items-center gap-2">
                  <span className="text-xs font-bold text-slate-600 shrink-0 w-[60px]">소재지</span>
                  <input type="text" value={addressFilter} onChange={(e) => setAddressFilter(e.target.value)} className="w-24 sm:w-32 h-8 px-2.5 border border-slate-300 rounded-md bg-white text-xs font-bold outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all placeholder-slate-300" placeholder="동/구 입력" />
                </div>

                {/* 매매금액 */}
                <div className="flex items-center gap-2">
                  <span className="text-xs font-bold text-slate-600 shrink-0">금액(억)</span>
                  <div className="flex items-center h-8 bg-white border border-slate-300 rounded-md px-1 focus-within:border-blue-500 focus-within:ring-1 focus-within:ring-blue-500 transition-all">
                    <input type="number" value={minPrice} onChange={(e) => setMinPrice(e.target.value)} className="w-12 text-center outline-none text-xs font-bold bg-transparent placeholder-slate-300" placeholder="최소" />
                    <span className="text-slate-300 text-[10px]">-</span>
                    <input type="number" value={maxPrice} onChange={(e) => setMaxPrice(e.target.value)} className="w-12 text-center outline-none text-xs font-bold bg-transparent placeholder-slate-300" placeholder="최대" />
                  </div>
                </div>

                {/* 대지면적 */}
                <div className="flex items-center gap-2">
                  <span className="text-xs font-bold text-slate-600 shrink-0">면적(평)</span>
                  <div className="flex items-center h-8 bg-white border border-slate-300 rounded-md px-1 focus-within:border-blue-500 focus-within:ring-1 focus-within:ring-blue-500 transition-all">
                    <input type="number" value={minLandArea} onChange={(e) => setMinLandArea(e.target.value)} className="w-12 text-center outline-none text-xs font-bold bg-transparent placeholder-slate-300" placeholder="최소" />
                    <span className="text-slate-300 text-[10px]">-</span>
                    <input type="number" value={maxLandArea} onChange={(e) => setMaxLandArea(e.target.value)} className="w-12 text-center outline-none text-xs font-bold bg-transparent placeholder-slate-300" placeholder="최대" />
                  </div>
                </div>

                {/* 수익률 */}
                <div className="flex items-center gap-2">
                  <span className="text-xs font-bold text-slate-600 shrink-0">수익률(%)</span>
                  <input type="number" value={minYield} onChange={(e) => setMinYield(e.target.value)} className="w-16 h-8 px-2 text-center border border-slate-300 rounded-md bg-white text-xs font-bold outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all placeholder-slate-300" placeholder="최소 %" />
                </div>

                {/* 초기화 버튼 */}
                <button onClick={handleResetFilters} className="sm:ml-auto h-8 px-3 text-xs font-bold text-slate-600 bg-white border border-slate-300 rounded-md hover:bg-slate-100 hover:text-blue-700 flex items-center justify-center gap-1.5 transition-colors shadow-sm w-full sm:w-auto mt-1 sm:mt-0">
                  <Sync className="w-3 h-3" /> 필터 초기화
                </button>
              </div>
            </div>
          </div>

          <div className="overflow-x-auto w-full">
            <table className="w-full text-left border-collapse whitespace-nowrap min-w-[800px]">
              <thead>
                <tr className="bg-slate-50 border-b border-slate-200 text-[11px] uppercase tracking-wider text-slate-500">
                  <th className="p-3 font-medium">상태</th>
                  <th className="p-3 font-medium">물건명 / 소재지</th>
                  <th className="p-3 font-medium text-center">대지(평)</th>
                  <th className="p-3 font-medium text-center">연면(평)</th>
                  <th className="p-3 font-medium text-right">매매가</th>
                  <th className="p-3 font-medium text-right">보증금</th>
                  <th className="p-3 font-medium text-right">월세</th>
                  <th className="p-3 font-medium text-center text-emerald-600 cursor-pointer hover:bg-slate-100 transition-colors select-none" onClick={() => handleSort('yield')}>
                    수익률 {sortConfig.key === 'yield' ? (sortConfig.direction === 'desc' ? '↓' : '↑') : <span className="text-slate-300">↕</span>}
                  </th>
                  <th className="p-3 font-medium text-center cursor-pointer hover:bg-slate-100 transition-colors select-none" onClick={() => handleSort('date')}>
                    등록일 {sortConfig.key === 'date' ? (sortConfig.direction === 'desc' ? '↓' : '↑') : <span className="text-slate-300">↕</span>}
                  </th>
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-100 text-xs">
                {filteredAndSortedProperties.length > 0 ? filteredAndSortedProperties.map((prop) => (
                  <tr key={prop.id} className="hover:bg-blue-50/50 transition-colors group cursor-pointer sm:cursor-auto" onClick={(e) => { if(window.innerWidth < 640) onViewDetail(prop); }}>
                    <td className="p-3">
                      <div className="flex gap-1.5 items-center flex-wrap">
                        <span className={`px-2 py-0.5 rounded text-[11px] font-bold ${STATUS_BADGE_COLORS[prop.status || '보류']}`}>{prop.status || '보류'}</span>
                        <span className={`px-1.5 py-0.5 rounded text-[10px] font-bold ${prop.transactionType === '매매' ? 'bg-slate-100 text-slate-600 border border-slate-200' : prop.transactionType === '전세' ? 'bg-blue-100 text-blue-700 border border-blue-200' : 'bg-green-100 text-green-700 border border-green-200'}`}>{prop.transactionType}</span>
                      </div>
                    </td>
                    <td className="p-3 max-w-[150px] sm:max-w-[200px]">
                      <div className="flex flex-col gap-1">
                        <span onClick={(e) => { e.stopPropagation(); onViewDetail(prop); }} className="font-bold text-blue-600 sm:cursor-pointer sm:hover:underline hover:text-blue-800 transition-colors truncate text-sm" title={prop.name}>

        setFormData(prev => ({ ...prev, images: [...(prev.images || []), ...newImages] }));
      };

      const removeImage = (index) => setFormData(prev => {
        const newImages = [...(prev.images || [])];
        newImages.splice(index, 1);
        return { ...prev, images: newImages };
      });

      const handleFloorChange = (id, field, value) => {
        setFormData(prev => ({
          ...prev,
          floorDetails: prev.floorDetails.map(item => item.id === id ? { ...item, [field]: value } : item)

      const sortFloorDetails = () => {
        const parseFloorLevel = (str) => {
          if(!str) return 0;
          const numStr = str.replace(/[^0-9]/g, '');
          const num = numStr ? parseInt(numStr, 10) : 0;
          if (str.includes('지하') || str.toUpperCase().includes('B')) return -num;
          return num;
        };

        setFormData(prev => {
          const sorted = [...prev.floorDetails].sort((a, b) => parseFloorLevel(a.floor) - parseFloorLevel(b.floor));
          return { ...prev, floorDetails: sorted };
        });
      };

      const addFloor = () => {
        setFormData(prev => {
          const groundFloors = prev.floorDetails
            .map(f => f.floor)
            .filter(f => f && !f.includes('지하') && !f.toUpperCase().includes('B'))
            .map(f => parseInt(f.replace(/[^0-9]/g, ''), 10))
            .filter(n => !isNaN(n));
          
          const maxGround = groundFloors.length > 0 ? Math.max(...groundFloors) : 0;
          const nextFloor = `${maxGround + 1}층`;

          return {
            ...prev,
            floorDetails: [...prev.floorDetails, { id: Date.now(), floor: nextFloor, companyName: '', deposit: '', rent: '', maintenance: '', isNew: true }]
          };
        });
      };

      const handleAddLog = () => {
        if (!newLog.trim()) return;
        const log = {
          id: Date.now(),
          date: new Date().toLocaleString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }),
          author: currentUser ? currentUser.name : '등록자',
          content: newLog.trim()
        };
        setFormData(prev => ({
          ...prev,
          workLogs: [log, ...(prev.workLogs || [])]
        }));
        setNewLog('');
      };

      const totals = useMemo(() => {
        const details = formData.floorDetails || [];
        return details.reduce((acc, curr) => ({
          deposit: acc.deposit + (Number(curr.deposit) || 0),
          rent: acc.rent + (Number(curr.rent) || 0),
          maintenance: acc.maintenance + (Number(curr.maintenance) || 0),
        }), { deposit: 0, rent: 0, maintenance: 0 });

      const handleSubmit = async (e) => {
        e.preventDefault();

        if (!formData.name || formData.name.trim() === '') return alert("물건명을 입력해주세요.");

        setIsSubmitting(true);

        try {
          const formattedAddress = autoFormatAddress(formData.address);
          
          const parseFloorLevel = (str) => {
            if(!str) return 0;
            const numStr = str.replace(/[^0-9]/g, '');
            const num = numStr ? parseInt(numStr, 10) : 0;
            if (str.includes('지하') || str.toUpperCase().includes('B')) return -num;
            return num;
          };

          const sortedFloors = [...(formData.floorDetails || [])].sort((a, b) => parseFloorLevel(a.floor) - parseFloorLevel(b.floor));
          
          let finalWorkLogs = [...(formData.workLogs || [])];
          if (newLog.trim()) {
            finalWorkLogs.unshift({
              id: Date.now(),
              date: new Date().toLocaleString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }),
              author: currentUser ? currentUser.name : '등록자',
              content: newLog.trim()
            });

          const cleanFormData = { ...formData };
          delete cleanFormData.sale; delete cleanFormData.deposit; delete cleanFormData.rent; delete cleanFormData.maintenance; delete cleanFormData.direction; delete cleanFormData.is_shared;

          await onSave({
            ...cleanFormData,
            address: formattedAddress,
            floorDetails: sortedFloors,
            landArea: Number(formData.landArea || 0),
            totalFloorArea: Number(formData.totalFloorArea || 0),
            buildingArea: Number(formData.buildingArea || 0),
            buildingCoverage: Number(formData.buildingCoverage || 0),
            floorAreaRatio: Number(formData.floorAreaRatio || 0),
            floorUnderground: Number(formData.floorUnderground || 0),
            floorGround: Number(formData.floorGround || 0),
            elevators: Number(formData.elevators || 0),
            parking: Number(formData.parking || 0),
            price: { sale: Number(formData.sale || 0), deposit: totals.deposit, rent: totals.rent, maintenance: totals.maintenance },

                     <FormGroup label="건폐율 (%)"><div className="relative"><input type="number" name="buildingCoverage" value={formData.buildingCoverage || ''} onChange={handleChange} className="form-input w-full p-2.5 sm:p-3 pr-6 sm:pr-8 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm sm:text-base" placeholder="예: 60" /><span className="absolute right-2 sm:right-3 top-1/2 -translate-y-1/2 text-slate-500 font-bold text-xs sm:text-base">%</span></div></FormGroup>
                     <FormGroup label="용적률 (%)"><div className="relative"><input type="number" name="floorAreaRatio" value={formData.floorAreaRatio || ''} onChange={handleChange} className="form-input w-full p-2.5 sm:p-3 pr-6 sm:pr-8 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm sm:text-base" placeholder="예: 250" /><span className="absolute right-2 sm:right-3 top-1/2 -translate-y-1/2 text-slate-500 font-bold text-xs sm:text-base">%</span></div></FormGroup>
                   </div>
                   <div className="grid grid-cols-2 gap-4">
                     <FormGroup label="지하 층수"><input type="number" name="floorUnderground" value={formData.floorUnderground || ''} onChange={handleChange} className="form-input w-full p-2.5 sm:p-3 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm sm:text-base" placeholder="예: 1" /></FormGroup>
                     <FormGroup label="지상 층수"><input type="number" name="floorGround" value={formData.floorGround || ''} onChange={handleChange} className="form-input w-full p-2.5 sm:p-3 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm sm:text-base" placeholder="예: 5" /></FormGroup>
                   </div>
                   <div className="grid grid-cols-2 gap-4">
                     <FormGroup label="E/V 대수"><input type="number" name="elevators" value={formData.elevators || ''} onChange={handleChange} className="form-input w-full p-2.5 sm:p-3 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm sm:text-base" placeholder="예: 1" /></FormGroup>
                     <FormGroup label="주차 대수"><input type="number" name="parking" value={formData.parking || ''} onChange={handleChange} className="form-input w-full p-2.5 sm:p-3 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm sm:text-base" placeholder="예: 12" /></FormGroup>
                   </div>
                   <div className="col-span-1 md:col-span-2">
                       <FormGroup label="준공년도 (또는 사용승인일)"><input type="text" name="completionYear" value={formData.completionYear || ''} onChange={handleChange} className="form-input w-full p-2.5 sm:p-3 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm sm:text-base" placeholder="예: 2015-08-20" /></FormGroup>
                   </div>
               </div>
            </div>

            <div className="bg-white p-5 sm:p-8 rounded-2xl shadow-sm border border-slate-200">
              <h3 className="text-lg sm:text-xl font-bold text-slate-800 mb-4 sm:mb-6 pb-3 sm:pb-4 border-b border-slate-100 flex items-center gap-2"><Banknote className="w-5 h-5 sm:w-6 sm:h-6 text-blue-500" /> 매매가 정보</h3>
              <div className="max-w-xl">
                <FormGroup label="매매가 (단위: 만원)">
                  <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-2 sm:gap-4">
                    <input type="number" name="sale" value={formData.sale || ''} onChange={handleChange} className="flex-[1.5] p-3 sm:p-4 border border-slate-300 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-right text-lg sm:text-xl font-bold" placeholder="예: 50000" />
                    <div className="flex-1 text-right text-base sm:text-lg font-extrabold text-blue-600 bg-blue-50 py-3 sm:py-4 px-4 rounded-xl border border-blue-100 truncate shadow-sm">{formatKoreanCurrency(formData.sale) || '0원'}</div>

              <div className="space-y-4">
                {formData.floorDetails.map((f, i) => (
                  <div key={f.id} className="flex flex-col md:flex-row items-start gap-3 sm:gap-4 p-3 sm:p-4 bg-slate-50 rounded-xl border border-slate-200">

                      <CompanyTextInput value={f.companyName} onChange={(e) => handleFloorChange(f.id, 'companyName', e.target.value)} />
                      <div className="md:hidden shrink-0 ml-auto"><button type="button" onClick={() => setFormData({...formData, floorDetails: formData.floorDetails.filter(item => item.id !== f.id)})} className="p-2.5 text-red-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors border border-red-100 bg-white shadow-sm" title="삭제"><Trash2 className="w-5 h-5" /></button></div>

                      <FloorMoneyInput label="보증금" value={f.deposit} onChange={(e) => handleFloorChange(f.id, 'deposit', e.target.value)} />

    function CalendarView({ currentUser, properties, memos, setMemos, onDbError }) {
      const [date, setDate] = useState(new Date());
      const [editingDate, setEditingDate] = useState(null);
      const [newMemo, setNewMemo] = useState('');

      const year = date.getFullYear();
      const month = date.getMonth();

      const handleAddMemo = (e, dayStr) => { 
        e.stopPropagation(); 
        setEditingDate(dayStr); 
        setNewMemo(''); 
      };

      const saveMemo = async (e, dayStr) => { 
        e.stopPropagation(); 
        if (newMemo.trim()) {
          const newMemoObj = { id: `M-${Date.now()}`, user_id: currentUser.loginId, dateStr: dayStr, text: newMemo.trim() };
          
          setMemos(prev => [...prev, newMemoObj]);
          setEditingDate(null); 

          const { error } = await supabase.from('crm_memos').insert([newMemoObj]);
          if (error && onDbError) onDbError(error, 'crm_memos');
        }
      };

      const deleteMemo = async (e, id) => { 
        e.stopPropagation(); 
        setMemos(prev => prev.filter(m => m.id !== id)); 
        
        const { error } = await supabase.from('crm_memos').delete().eq('id', id);
        if (error && onDbError) onDbError(error, 'crm_memos');
      };

      const renderDays = () => {
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const firstDay = new Date(year, month, 1).getDay();
        const days = [];
        
        for (let i = 0; i < firstDay; i++) days.push(<div key={`empty-${i}`} className="bg-slate-50 border border-slate-100 rounded-lg"></div>);
        for (let d = 1; d <= daysInMonth; d++) {
          const dayStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
          const isToday = new Date().toDateString() === new Date(year, month, d).toDateString();
          const currentDayOfWeek = new Date(year, month, d).getDay();
          const dayColor = currentDayOfWeek === 0 ? 'text-red-500' : currentDayOfWeek === 6 ? 'text-blue-500' : 'text-slate-700';

          const currentMemos = memos.filter(m => m.dateStr === dayStr && m.user_id === currentUser.loginId);
          const completedCount = properties.filter(p => p.user_id === currentUser.loginId && p.date === dayStr && p.status === '완료').length;

          days.push(
            <div key={d} onClick={(e) => { if(!editingDate) handleAddMemo(e, dayStr) }} className={`group relative min-h-[100px] md:min-h-[130px] p-1 md:p-2 border border-slate-100 rounded-lg cursor-pointer hover:border-blue-300 transition-colors ${isToday ? 'bg-blue-50/30 border-blue-200' : 'bg-white'}`}>
              <div className="flex justify-between items-start mb-1">
                <div className={`text-xs md:text-sm font-semibold ${dayColor} ${isToday ? 'font-extrabold underline' : ''}`}>{d}</div>
                <button type="button" onClick={(e) => handleAddMemo(e, dayStr)} className="w-5 h-5 rounded-full hover:bg-slate-100 text-slate-300 hover:text-blue-600 flex items-center justify-center opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-all"><Plus className="w-3 h-3" /></button>
              </div>
              
              <div className="space-y-1 flex flex-col">
                {currentMemos.map((memo) => (
                  <div key={memo.id} className="flex flex-col sm:flex-row justify-between items-start sm:items-center text-[10px] md:text-[11px] bg-blue-50 text-blue-700 pl-1.5 pr-1 py-1 rounded border border-blue-100 hover:bg-blue-100 transition-colors group/item gap-1 sm:gap-0">
                    <span className="truncate w-full sm:flex-1" title={memo.text}>{memo.text}</span>
                    <button type="button" onClick={(e) => deleteMemo(e, memo.id)} className="text-slate-400 hover:text-red-500 p-0.5 ml-auto sm:ml-1 opacity-100 md:opacity-0 md:group-hover/item:opacity-100 transition-opacity"><Trash2 className="w-3 h-3" /></button>
                  </div>
                ))}

                {completedCount > 0 && (
                  <div className="inline-flex items-center gap-1 text-[10px] md:text-[11px] font-bold bg-red-50 text-red-600 px-1.5 py-1 rounded border border-red-100 mt-0.5 w-max">
                    <span className="w-1.5 h-1.5 rounded-full bg-red-500"></span>
                    완료: {completedCount}건
                  </div>
                )}

                {editingDate === dayStr && (
                  <div className="mt-1" onClick={e => e.stopPropagation()}>
                    <input autoFocus type="text" value={newMemo} onChange={e => setNewMemo(e.target.value)} onKeyDown={e => e.key === 'Enter' && saveMemo(e, dayStr)} placeholder="일정 입력..." className="w-full text-[10px] md:text-xs p-1 md:p-1.5 border border-blue-300 rounded outline-none" />
                  </div>
                )}
              </div>
            </div>
          );
        }
        return days;
      };

      return (
        <div className="bg-white p-6 rounded-2xl shadow h-full flex flex-col">
          <div className="flex justify-between items-center mb-6">
            <h2 className="text-xl font-bold"><CalendarIcon className="w-6 h-6 inline text-blue-600 mr-2"/>개인 캘린더</h2>
            <div className="flex items-center gap-4">
              <button type="button" onClick={() => setDate(new Date(year, month - 1, 1))} className="p-2 hover:bg-slate-100 rounded-full"><ChevronLeft className="w-5 h-5"/></button>
              <span className="font-bold text-lg">{year}년 {month + 1}월</span>
              <button type="button" onClick={() => setDate(new Date(year, month + 1, 1))} className="p-2 hover:bg-slate-100 rounded-full"><ChevronRight className="w-5 h-5"/></button>
            </div>
          </div>
          <div className="grid grid-cols-7 gap-2 mb-2 text-center font-bold text-sm">
            <div className="text-red-500">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div className="text-blue-500">토</div>
          </div>
          <div className="grid grid-cols-7 gap-2 flex-1 overflow-y-auto">{renderDays()}</div>
        </div>
      );
    }

            </div>
            
            <div className="flex p-1 bg-slate-100 rounded-lg mb-6">
              <button type="button" onClick={() => {setIsLoginMode(true); setErrorMsg('');}} className={`flex-1 py-2.5 text-sm font-bold rounded-md transition-all ${isLoginMode ? 'bg-white text-blue-600 shadow' : 'text-slate-500'}`}>로그인</button>
              <button type="button" onClick={() => {setIsLoginMode(false); setErrorMsg('');}} className={`flex-1 py-2.5 text-sm font-bold rounded-md transition-all ${!isLoginMode ? 'bg-white text-blue-600 shadow' : 'text-slate-500'}`}>사원 가입</button>
            </div>
            <form onSubmit={handleSubmit} className="space-y-4">
              <div className="space-y-1.5">
                <label className="text-sm font-bold text-slate-700">아이디</label>
                <div className="relative">
                  <User className="w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                  <input type="text" name="loginId" value={formData.loginId} onChange={handleChange} placeholder="아이디 입력" className="w-full pl-12 pr-4 py-3 border border-slate-300 rounded-xl outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200" />
                </div>
              </div>
              <div className="space-y-1.5">
                <label className="text-sm font-bold text-slate-700">비밀번호</label>
                <div className="relative">
                  <Lock className="w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                  <input type="password" name="password" value={formData.password} onChange={handleChange} placeholder="비밀번호 입력" className="w-full pl-12 pr-4 py-3 border border-slate-300 rounded-xl outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200" />
                </div>
              </div>
              {isLoginMode && (
                <label className="flex items-center gap-2 text-sm text-slate-600 mt-2 cursor-pointer font-medium pl-1">
                  <input type="checkbox" checked={rememberId} onChange={(e) => setRememberId(e.target.checked)} className="w-4 h-4 rounded text-blue-600 focus:ring-blue-500 border-gray-300" /> 아이디 기억하기
                </label>
              )}
              {!isLoginMode && (
                <div className="space-y-4 pt-4 border-t border-slate-100 mt-2">
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div className="space-y-1.5"><label className="text-sm font-bold text-slate-700">이름</label><input type="text" name="name" value={formData.name} onChange={handleChange} placeholder="홍길동" className="w-full px-4 py-3 border border-slate-300 rounded-xl outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200" /></div>
                    <div className="space-y-1.5"><label className="text-sm font-bold text-slate-700">소속</label><input type="text" name="department" value={formData.department} onChange={handleChange} placeholder="영업1팀" className="w-full px-4 py-3 border border-slate-300 rounded-xl outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200" /></div>
                  </div>
                  <div className="space-y-1.5">
                    <label className="text-sm font-bold text-slate-700">연락처</label>
                    <div className="relative"><Phone className="w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" /><input type="tel" name="phone" value={formData.phone} onChange={handleChange} placeholder="010-0000-0000" className="w-full pl-12 pr-4 py-3 border border-slate-300 rounded-xl outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200" /></div>
                  </div>
                </div>
              )}
              {errorMsg && <div className="p-3 bg-red-50 text-red-600 text-sm font-bold rounded-lg text-center border border-red-100">{errorMsg}</div>}
              <button type="submit" disabled={isSubmitting} className={`w-full py-4 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition-all shadow-md mt-6 flex items-center justify-center gap-2 text-lg ${isSubmitting ? 'opacity-50 cursor-not-allowed' : ''}`}>
                {isSubmitting ? '처리 중...' : (isLoginMode ? <><ShieldCheck className="w-5 h-5" /> 로그인</> : '가입 완료 및 접속')}
              </button>
            </form>
          </div>
        </div>
      );
    }

    function App() {
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [currentUser, setCurrentUser] = useState(null);
      const [isAuthLoading, setIsAuthLoading] = useState(true);
      const [isFetchingData, setIsFetchingData] = useState(false);

      const [properties, setProperties] = useState([]);
      const [employees, setEmployees] = useState([]);
      const [customers, setCustomers] = useState([]);
      const [memos, setMemos] = useState([]);

      const [currentView, setCurrentView] = useState('list'); 
      const [selectedProperty, setSelectedProperty] = useState(null);
      
      const [activeTab, setActiveTab] = useState('calendar'); 
      const [currentEmployeeView, setCurrentEmployeeView] = useState('list');
      const [currentCustomerView, setCurrentCustomerView] = useState('list');

      const [searchTerm, setSearchTerm] = useState('');
      const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
      const [rlsError, setRlsError] = useState(false);

      const handleSupabaseError = (error, tableName) => {
        if (!error) return false;
        console.warn(`DB Warning (${tableName}):`, error.message);
        if (error.code === '42501') {
          setRlsError(true);
        } else {
          alert(`데이터베이스 오류 (${tableName}):\n${error.message}`);
        }
        return true;
      };

      const fetchCloudData = async () => {
        setIsFetchingData(true);
        try {
          const [propsRes, usersRes, custsRes, memosRes] = await Promise.all([
            supabase.from('crm_properties').select('*'),
            supabase.from('crm_users').select('*'),
            supabase.from('crm_customers').select('*'),
            supabase.from('crm_memos').select('*')
          ]);
          
          if (propsRes.data) {
             const serverProps = propsRes.data.map(fromDB);
             serverProps.sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));
             setProperties(serverProps);
          }
          if (usersRes.data) setEmployees(usersRes.data);
          if (custsRes.data) setCustomers(custsRes.data);
          if (memosRes.data) setMemos(memosRes.data);
        } catch (err) {
          console.warn("데이터 로드 실패:", err.message);
        } finally {
          setIsFetchingData(false);
        }
      };

      useEffect(() => {
        supabase.auth.getSession().then(({ data: { session } }) => {
          if (session) {
            setCurrentUser({
              loginId: session.user.email.replace('@crm.local', '').toLowerCase(),
              name: session.user.user_metadata?.name || '사용자',
              department: session.user.user_metadata?.department || '사원',
              phone: session.user.user_metadata?.phone || '',
              id: session.user.id
            });
            setIsAuthenticated(true);
          }
          setIsAuthLoading(false);
        });

        const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
          if (session) {
            setCurrentUser({
              loginId: session.user.email.replace('@crm.local', '').toLowerCase(),
              name: session.user.user_metadata?.name || '사용자',
              department: session.user.user_metadata?.department || '사원',
              phone: session.user.user_metadata?.phone || '',
              id: session.user.id
            });
            setIsAuthenticated(true);
          } else {
            setCurrentUser(null);
            setIsAuthenticated(false);
          }
        });

        fetchCloudData();
        const interval = setInterval(fetchCloudData, 15000);

        return () => {
          subscription.unsubscribe();
          clearInterval(interval);
        };
      }, []);

      const myProperties = useMemo(() => {
        if (!currentUser || !properties) return [];
        return properties.filter(p => p.user_id && p.user_id.toLowerCase() === currentUser.loginId.toLowerCase());
      }, [properties, currentUser]);

      const filteredMyProperties = useMemo(() => {
        return myProperties.filter(p => 
          (p.name || '').toLowerCase().includes(searchTerm.toLowerCase()) || 
          (p.address || '').toLowerCase().includes(searchTerm.toLowerCase())
        );
      }, [myProperties, searchTerm]);

      const filteredEmployees = useMemo(() => {
        return employees.filter(e =>
          currentUser && e.id !== currentUser.id &&
          ((e.name || '').toLowerCase().includes(searchTerm.toLowerCase()) ||
          (e.department || '').toLowerCase().includes(searchTerm.toLowerCase()) ||
          (e.loginId || '').toLowerCase().includes(searchTerm.toLowerCase()))
        );
      }, [employees, currentUser, searchTerm]);

      const filteredCustomers = useMemo(() => {
        return customers.filter(c =>
          (c.name || '').toLowerCase().includes(searchTerm.toLowerCase()) ||
          (c.region || '').toLowerCase().includes(searchTerm.toLowerCase())
        );
      }, [customers, searchTerm]);

      useEffect(() => {
        const handleClickOutside = (e) => {
          if (isMobileMenuOpen && e.target.closest('#sidebar-overlay')) setIsMobileMenuOpen(false);
        };
        document.addEventListener('click', handleClickOutside);
        return () => document.removeEventListener('click', handleClickOutside);
      }, [isMobileMenuOpen]);

      const handleAuth = async (type, data) => {
        const safeId = data.loginId.toLowerCase().trim();
        const email = safeId.includes('@') ? safeId : `${safeId}@crm.local`;

        if (type === 'login') {
          const { error } = await supabase.auth.signInWithPassword({ email, password: data.password });
          if (error) return { success: false, message: '아이디 또는 비밀번호가 일치하지 않습니다.' };
          setActiveTab('calendar');
          return { success: true };
        } 
        
        if (type === 'signup') {
          const { data: authData, error } = await supabase.auth.signUp({
            email, password: data.password,
            options: { data: { name: data.name, department: data.department || '신규 사원', phone: data.phone } }
          });

          if (error) {
            if (error.message.includes('already registered')) return { success: false, message: '이미 존재하는 아이디입니다.' };
            return { success: false, message: error.message };
          }

          if (authData.user) {
             const empData = {
               id: authData.user.id, loginId: data.loginId.toLowerCase(), name: data.name,
               department: data.department || '신규 사원', phone: data.phone, date: new Date().toISOString().split('T')[0]
             };
             const { error: dbErr } = await supabase.from('crm_users').insert([empData]);
             if (handleSupabaseError(dbErr, 'crm_users')) return { success: false, message: 'DB 보안 정책에 의해 등록 차단됨' };
          }

          setActiveTab('calendar');
          return { success: true };
        }
      };

      const handleLogout = async () => {
        await supabase.auth.signOut();
        setIsMobileMenuOpen(false);
      };

      const handleSaveProperty = async (prop) => {
        try {
          const finalProp = { 
            ...prop, 
            id: prop.id || `P-${Date.now()}`,
            user_id: prop.user_id || currentUser?.loginId?.toLowerCase() || 'unknown', 
            registrant: prop.registrant || currentUser?.name || '등록자',
            registrantPhone: prop.registrantPhone || currentUser?.phone || '',
            date: prop.date || new Date().toISOString().split('T')[0]
          };
          
          setProperties(prev => {
            const idx = prev.findIndex(p => p.id === finalProp.id);
            if(idx >= 0) { const newList = [...prev]; newList[idx] = finalProp; return newList; }
            return [finalProp, ...prev]; 
          });

          setCurrentView('list');
          setSelectedProperty(null);
          
          const scrollArea = document.getElementById('main-scroll-area');
          if (scrollArea) scrollArea.scrollTo({ top: 0, behavior: 'auto' });

          const { error } = await supabase.from('crm_properties').upsert(toDB(finalProp));
          handleSupabaseError(error, 'crm_properties');
          
        } catch (err) {
          alert(`시스템 오류가 발생했습니다:\n${err.message}`);
        }
      };

      const handleUpdateProperty = async (prop) => {
        try {
          setProperties(prev => prev.map(p => p.id === prop.id ? prop : p));
          setSelectedProperty(prop);

          const { error } = await supabase.from('crm_properties').upsert(toDB(prop));
          handleSupabaseError(error, 'crm_properties');
        } catch (err) {
          alert(`시스템 오류가 발생했습니다:\n${err.message}`);
        }
      };

      const handleDeleteProperty = async (propertyId) => {
        setProperties(prev => prev.filter(p => p.id !== propertyId));
        setCurrentView('list');
        setSelectedProperty(null);

        const { error } = await supabase.from('crm_properties').delete().eq('id', propertyId);
        handleSupabaseError(error, 'crm_properties');
      };

      const changeTab = (tab) => {
        setActiveTab(tab); setSearchTerm(''); setIsMobileMenuOpen(false); 
      };

      if (isAuthLoading) {
        return <div className="flex h-screen items-center justify-center text-slate-500 font-bold bg-slate-50"><i className="fas fa-spinner fa-spin mr-2"></i> 시스템 인증 정보를 확인 중입니다...</div>;
      }

      if (!isAuthenticated) return <AuthView onAuth={handleAuth} />;

      return (
        <div className="flex flex-col md:flex-row h-screen bg-slate-50 font-sans text-slate-800">
          <div className="md:hidden flex items-center justify-between bg-slate-900 text-white p-4 z-30 shadow-md sticky top-0">
            <div className="flex items-center gap-2">
              <Building2 className="w-6 h-6 text-blue-400" />
              <h1 className="text-lg font-bold tracking-tight">빌딩탭</h1>
            </div>
            <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="p-2 -mr-2 text-slate-300 hover:text-white transition-colors">
              <Bars className="w-6 h-6" />
            </button>
          </div>

          {isMobileMenuOpen && <div id="sidebar-overlay" className="md:hidden fixed inset-0 bg-black/50 z-40"></div>}

          <aside className={`${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} md:translate-x-0 fixed md:static inset-y-0 left-0 z-50 w-64 bg-slate-900 text-white flex flex-col shadow-2xl md:shadow-xl transition-transform duration-300 ease-in-out no-print`}>
            <div className="p-6 border-b border-slate-800 hidden md:block">
              <div className="flex items-center gap-3">
                <Building2 className="w-8 h-8 text-blue-400" />
                <h1 className="text-xl font-bold tracking-tight">빌딩탭</h1>
              </div>
              <p className="text-[11px] text-slate-400 mt-2">부동산 종합 관리 시스템</p>
            </div>
            
            <nav className="flex-1 p-4 space-y-2 overflow-y-auto mt-4 md:mt-0">
              <SidebarItem icon={<CalendarIcon />} label="개인 캘린더" active={activeTab === 'calendar'} onClick={() => changeTab('calendar')} />
              <SidebarItem icon={<List />} label="내 물건 관리" active={activeTab === 'properties'} onClick={() => { changeTab('properties'); setCurrentView('list'); }} />
              <SidebarItem icon={<Users />} label="고객 관리(매수자)" active={activeTab === 'customers'} onClick={() => { changeTab('customers'); setCurrentCustomerView('list'); }} />
              <SidebarItem icon={<UserCircle />} label="사원 목록" active={activeTab === 'employees'} onClick={() => { changeTab('employees'); setCurrentEmployeeView('list'); }} />
              
              <div className="pt-4 mt-4 border-t border-slate-800">
                <SidebarItem icon={<Lock />} label="로그아웃" active={false} onClick={handleLogout} />
              </div>
            </nav>
            
            <div className="p-4 border-t border-slate-800 mt-auto bg-slate-900">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold shadow-inner shrink-0">
                  {currentUser ? currentUser.name.charAt(0) : 'U'}
                </div>
                <div className="truncate">
                  <p className="text-sm font-medium truncate">{currentUser ? currentUser.name : '사용자'} 님</p>
                  <p className="text-xs text-slate-400 truncate">{currentUser ? currentUser.department : '사원'}</p>
                </div>
              </div>
            </div>
          </aside>

          <main className="flex-1 flex flex-col h-[calc(100vh-60px)] md:h-screen overflow-hidden w-full relative">
            {rlsError && (
              <div className="bg-red-600 text-white p-4 sm:p-6 text-sm font-bold flex flex-col gap-2 relative shadow-lg z-[100] w-full shrink-0 no-print">
                <h3 className="text-base sm:text-lg flex items-center gap-2"><i className="fas fa-exclamation-triangle"></i> 데이터베이스 보안 정책(RLS) 차단 알림</h3>
                <p className="font-medium text-xs sm:text-sm text-red-100">현재 데이터베이스 설정 문제로 서버 저장이 차단되었습니다. 등록한 내용은 임시로 화면에 남겨두지만, <strong>새로고침 시 사라집니다.</strong></p>
                <div className="bg-red-900/50 p-2 sm:p-3 rounded text-xs font-mono mt-1 overflow-x-auto whitespace-nowrap">
                  <span className="text-red-200">▶ 해결 방법: Supabase 대시보드 - SQL Editor에서 아래 명령어를 실행하여 잠금을 해제하세요.</span><br/><br/>
                  ALTER TABLE public.crm_properties DISABLE ROW LEVEL SECURITY;<br/>
                  ALTER TABLE public.crm_customers DISABLE ROW LEVEL SECURITY;<br/>
                  ALTER TABLE public.crm_memos DISABLE ROW LEVEL SECURITY;<br/>
                  ALTER TABLE public.crm_users DISABLE ROW LEVEL SECURITY;
                </div>
                <button onClick={() => setRlsError(false)} className="absolute top-3 right-3 p-1.5 sm:p-2 bg-red-700/50 rounded-lg hover:bg-red-700 text-white transition-colors"><i className="fas fa-times"></i></button>
              </div>
            )}
            
            <header className="bg-white border-b border-slate-200 flex flex-col sm:flex-row items-start sm:items-center justify-between p-4 md:px-8 shadow-sm z-10 gap-4 shrink-0 no-print">
              <h2 className="text-lg md:text-xl font-semibold text-slate-800 flex items-center gap-2">
                {activeTab === 'properties' && currentView === 'report' ? '프리미엄 컨설팅 리포트 출력' : 
                 activeTab === 'properties' ? '내 물건 관리' : 
                 activeTab === 'employees' ? '사원 목록' :
                 activeTab === 'customers' ? '고객 관리(매수자)' :
                 activeTab === 'calendar' ? '개인 캘린더' : '관리 메뉴'}
                 <button onClick={fetchCloudData} className={`ml-2 p-1.5 rounded-full text-blue-600 hover:bg-blue-50 transition-colors ${isFetchingData ? 'animate-spin opacity-50' : ''}`} title="최신 데이터 불러오기">
                   <Sync className="w-4 h-4" />
                 </button>
              </h2>
              <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-3 w-full sm:w-auto">
                <div className="relative w-full sm:w-auto">
                  <Search className="w-4 h-4 absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400" />
                  <input type="text" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} placeholder="목록 빠른 검색..." className="w-full sm:w-56 md:w-64 pl-9 pr-4 py-2.5 sm:py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 transition-all focus:bg-white" />
                </div>
                
                {activeTab === 'properties' && currentView === 'list' && (
                  <button className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 sm:py-2 rounded-lg text-sm font-bold transition-colors flex items-center justify-center gap-2 whitespace-nowrap shadow-sm w-full sm:w-auto" onClick={() => { setSelectedProperty(null); setCurrentView('form'); }}>
                    <Plus className="w-4 h-4" /> 신규 등록
                  </button>
                )}
                {activeTab === 'employees' && currentEmployeeView === 'list' && (
                  <button className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 sm:py-2 rounded-lg text-sm font-bold transition-colors flex items-center justify-center gap-2 shadow-sm w-full sm:w-auto" onClick={() => setCurrentEmployeeView('form')}>
                    <Plus className="w-4 h-4" /> 사원 추가
                  </button>
                )}
                {activeTab === 'customers' && currentCustomerView === 'list' && (
                  <button className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 sm:py-2 rounded-lg text-sm font-bold transition-colors flex items-center justify-center gap-2 shadow-sm w-full sm:w-auto" onClick={() => setCurrentCustomerView('form')}>
                    <Plus className="w-4 h-4" /> 손님 등록
                  </button>
                )}
              </div>
            </header>

            <div id="main-scroll-area" className="flex-1 overflow-y-auto overflow-x-hidden p-4 md:p-8 relative bg-slate-100 sm:bg-transparent print-wrapper">
              {activeTab === 'properties' && (
                <>
                  {currentView === 'list' && <PropertyListView properties={filteredMyProperties} onViewDetail={(p) => { setSelectedProperty(p); setCurrentView('detail'); }} />}
                  {currentView === 'detail' && (
                    <PropertyDetailView 
                      property={selectedProperty} 
                      onBack={() => { setCurrentView('list'); setSelectedProperty(null); }} 
                      onEdit={() => setCurrentView('form')} 
                      onDelete={handleDeleteProperty} 
                      onReport={() => setCurrentView('report')} 
                      currentUser={currentUser}
                      onUpdate={handleUpdateProperty}
                    />
                  )}
                  {currentView === 'report' && (
                    <PropertyReportView 
                      property={selectedProperty} 
                      onBack={() => setCurrentView('detail')} 
                      currentUser={currentUser}
                    />
                  )}
                  {currentView === 'form' && (
                    <PropertyFormView 
                      initialData={selectedProperty} 
                      onBack={() => { currentView === 'form' && selectedProperty ? setCurrentView('detail') : setCurrentView('list'); }} 
                      onSave={handleSaveProperty} 
                      currentUser={currentUser}
                    />
                  )}
                </>
              )}
              {activeTab === 'employees' && (
                <>
                  {currentEmployeeView === 'list' && <EmployeeListView employees={filteredEmployees} />}
                  {currentEmployeeView === 'form' && (
                    <EmployeeFormView 
                      onBack={() => setCurrentEmployeeView('list')} 
                      onSave={async (newEmp) => {
                        const email = newEmp.loginId.includes('@') ? newEmp.loginId : `${newEmp.loginId}@crm.local`;
                        const { data: authData, error } = await supabase.auth.signUp({
                          email, password: newEmp.password, options: { data: { name: newEmp.name, department: newEmp.department, phone: newEmp.phone } }
                        });
                        if (error) return alert(error.message);
                        
                        const emp = { ...newEmp, id: authData.user.id, date: new Date().toISOString().split('T')[0] };
                        
                        setEmployees(prev => [emp, ...prev]);
                        setCurrentEmployeeView('list');

                        const { error: dbErr } = await supabase.from('crm_users').insert([emp]);
                        handleSupabaseError(dbErr, 'crm_users');
                      }} 
                    />
                  )}
                </>
              )}
              {activeTab === 'customers' && (
                <>
                  {currentCustomerView === 'list' && <CustomerListView customers={filteredCustomers} />}
                  {currentCustomerView === 'form' && (
                    <CustomerFormView 
                      onBack={() => setCurrentCustomerView('list')} 
                      onSave={async (newCust) => {
                        const cust = { ...newCust, id: `C-${Date.now()}`, date: new Date().toISOString().split('T')[0] };
                        
                        setCustomers(prev => [cust, ...prev]);
                        setCurrentCustomerView('list');

                        const { error } = await supabase.from('crm_customers').insert([cust]);
                        handleSupabaseError(error, 'crm_customers');
                      }} 
                    />
                  )}
                </>
              )}
              {activeTab === 'calendar' && (
                <CalendarView 
                  currentUser={currentUser}
                  properties={myProperties}
                  memos={memos}
                  setMemos={setMemos}
                  onDbError={handleSupabaseError}
                />
              )}
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
